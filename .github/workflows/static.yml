          // Accrued value using quarterly compounding (same as actual FD accrual)
          const accrued = P * Math.pow(1 + (R / 400), runM / 3);
          const maxLTV = accrued * 0.90; // 90% LTV Statutory Cap
          U.$('#bb-ltv-val').textContent = `₹${U.fmt(maxLTV)}`;
          U.$('#bb-ltv-val').dataset.max = maxLTV;
