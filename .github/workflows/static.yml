<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Finpilot Advisory OS</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
/* ===== The "Finpilot" UI Design System (Shadcn/Tailwind Inspired) ===== */
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* Finpilot Design System — Teal Professional */
  --bg:            #f0fafa;
  --surface:       #ffffff;
  --surface-hover: #f0fdfd;
  --border:        #ccecec;
  --ring:          rgba(13,148,136,0.18);

  --text-main:     #0f3d3a;
  --text-muted:    #5a7a78;

  --primary:       #0d9488;
  --primary-light: #f0fdfa;
  --primary-fg:    #ffffff;

  --accent:        #0891b2;
  --accent-light:  #e0f7fa;
  --warn:          #dc2626;
  --warn-light:    #fef2f2;
  --gold:          #d97706;
  --gold-light:    #fffbeb;
  --violet:        #0e7490;
  --violet-light:  #e0f2fe;
  --sky:           #0284c7;
  --sky-light:     #e0f2fe;

  --shadow-sm:     0 1px 3px 0 rgba(13,148,136,0.08);
  --shadow-md:     0 4px 20px -2px rgba(13,148,136,0.12);
  --shadow-lg:     0 12px 40px -4px rgba(13,148,136,0.16);
  --shadow-card:   0 2px 8px 0 rgba(13,148,136,0.07), 0 0 0 1px rgba(13,148,136,0.06);

  --radius-lg:     18px;
  --radius-md:     12px;
  --radius-sm:     8px;
  --radius-xs:     6px;

  --sidebar-width: 264px;
  --sidebar-collapsed: 72px;
}

html[data-theme="dark"] {
  --bg:            #0f0f1a;
  --surface:       #1a1a2e;
  --surface-hover: #232340;
  --border:        #2d2d5a;
  --ring:          rgba(129,140,248,0.25);
  --text-main:     #e2e8f0;
  --text-muted:    #94a3b8;
  --primary:       #2dd4bf;
  --primary-light: #042f2e;
  --primary-fg:    #042f2e;
  --accent:        #22d3ee;
  --accent-light:  #022c22;
  --warn:          #f87171;
  --warn-light:    #2d0a0a;
  --gold:          #fbbf24;
  --gold-light:    #1c1200;
  --violet:        #06b6d4;
  --violet-light:  #083344;
  --sky:           #38bdf8;
  --sky-light:     #082533;
  --shadow-card:   0 2px 8px 0 rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
body {
  background: var(--bg);
  background-image: radial-gradient(circle at 20% 20%, rgba(99,102,241,0.05) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(13,148,136,0.04) 0%, transparent 50%);
  color: var(--text-main); -webkit-font-smoothing: antialiased;
  height: 100vh; display: flex; overflow: hidden;
}

/* ===== App Layout ===== */
.sidebar {
  width: var(--sidebar-width); height: 100vh; flex-shrink: 0;
  background: linear-gradient(180deg, #ffffff 0%, #f0fdfa 100%);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-x: hidden; white-space: nowrap; z-index: 100;
}
.sidebar.collapsed { width: var(--sidebar-collapsed); }
.sidebar.collapsed:hover { width: var(--sidebar-width); box-shadow: var(--shadow-lg); }

.sidebar-header {
  height: 72px; display: flex; align-items: center; padding: 0 20px;
  border-bottom: 1px solid var(--border); gap: 16px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
}
.sidebar-title { font-size: 1rem; font-weight: 800; transition: opacity 0.2s; letter-spacing: -0.5px; color: #fff !important; }
.sidebar-toggle { color: rgba(255,255,255,0.85) !important; }
.sidebar-toggle:hover { background: rgba(255,255,255,0.15) !important; }
.sidebar-toggle { background: transparent; border: none; color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: var(--radius-sm); transition: 0.2s; }
.sidebar-toggle:hover { background: var(--surface-hover); }
.sidebar-toggle svg { width: 20px; height: 20px; fill: currentColor; }

.sidebar.collapsed:not(:hover) .sidebar-title { opacity: 0; pointer-events: none; }

.nav-links { list-style: none; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; padding-bottom: 100px; }
.nav-category {
  font-size: 0.6rem; text-transform: uppercase; font-weight: 800;
  color: var(--primary); padding: 14px 12px 4px 14px;
  letter-spacing: 0.8px; transition: opacity 0.2s; opacity: 0.75;
}
.sidebar.collapsed:not(:hover) .nav-category { opacity: 0; }

.nav-btn {
  width: 100%; display: flex; align-items: center; gap: 12px; padding: 9px 12px;
  background: transparent; border: none; border-radius: var(--radius-sm);
  color: var(--text-muted); font-size: 0.84rem; font-weight: 500;
  cursor: pointer; transition: all 0.18s; text-align: left;
}
.nav-btn:hover { background: rgba(13,148,136,0.08); color: var(--primary); }
.nav-btn.active {
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  color: #fff; font-weight: 600;
  box-shadow: 0 2px 8px rgba(13,148,136,0.35);
}
.nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-icon svg { width: 16px; height: 16px; transition: transform 0.2s; }
.nav-btn:hover .nav-icon svg { transform: scale(1.1); }
.nav-btn.active .nav-icon svg { stroke: var(--primary-fg); }
.nav-text { transition: opacity 0.2s; }
.sidebar.collapsed:not(:hover) .nav-text { opacity: 0; pointer-events: none; }

.main-content { flex-grow: 1; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; position: relative; }

/* ===== Top Header ===== */
.top-header {
  min-height: 72px; padding: 0 32px; display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}
.creator-tag { font-size: 0.78rem; text-align: right; color: var(--text-muted); line-height: 1.4; }
.creator-tag strong { color: var(--text-main); font-weight: 600; }

/* ===== Pro Split-Screen Workspace (sticky analytics) ===== */
.workspace-container { padding: 32px; width: 100%; margin: 0 auto; max-width: 1680px; padding-bottom: 120px; }
.workspace-grid {
  display: grid;
  grid-template-columns: minmax(340px, 520px) minmax(380px, 1fr);
  gap: 32px;
  align-items: start;
}
@media (max-width: 1024px) {
  .workspace-grid { grid-template-columns: 1fr; gap: 16px; }
}

.fp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow-card);
  transition: box-shadow 0.2s;
}
.fp-card:hover { box-shadow: var(--shadow-md); }
.section-title { font-size: 0.83rem; font-weight: 700; color: var(--text-main); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; letter-spacing: -0.01em; }

/* ===== Inputs & Forms (Finpilot Style) ===== */
.command-center { display: flex; flex-direction: column; gap: 24px; }
.form-grid { display: grid; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; position: relative; }
.form-group label { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); }
input[type=text], input[type=number], input[type=date], select {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text-main); font-size: 0.93rem;
  outline: none; transition: all 0.2s; font-family: inherit;
}
input:focus, select:focus {
  border-color: var(--primary);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--ring);
}
.tenure-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* Buttons & Toggles */
.btn-primary {
  width: 100%; padding: 12px 20px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
  color: #fff; border: none; border-radius: var(--radius-sm);
  font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(13,148,136,0.3);
  letter-spacing: 0.01em;
}
.btn-primary:hover { filter: brightness(1.08); box-shadow: 0 4px 16px rgba(13,148,136,0.4); transform: translateY(-1px); }
.btn-primary:active { transform: scale(0.98); }
.btn-secondary { background: var(--surface); color: var(--text-main); border: 1px solid var(--border); padding: 8px 16px; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow-sm); }
.btn-secondary:hover { background: var(--surface-hover); }

/* ROI Pulsing Visualizer */
.roi-pulse { animation: pulseGreen 1.5s ease-out; border-color: var(--accent) !important; background: var(--surface) !important; }
@keyframes pulseGreen { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

/* iOS Segmented Control */
.segmented-control { display: flex; background: var(--bg); padding: 3px; border-radius: var(--radius-sm); border: 1px solid var(--border); gap: 2px; }
.seg-btn { flex: 1; padding: 6px 8px; text-align: center; font-size: 0.74rem; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 5px; transition: all 0.18s; user-select: none; }
.seg-btn.active { background: var(--primary); color: #fff; box-shadow: 0 1px 4px rgba(13,148,136,0.3); }

/* Switches */
.toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
.toggle-label { font-size: 0.85rem; font-weight: 500; color: var(--text-main); }
.ios-toggle { position: relative; width: 40px; height: 22px; appearance: none; outline: none; background: #cbd5e1; border-radius: 20px; cursor: pointer; transition: 0.3s; margin: 0; }
.ios-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: var(--shadow-sm); }
.ios-toggle:checked { background: linear-gradient(135deg, var(--accent), #0891b2); }
.ios-toggle:checked::after { transform: translateX(18px); }

/* KPIs & Tables */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 20px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.18s, box-shadow 0.18s;
  position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  opacity: 0.6; border-radius: var(--radius-md) var(--radius-md) 0 0;
}
.kpi-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.kpi-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; }
.kpi-val { font-size: 1.75rem; font-weight: 800; margin-top: 6px; letter-spacing: -1.5px; color: var(--text-main); font-family: 'JetBrains Mono', monospace; }

.table-wrap { overflow-x: auto; max-height: 500px; border-radius: var(--radius-md); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th { background: linear-gradient(135deg, #f8f7ff 0%, #f0f4ff 100%); padding: 11px 14px; text-align: left; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; position: sticky; top: 0; border-bottom: 1px solid var(--border); color: var(--primary); z-index: 2; }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-main); }
.num { font-family: 'JetBrains Mono', 'Courier New', monospace; font-variant-numeric: tabular-nums; font-size: 0.9em; }
.text-warn { color: var(--warn); font-weight: 600; }
.text-accent { color: var(--accent); font-weight: 600; }

/* Visual Progress Bar */
.viz-bar { display: flex; height: 12px; border-radius: 6px; overflow: hidden; background: var(--surface-hover); }
.viz-segment { height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
.viz-legend { display: flex; gap: 16px; font-size: 0.75rem; margin-top: 12px; font-weight: 500; justify-content: center; color: var(--text-muted); }
.viz-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: -1px; }

/* FY Chips */
.fy-chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.fy-chip { background: var(--surface-hover); border: 1px solid transparent; padding: 6px 12px; border-radius: 16px; font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: 0.2s; color: var(--text-muted); }
.fy-chip:has(input:checked) { background: var(--primary); color: var(--primary-fg); font-weight: 600; }
.fy-chip input { display: none; }

/* ===== Floating Utility Dock ===== */
.floating-dock {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.88);
  border: 1px solid rgba(13,148,136,0.2); border-radius: 30px;
  padding: 7px 10px; display: flex; gap: 4px; z-index: 1000;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(13,148,136,0.18), 0 0 0 1px rgba(13,148,136,0.08);
}
.dock-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent;
  color: var(--text-muted); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: all 0.18s; position: relative;
}
.dock-btn:hover {
  background: var(--primary-light); color: var(--primary);
  transform: translateY(-2px); box-shadow: 0 4px 12px rgba(13,148,136,0.2);
}
.dock-tooltip {
  position: absolute; top: -36px; left: 50%; transform: translateX(-50%); background: var(--primary);
  color: var(--primary-fg); font-size: 0.7rem; padding: 4px 8px; border-radius: 6px;
  opacity: 0; pointer-events: none; transition: 0.2s; white-space: nowrap; font-weight: 500;
}
.dock-btn:hover .dock-tooltip { opacity: 1; transform: translate(-50%, -4px); }

/* Modal / Overlay */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 2000;
}
.modal-content { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 400px; box-shadow: var(--shadow-lg); }

/* Tooltip & Helper Text */
.helper-text { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }
.info-icon { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: var(--border); color: var(--text-muted); font-size: 0.6rem; font-weight: bold; cursor: help; margin-left: 6px; }

/* Toast Notification */
.toast {
  position: fixed; bottom: 90px; right: 24px; background: var(--surface); border-left: 4px solid var(--warn);
  padding: 16px; border-radius: var(--radius-sm); box-shadow: var(--shadow-lg);
  transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
}
.toast.show { transform: translateX(0); }

/* ===== Structural Classes — Previously Undefined ===== */

/* Command Center: gives every module's input panel a consistent card shell */
.command-center {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow-md);
  gap: 20px;   /* override inline gap:24px for tighter feel */
}

/* Input Section: visually groups related fields within a command card */
.input-section {
  background: linear-gradient(135deg, #ffffff 0%, var(--primary-light) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 20px;
}
.input-section .section-title { margin-bottom: 12px; }

/* Results Area: vertical stack — sticky “analytics pane” on desktop */
.results-area {
  display: flex;
  flex-direction: column;
  gap: 24px;
  min-width: 0;
  position: sticky;
  top: 80px;
  align-self: start;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.results-area::-webkit-scrollbar { width: 4px; }
.results-area::-webkit-scrollbar-track { background: transparent; }
.results-area::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--primary), var(--accent)); border-radius: 99px; }
@media (max-width: 1024px) {
  .results-area {
    position: static;
    max-height: none;
    overflow: visible;
    padding-right: 0;
  }
}

/* Pro chart strip inside results */
.pro-charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
@media (max-width: 768px) { .pro-charts-row { grid-template-columns: 1fr; } }
.pro-svg-chart { max-width: 100%; overflow: visible; }
.pro-svg-chart-wrap { overflow-x: auto; padding-bottom: 4px; }

/* ── Advanced EMI Tab UI ── */
.aemi-tab { transition: color .15s, border-color .15s; }
.aemi-tab:hover { color: var(--text-main) !important; background: var(--surface-hover); }
.aemi-tab.active { background: var(--surface) !important; }
.pro-svg-chart path.slice { cursor: pointer; transition: opacity 0.15s, transform 0.15s; transform-origin: center; }
.pro-svg-chart path.slice:hover { opacity: 0.88; }
.pro-svg-chart rect.bar-seg { transition: opacity 0.15s; cursor: pointer; }
.pro-svg-chart rect.bar-seg:hover { opacity: 0.88; }

/* Ledger Box wrapper */
.ledger-box { border-radius: var(--radius-lg); overflow: visible; }

/* Pitchbook Header — Goal Planner & SSY hero block */
.pitchbook-header {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff;
  border-radius: var(--radius-lg);
  padding: 40px 32px;
  text-align: center;
  box-shadow: var(--shadow-md);
  margin-bottom: 0;
}
.pitchbook-header h1 {
  font-size: 2rem; font-weight: 800; letter-spacing: -1px;
  margin-bottom: 8px; color: var(--primary-fg) !important;
}
.pitchbook-header p { color: rgba(255,255,255,0.75) !important; }

/* Print Header & Footer — hidden on screen */
.print-header { display: none; }
.print-footer  { display: none; }

/* Two-column scenario grid — collapses to 1 col on mobile */
.two-col-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 768px) { .two-col-grid { grid-template-columns: 1fr; } }

/* Collapsible Advanced Section */
.adv-toggle {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; padding: 4px 0; user-select: none;
  color: var(--text-muted); font-size: 0.8rem; font-weight: 600;
}
.adv-toggle:hover { color: var(--text-main); }
.adv-body { display: none; margin-top: 12px; }
.adv-body.open { display: block; }
.adv-arrow { display: inline-block; transition: transform 0.25s; }
.adv-toggle.open .adv-arrow { transform: rotate(180deg); }

/* Mobile menu button */
.mobile-menu-btn {
  display: none; width: 36px; height: 36px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface); cursor: pointer;
  font-size: 1.1rem; align-items: center; justify-content: center;
  color: var(--text-main); flex-shrink: 0;
}

/* Sidebar overlay (mobile tap-to-close) */
.sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(2px); z-index: 99;
}
.sidebar-overlay.active { display: block; }

/* ===== Responsive Layout ===== */

/* Mid-range 1024–1280px: tighter two-column grid */
@media (max-width: 1280px) {
  .workspace-grid { grid-template-columns: minmax(320px, 360px) 1fr; gap: 20px; }
}

/* Mobile ≤ 768px: sidebar as slide-in drawer */
@media (max-width: 768px) {
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 200; box-shadow: var(--shadow-lg);
    width: var(--sidebar-width) !important;
  }
  .sidebar.mobile-open { transform: translateX(0); }
  /* Disable hover-expand and collapsed-shrink on mobile */
  .sidebar.collapsed { width: var(--sidebar-width) !important; }
  .sidebar.collapsed:not(:hover) .sidebar-title,
  .sidebar.collapsed:not(:hover) .nav-category,
  .sidebar.collapsed:not(:hover) .nav-text { opacity: 1; pointer-events: auto; }
  .mobile-menu-btn { display: flex; }
  .workspace-container { padding: 16px; padding-bottom: 120px; }
  .workspace-grid { grid-template-columns: 1fr; gap: 16px; }
  .top-header { padding: 0 16px; gap: 8px; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .floating-dock { padding: 6px; gap: 4px; }
  .dock-btn { width: 38px; height: 38px; font-size: 1rem; }
  .command-center { padding: 20px; }
  .kpi-val { font-size: 1.3rem !important; }
}

/* ===== Dual Print Engine ===== */
@media print {
  /* ── Layout ── */
  body { background:#fff !important; color:#000 !important; height:auto; overflow:visible; display:block; font-size:11pt; }
  .fp-print-disclaimer { display:block !important; }
  .no-print, .sidebar, .top-header, .floating-dock,
  .aemi-tab-bar, #aemi-tab-bar, .module-reset-btn, .btn-secondary { display:none !important; }
  .main-content { overflow:visible; height:auto; display:block; }
  .workspace-container { padding:0; max-width:100%; padding-bottom:0 !important; }
  .workspace-grid { display:block !important; grid-template-columns:1fr !important; }
  .command-center { display:none !important; } /* Hide input panels on print */

  /* ── Cards & Results ── */
  .fp-card { border:1px solid #ccc !important; box-shadow:none !important; border-radius:0 !important;
    margin-bottom:16px; page-break-inside:avoid; break-inside:avoid; }
  .results-area { position:static !important; max-height:none !important; overflow:visible !important; padding-right:0 !important; }
  .kpi-row { grid-template-columns:repeat(4,1fr) !important; gap:8px !important; page-break-inside:avoid; }
  .kpi-card { border:1px solid #ddd !important; page-break-inside:avoid; break-inside:avoid; }
  .kpi-label { color:#555 !important; font-size:8pt !important; }
  .kpi-val { color:#000 !important; font-size:14pt !important; }

  /* ── Tables — always full height ── */
  .table-wrap { max-height:none !important; height:auto !important; overflow:visible !important; border:none !important; }
  table { border:1px solid #000; border-collapse:collapse; width:100%; font-size:9pt; }
  th { background:#f0f0f0 !important; color:#000 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; font-size:8pt !important; padding:6px 8px !important; }
  td { padding:5px 8px !important; border-bottom:1px solid #ddd; }
  td, th { page-break-inside:avoid; }
  .kpi-card::before { display: none !important; }
  .kpi-card { border: 1px solid #ddd !important; border-top: 2px solid #666 !important; }
  .btn-primary { background: #333 !important; box-shadow: none !important; }
  tr { page-break-inside:avoid; break-inside:avoid; }

  /* ── Show ALL aemi tab panels on print ── */
  .aemi-panel { display:block !important; page-break-before:auto; }
  #aemi-panel-amortisation, #aemi-panel-yearwise, #aemi-panel-compare { page-break-before:always; }

  /* ── SVG / Charts ── */
  svg { overflow:visible !important; }
  .pro-svg-chart-wrap { overflow:visible !important; }

  /* ── Special sections ── */
  .input-section { border:1px solid #ddd !important; background:#fff !important; }
  .pitchbook-header { background:#0f172a !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .print-header { display:block; padding-bottom:16px; border-bottom:2px solid #000; margin-bottom:16px; }
  .print-footer { display:flex; justify-content:space-between; margin-top:32px; padding-top:12px; border-top:1px solid #ccc; font-size:8pt; color:#555; }
  .pdf-brand-header { display:block !important; }
  .pdf-watermark { display:block !important; }

  /* ── Two-col grids collapse to 1-col ── */
  .two-col-grid, .pro-charts-row, .sgb-dual-bar { grid-template-columns:1fr !important; }
  #aemi-scenarios { grid-template-columns:1fr !important; }
  #aemi-headline-strip { grid-template-columns:1fr 1fr !important; }
}

/* ── Inline Validation ── */
input.input-error, select.input-error { border-color: var(--warn) !important; box-shadow: 0 0 0 2px rgba(239,68,68,.15); }
.validate-msg { font-size: 0.72rem; color: var(--warn); margin-top: 3px; }

/* ── Accessibility: focus-visible outlines for keyboard users ── */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
button:focus:not(:focus-visible), input:focus:not(:focus-visible), select:focus:not(:focus-visible) { outline: none; }
.skip-link { position: absolute; top: -40px; left: 8px; padding: 6px 12px; background: var(--accent); color: #fff; border-radius: 6px; font-weight: 600; font-size: 0.85rem; z-index: 9999; transition: top 0.2s; }
.skip-link:focus { top: 8px; }

/* Pro — urgency flash (Lazy Money module) */
@keyframes proFlashRed { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
.pro-flash-red { animation: proFlashRed 0.95s infinite; color: var(--warn); font-weight: 900; }

/* ── Shortcuts + Print Settings Modal ── */
#shortcuts-modal, #print-settings-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1100; align-items:center; justify-content:center; }
#shortcuts-modal.open, #print-settings-modal.open { display:flex; }

/* ── Hindi Language Mode ── */
body.hindi-mode [data-en] { display:none !important; }
body:not(.hindi-mode) [data-hi] { display:none !important; }
[data-en],[data-hi] { display:inline; }

/* ── Advanced EMI Module — Full width override ── */
.aemi-full-layout { grid-template-columns: 1fr !important; gap: 20px !important; }
.aemi-full-layout .command-center {
  max-width: 100% !important;
  display: grid !important;
  grid-template-columns: 1fr 1fr !important;
  gap: 16px !important;
  align-items: start !important;
}
.aemi-full-layout .command-center > .input-section:first-child,
.aemi-full-layout .command-center > button {
  grid-column: 1 / -1 !important;
}
.aemi-full-layout #aemi-scenarios {
  grid-template-columns: 1fr 1fr !important;
}
.aemi-full-layout .results-area {
  max-width: 100% !important;
  grid-column: 1 / -1 !important;
}
@media (max-width: 900px) {
  .aemi-full-layout .command-center { grid-template-columns: 1fr !important; }
  .aemi-full-layout #aemi-scenarios { grid-template-columns: 1fr !important; }
}
.aemi-ctrl-label { font-size:.72rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.aemi-tab { transition: color .15s, border-color .15s; white-space:nowrap; }
.aemi-tab:hover { color: var(--text-main) !important; background: var(--surface-hover); }
.aemi-tab.active { background: var(--surface) !important; }
.aemi-scen-btn { transition: all .18s; }
.amort-year-row { cursor:pointer; }
.amort-year-row:hover td { background:var(--surface-hover); }
.amort-expand-row { display:none; }
.amort-expand-row.open { display:table-row; }
.emi-opp-panel { background:linear-gradient(135deg,rgba(16,185,129,.06) 0%,rgba(2,132,199,.06) 100%); border:1px solid rgba(16,185,129,.25); border-radius:var(--radius-md); padding:20px; }

/* ── FD Matrix ── */
.matrix-table { min-width:600px; } .matrix-table th { font-size:0.75rem; white-space:nowrap; }
.rate-badge { display:inline-block; background:var(--primary); color:var(--primary-fg); border-radius:20px; padding:2px 10px; font-size:0.72rem; font-weight:700; }
.apy-badge { display:inline-block; background:rgba(16,185,129,.15); color:var(--accent); border-radius:20px; padding:2px 10px; font-size:0.72rem; font-weight:700; }
.yield-card { border-left:4px solid var(--accent); padding:16px 20px; background:rgba(16,185,129,.04); border-radius:0 var(--radius-sm) var(--radius-sm) 0; }

/* ── SGB Module ── */
.sgb-dual-bar { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.sgb-vs-card { border-radius:var(--radius-md); padding:20px; text-align:center; }
.sgb-vs-card.winner { border:2px solid var(--accent); background:rgba(16,185,129,.05); }
.sgb-vs-card.loser  { border:1px solid var(--border); background:var(--surface-hover); opacity:.85; }
.sgb-payout-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:.85rem; }

/* ── NPS Planner ── */
.nps-tier { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.tax-pill { display:inline-block; padding:4px 12px; border-radius:12px; font-size:.75rem; font-weight:700; }
.tax-pill.green { background:rgba(16,185,129,.12); color:var(--accent); }
.tax-pill.blue  { background:rgba(2,132,199,.12); color:#0284c7; }
.nps-split-bar { height:28px; border-radius:8px; overflow:hidden; display:flex; margin:8px 0; }
.nps-split-seg { display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:700; color:#fff; transition:width .8s; }

/* ── CRM Vault ── */
.crm-client-row { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); transition:.2s; cursor:pointer; }
.crm-client-row:hover { background:var(--surface-hover); }
.crm-avatar { width:38px; height:38px; border-radius:50%; background:var(--primary); color:var(--primary-fg); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; flex-shrink:0; }
.crm-empty { text-align:center; padding:48px 24px; color:var(--text-muted); }
.crm-tag { display:inline-block; background:var(--surface-hover); border:1px solid var(--border); border-radius:12px; padding:2px 10px; font-size:.72rem; font-weight:600; margin:2px; }

/* ── Portfolio Dashboard ── */
.port-alloc-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.port-alloc-bar { flex:1; height:8px; border-radius:4px; overflow:hidden; background:var(--border); }
.port-alloc-fill { height:100%; border-radius:4px; transition:width .8s; }
.port-risk-meter { display:flex; gap:4px; margin-top:8px; }
.port-risk-seg { flex:1; height:10px; border-radius:3px; }

/* ── PDF Branding ── */
@media print {
  .pdf-brand-header { display:block !important; padding:16px 0 14px; border-bottom:3px solid #0f172a; margin-bottom:18px; }
  .pdf-watermark { display:block !important; position:fixed; bottom:20px; right:24px; font-size:.7rem; color:#999; }
}
.pdf-brand-header, .pdf-watermark { display:none; }
.fp-print-disclaimer { display:none; }
@media print {
  .fp-print-disclaimer {
    display: block !important;
    margin: 28px 0 0;
    padding: 14px 18px;
    border: 1px solid #ccc;
    border-left: 4px solid #0d9488;
    border-radius: 0;
    font-size: 8.5pt;
    line-height: 1.65;
    color: #444;
    background: #fafafa;
    page-break-inside: avoid;
  }
  .fp-print-disclaimer strong { color: #0d9488; }
}

/* ── Print Meta Bar (screen: hidden; print: visible) ── */
.print-meta-bar { display:none; padding:14px 0 12px; border-bottom:2px solid #0f172a; margin-bottom:20px; }
@media print { .print-meta-bar { display:block !important; } }
.shortcuts-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 32px; min-width:320px; max-width:90vw; box-shadow:var(--shadow); }
.shortcuts-card h3 { margin:0 0 18px; font-size:1rem; color:var(--primary); }
.shortcut-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.85rem; }
.shortcut-row:last-child { border-bottom:none; }
.shortcut-key { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:2px 8px; font-family:monospace; font-size:0.8rem; color:var(--primary); }

html[data-theme="dark"] .seg-btn.active { background: var(--primary); color: #fff; }
html[data-theme="dark"] .input-section { background: rgba(13,148,136,0.06); }
html[data-theme="dark"] .fp-card { background: var(--surface); border-color: var(--border); }
html[data-theme="dark"] .sidebar { background: linear-gradient(180deg, #1a1a2e 0%, #12122a 100%); }
html[data-theme="dark"] body { background-image: radial-gradient(circle at 20% 20%, rgba(13,148,136,0.08) 0%, transparent 50%); }
html[data-theme="dark"] th { background: linear-gradient(135deg, #0f3d3a 0%, #1a1a2e 100%); color: var(--primary); }
</style>
</head>
