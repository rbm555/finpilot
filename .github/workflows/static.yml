function calculateRateShock() {
  const P = U.parse(U.$('#shock-p').value);
  const N = U.parse(U.$('#shock-n').value);
  const R0 = U.parse(U.$('#shock-r0').value);
  const R1 = U.parse(U.$('#shock-r1').value);

  const inputs = U.$('#shock-inputs');
  U.clearErrors(inputs);
  let err = false;
  if (P <= 0) { U.setError(U.$('#shock-p'), 'Principal must be > 0'); err = true; }
  if (N <= 0) { U.setError(U.$('#shock-n'), 'Tenure must be >= 1'); err = true; }
  if (R0 <= 0) { U.setError(U.$('#shock-r0'), 'Rate must be > 0'); err = true; }
  if (R1 <= 0) { U.setError(U.$('#shock-r1'), 'Rate must be > 0'); err = true; }
  if (err) return;

  const r0 = (R0 / 100) / 12;
  const r1 = (R1 / 100) / 12;

  const emi0 = P * r0 * Math.pow(1 + r0, N) / (Math.pow(1 + r0, N) - 1);
  const int0 = (emi0 * N) - P;

  const emiSameTenure = P * r1 * Math.pow(1 + r1, N) / (Math.pow(1 + r1, N) - 1);
  const intSameTenure = (emiSameTenure * N) - P;

  // Tenure if EMI is held constant at emi0 but rate becomes r1
  let bal = P;
  let nNew = 0;
  let intTenExt = 0;
  while (bal > 0.01 && nNew < 1200) {
    nNew++;
    const ip = bal * r1;
    let pp = emi0 - ip;
    if (pp < 0) pp = 0;
    if (pp > bal) pp = bal;
    intTenExt += ip;
    bal -= pp;
  }

  const extraInt = Math.max(0, intTenExt - intSameTenure);

  U.animateKpiRupee(U.$('#shock-out-emi0'), emi0, { decimals: 0 });
  U.animateKpiRupee(U.$('#shock-out-emi1'), emiSameTenure, { decimals: 0 });
  U.$('#shock-out-ten').textContent = `${nNew} mo`;
  U.animateKpiRupee(U.$('#shock-out-xint'), extraInt, { decimals: 0 });

