}

function calculateBreakBorrow() {
  const P       = U.parse(U.$('#bb-p').value);
  const R       = U.parse(U.$('#bb-r').value);       // original booking rate
  const applR   = U.parse(U.$('#bb-appl').value);    // applicable rate for completed period
  const runM    = U.parse(U.$('#bb-run').value);
  const pen     = U.parse(U.$('#bb-pen').value);
  const needAmt = U.parse(U.$('#bb-need').value);
  const remM    = U.parse(U.$('#bb-rem').value);
  const odR     = U.parse(U.$('#bb-od').value);
  
  if(P<=0 || runM<=0 || needAmt<=0) return;

  // LTV Validation Guard
  const maxLTV = parseFloat(U.$('#bb-ltv-val').dataset.max);
  if (needAmt > maxLTV) {
      U.showToast(`Requested OD (₹${U.fmt(needAmt)}) exceeds maximum 90% LTV limit (₹${U.fmt(maxLTV)}).`, true);
      U.$('#bb-need').style.borderColor = 'var(--warn)';
      setTimeout(() => U.$('#bb-need').style.borderColor = 'transparent', 3000);
      return; 
  }

  // Scenario A: Break Loss — quarterly compounding mirrors actual FD accrual
  // origInt: what the FD earned at the booking rate (what you expected to receive)
  // actInt:  what the bank actually pays out:
  //          applicable slab rate for the completed period MINUS the premature penalty
  const quarters = runM / 3;
  const origInt  = P * (Math.pow(1 + (R    / 400), quarters) - 1); // at booking rate
  const revRate  = Math.max(0, applR - pen);                         // applicable rate − penalty
  const actInt   = P * (Math.pow(1 + (revRate / 400), quarters) - 1);
  const breakLoss = origInt - actInt;

  // Scenario B: OD Cost
  const odCost = needAmt * (odR/100) * (remM/12);

  // Render Scenario A
  U.$('#bb-a-orig').textContent = `₹${U.fmt(origInt)}`;
  U.$('#bb-a-rev-rate').textContent = `${applR.toFixed(2)}% − ${pen}% = ${revRate.toFixed(2)}%`;
  U.$('#bb-a-actual').textContent = `₹${U.fmt(actInt)}`;
  U.$('#bb-a-loss').textContent = `₹${U.fmt(breakLoss)}`;

  // Render Scenario B
  U.$('#bb-b-amt').textContent = `₹${U.fmt(needAmt)}`;
  U.$('#bb-b-rate').textContent = `${odR.toFixed(2)}%`;
  U.$('#bb-b-dur').textContent = `${remM} Mos`;
  U.$('#bb-b-cost').textContent = `₹${U.fmt(odCost)}`;

  // The Verdict Logic (Finpilot UI Updates)
  const badge = U.$('#bb-result-badge');
  const sub = U.$('#bb-result-sub');
  
  if (breakLoss > odCost) {
     const saved = breakLoss - odCost;
     badge.style.borderColor = 'var(--accent)';
     badge.style.color = 'var(--accent)';
     badge.style.background = 'rgba(16, 185, 129, 0.05)';
     badge.innerHTML = `TAKE OD. Do Not Break FD.`;
     sub.innerHTML = `Breaking the FD triggers a strict penalty. By taking a Demand Loan/OD for ${remM} months, the client preserves their high-yield compounding and <strong style="color:var(--text-main);">saves ₹${U.fmt(saved)}</strong> in net wealth.`;
  } else {
     const saved = odCost - breakLoss;
     badge.style.borderColor = 'var(--warn)';
     badge.style.color = 'var(--warn)';
     badge.style.background = 'rgba(239, 68, 68, 0.05)';
     badge.innerHTML = `BREAK FD. Loan is Costlier.`;
     sub.innerHTML = `Because the loan amount or duration is significant, paying the OD interest out-of-pocket will cost the client <strong style="color:var(--text-main);">₹${U.fmt(saved)} more</strong> than simply taking the premature penalty hit today.`;
  }
}

