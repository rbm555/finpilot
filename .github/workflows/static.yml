function calculateProHarvestModule() {
  const gain = U.parse(U.$('#harv-gain').value);
  const years = U.parse(U.$('#harv-years').value);
  const cap = U.parse(U.$('#harv-cap').value);
  const taxRate = U.parse(U.$('#harv-tax').value);

  const inputsRoot = U.$('#pro-harvest-inputs');
  U.clearErrors(inputsRoot);

  let hasError = false;
  if (gain <= 0) { U.setError(U.$('#harv-gain'), 'Enter total gains > 0'); hasError = true; }
  if (years <= 0) { U.setError(U.$('#harv-years'), 'Years must be >= 1'); hasError = true; }
  if (cap < 0) { U.setError(U.$('#harv-cap'), 'Cap must be >= 0'); hasError = true; }
  if (taxRate < 0) { U.setError(U.$('#harv-tax'), 'Tax rate must be >= 0'); hasError = true; }
  if (hasError) return;

  const lazyTaxable = Math.max(0, gain - cap);
  const lazyTax = lazyTaxable * (taxRate / 100);

  const yearGain = gain / years;
  const activeTaxablePerYear = Math.max(0, yearGain - cap);
  const activeTax = activeTaxablePerYear * (taxRate / 100) * years;

  const saved = Math.max(0, lazyTax - activeTax);
  const reductionPct = lazyTax > 0 ? (saved / lazyTax) * 100 : 0;

  U.animateKpiRupee(U.$('#harv-out-lazy-tax'), lazyTax, { decimals: 0 });
  U.animateKpiRupee(U.$('#harv-out-active-tax'), activeTax, { decimals: 0 });
  U.animateKpiRupee(U.$('#harv-out-saved'), saved, { decimals: 0 });
  U.$('#harv-out-reduction').textContent = reductionPct.toFixed(1) + '%';

  function proAnimateSvgBars(container, items, { durationMs = 700, width = 340 } = {}) {
    if (!container) return;
    // Clear immediately so the latest "Run" shows correct initial state
    container.innerHTML = '';
    // Cancel any previous animation running on the same container
    const gen = container._proSvgAnimGen = (container._proSvgAnimGen || 0) + 1;
    const start = performance.now();
    const ease = x => 1 - Math.pow(1 - x, 3);
    function frame(now) {
      if (container._proSvgAnimGen !== gen) return;
      const t = Math.min(1, (now - start) / durationMs);
      const s = ease(t);
      const scaled = items.map(it => ({ ...it, value: (Number(it.value) || 0) * s }));
      U.svgBarChart(container, scaled, { width, barHeight: 26, gap: 10, labelWidth: 155 });
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  const fmtR = v => '₹' + U.fmt(v, 0);
  proAnimateSvgBars(U.$('#harv-tax-chart'), [
    { label: 'Lazy Hold Tax', value: lazyTax, color: 'var(--warn)', format: fmtR },
    { label: 'Active Churn Tax', value: activeTax, color: 'var(--accent)', format: fmtR }
  ], { durationMs: 740, width: 360 });
}

