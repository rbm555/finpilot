              <button class="aemi-yr-tab" data-scen="a" style="padding:4px 14px;border-radius:16px;border:2px solid var(--primary);background:var(--primary);color:#fff;font-size:.73rem;font-weight:700;cursor:pointer;">Scenario A</button>
              <button class="aemi-yr-tab" data-scen="b" style="padding:4px 14px;border-radius:16px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-size:.73rem;font-weight:700;cursor:pointer;">Scenario B</button>
            </div>
            <button class="btn-secondary" onclick="exportCSV('AdvEMI_Yearwise')" style="font-size:.72rem;">📥 CSV</button>
          </div>
          <div style="padding:14px 16px;overflow-x:auto;" id="aemi-yr-chart"></div>
          <div class="table-wrap" id="aemi-year-table" style="border:none;border-radius:0;overflow-x:auto;"></div>
        </div>

        <!-- COMPARE TAB -->
        <div class="aemi-panel" id="aemi-panel-compare" style="display:none; padding:18px;">
          <div style="font-size:.78rem;font-weight:700;color:var(--text-main);margin-bottom:12px;">All Methods &amp; Frequencies — Side by Side</div>
          <div id="aemi-compare-grid" style="overflow-x:auto; margin-bottom:22px;"><div></div></div>
          <div style="padding-top:18px;border-top:1px solid var(--border);">
            <div class="section-title" style="color:var(--primary);margin-bottom:12px;font-size:.82rem;">⚖️ Opportunity Cost — Scenario A</div>
            <div class="two-col-grid">
              <div class="fp-card" style="border-top:4px solid var(--primary); padding:18px;">
                <div style="font-size:.7rem;font-weight:800;text-transform:uppercase;color:var(--primary);margin-bottom:8px;">Prepay Loan</div>
                <div style="font-size:.82rem;line-height:2.2;color:var(--text-muted);">
                  Interest Saved: <strong id="aemi-opp-saved" style="float:right;color:var(--primary);font-size:1rem;">₹0</strong><br>
                  Tenure Cut By: <strong id="aemi-opp-time" style="float:right;color:var(--primary);">0 mo</strong>
                </div>
              </div>
              <div class="fp-card" style="border-top:4px solid var(--accent); padding:18px;">
                <div style="font-size:.7rem;font-weight:800;text-transform:uppercase;color:var(--accent);margin-bottom:8px;">Invest the Extra</div>
                <div style="font-size:.82rem;line-height:2.2;color:var(--text-muted);">
                  Corpus at End: <strong id="aemi-opp-corpus" style="float:right;color:var(--accent);font-size:1rem;">₹0</strong><br>
                  Net Advantage: <strong id="aemi-opp-delta" style="float:right;color:var(--accent);">₹0</strong>
                </div>
              </div>
            </div>
            <div id="aemi-opp-verdict" style="margin-top:10px;padding:12px 16px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;"></div>
          </div>
        </div>

        <!-- PRINT PREVIEW TAB -->
        <div class="aemi-panel" id="aemi-panel-print-preview" style="display:none; padding:20px;">
          <div style="display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap;" class="no-print">
            <button class="btn-primary" onclick="window.print()" style="flex:1; min-width:140px; font-size:.85rem;">🖨️ Print Full Report</button>
            <button class="btn-secondary" onclick="saveForClient()" style="flex:1; min-width:140px; font-size:.85rem;">💾 Save for Client</button>
          </div>
          <!-- Print-ready report -->
          <div id="aemi-print-report" style="font-size:.85rem; line-height:1.8;"></div>
        </div>

      </div><!-- /tabs card -->
    </div><!-- /results-area -->`;

  // ── Format inputs ──
  ['aemi-a-p','aemi-b-p','aemi-extra'].forEach(id => { const el=U.$(`#${id}`,container); if(el) U.bindFormat(el); });

  // ── Tab switching ──
  U.$$('.aemi-tab',container).forEach(tab => {
    tab.addEventListener('click', () => {
      U.$$('.aemi-tab',container).forEach(t => { t.classList.remove('active'); t.style.color='var(--text-muted)'; t.style.borderBottomColor='transparent'; t.style.borderBottomWidth='2px'; t.style.fontWeight='600'; });
      tab.classList.add('active'); tab.style.color='var(--primary)'; tab.style.borderBottomColor='var(--primary)'; tab.style.borderBottomWidth='2.5px'; tab.style.fontWeight='700';
      U.$$('.aemi-panel',container).forEach(p => p.style.display='none');
      const panel = U.$(`#aemi-panel-${tab.dataset.tab}`,container);
      if (panel) panel.style.display='';
      if (tab.dataset.tab === 'print-preview') renderAemiPrintReport();
    });
  });

  // ── Method / reduce toggles per scenario ──
  ['a','b'].forEach(s => {
    const methodBar = U.$(`#aemi-${s}-method`,container);
    const reduceWrap = U.$(`#aemi-${s}-reduce-wrap`,container);
    if (methodBar) methodBar.addEventListener('click', e => {
      if (!e.target.classList.contains('seg-btn')) return;
      U.$$('.seg-btn',methodBar).forEach(b=>b.classList.remove('active'));
      e.target.classList.add('active');
      const isFlat = e.target.dataset.val==='flat';
      if (reduceWrap) { reduceWrap.style.opacity=isFlat?'.3':'1'; reduceWrap.style.pointerEvents=isFlat?'none':''; }
      _aemiUpdateScenHint(s); calculateAdvEMI();
    });
    const reduceBar = U.$(`#aemi-${s}-reduce`,container);
    if (reduceBar) reduceBar.addEventListener('click', e => {
      if (!e.target.classList.contains('seg-btn')) return;
      U.$$('.seg-btn',reduceBar).forEach(b=>b.classList.remove('active'));
      e.target.classList.add('active');
      _aemiUpdateScenHint(s); calculateAdvEMI();
    });
  });

  // ── Freq bar ──
  const freqBar = U.$('#aemi-freq-bar',container);
  if (freqBar) freqBar.addEventListener('click', e => {
    if (!e.target.classList.contains('seg-btn')) return;
    U.$$('.seg-btn',freqBar).forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    calculateAdvEMI();
  });

  // ── Lifecycle scenario switcher ──
  U.$$('.aemi-lc-scen',container).forEach(btn => btn.addEventListener('click', () => {
    U.$$('.aemi-lc-scen',container).forEach(b => {
      b.style.background='transparent';
      b.style.color = b.dataset.scen==='a'?'var(--primary)':b.dataset.scen==='b'?'var(--accent)':'var(--text-muted)';
    });
    const c = btn.dataset.scen==='a'?'var(--primary)':btn.dataset.scen==='b'?'var(--accent)':'var(--text-muted)';
    btn.style.background=c; btn.style.color='#fff';
    renderAemiLifecycle(btn.dataset.scen);
  }));

  // ── Amortisation scenario switcher ──
  U.$('#aemi-panel-amortisation',container).addEventListener('click', e => {
    const btn = e.target.closest('.aemi-scen-tab'); if (!btn) return;
    U.$$('.aemi-scen-tab',U.$('#aemi-panel-amortisation',container)).forEach(b => {
      b.style.background='transparent'; b.style.color=b.dataset.scen==='a'?'var(--primary)':'var(--accent)';
    });
    const c2=btn.dataset.scen==='a'?'var(--primary)':'var(--accent)';
    btn.style.background=c2; btn.style.color='#fff';
    renderAdvEMIAmortTable(btn.dataset.scen, U.$('#aemi-toggle-full',container)?._showFull||false);
  });

  // ── Year-wise scenario switcher ──
  U.$('#aemi-panel-yearwise',container).addEventListener('click', e => {
    const btn = e.target.closest('.aemi-yr-tab'); if (!btn) return;
    U.$$('.aemi-yr-tab',U.$('#aemi-panel-yearwise',container)).forEach(b => {
      b.style.background='transparent'; b.style.color=b.dataset.scen==='a'?'var(--primary)':'var(--accent)';
    });
    const c3=btn.dataset.scen==='a'?'var(--primary)':'var(--accent)';
    btn.style.background=c3; btn.style.color='#fff';
    renderAdvEMIYearChart(btn.dataset.scen); renderAdvEMIYearTable(btn.dataset.scen);
  });

  // ── Show all months toggle ──
  U.$('#aemi-toggle-full',container).addEventListener('click', function() {
    this._showFull = !this._showFull;
    this.textContent = this._showFull ? 'First 24 Only' : 'Show All Months';
    const activeBtn = U.$('.aemi-scen-tab[style*="#fff"]',U.$('#aemi-panel-amortisation',container));
    renderAdvEMIAmortTable(activeBtn?.dataset?.scen||'a', this._showFull);
  });

  U.$('#aemi-calc',container).onclick = calculateAdvEMI;
  U.$('#aemi-tax',container)?.addEventListener('change', calculateAdvEMI);
  U.$('#aemi-flatwarn',container).addEventListener('change', calculateAdvEMI);
  ['a','b'].forEach(s => { const el=U.$(`#aemi-${s}-tax`,container); if(el) el.addEventListener('change', calculateAdvEMI); });

  _aemiUpdateScenHint('a'); _aemiUpdateScenHint('b');
  setTimeout(calculateAdvEMI, 80);
}

// ══ GLOBAL STORAGE ══
let _aemiRowsA=[], _aemiRowsB=[], _aemiYrA=[], _aemiYrB=[];
let _aemiParamsA={}, _aemiParamsB={};

function toggleAemiTaxToggle(s) {
  const type = U.$(`#aemi-${s}-type`)?.value || 'home';
  const wrap = U.$(`#aemi-${s}-tax-wrap`);
  const lbl  = U.$(`#aemi-${s}-tax-label`);
  const hint = U.$(`#aemi-${s}-tax-hint`);
  if (!wrap) return;
  if (type === 'home') {
    wrap.style.display='block';
    if(lbl) lbl.textContent='Sec 24(b) + 80C Tax Benefit (30% slab)';
    if(hint) hint.innerHTML='Interest ≤ ₹2L (Sec 24b) + Principal ≤ ₹1.5L (Sec 80C). Toggle ON to include estimated annual tax saving.';
  } else if (type === 'education') {
    wrap.style.display='block';
    if(lbl) lbl.textContent='Sec 80E Tax Benefit (entire interest, no cap)';
    if(hint) hint.innerHTML='Full interest on education loan deductible for up to 8 years.';
  } else {
    wrap.style.display='none';
    const chk=U.$(`#aemi-${s}-tax`); if(chk) chk.checked=false;
  }
  calculateAdvEMI();
}
window.toggleAemiTaxToggle = toggleAemiTaxToggle;

function _aemiGetScenParams(s) {
  const method = (U.$('.seg-btn.active',U.$(`#aemi-${s}-method`))||{}).dataset?.val||'reducing';
  const reduce = (U.$('.seg-btn.active',U.$(`#aemi-${s}-reduce`))||{}).dataset?.val||'monthly';
  const freq   = parseInt((U.$('.seg-btn.active',U.$('#aemi-freq-bar'))||{}).dataset?.val||'12');
  return {
    method, reduce, freq,
    P:     U.parse(U.$(`#aemi-${s}-p`)?.value||'0'),
    R:     U.parse(U.$(`#aemi-${s}-r`)?.value||'0'),
    Y:     U.parse(U.$(`#aemi-${s}-y`)?.value||'0'),
    type:  U.$(`#aemi-${s}-type`)?.value||'home',
    label: U.$(`#aemi-${s}-label`)?.value||`Scenario ${s.toUpperCase()}`
  };
}

function _aemiUpdateScenHint(s) {
  const p = _aemiGetScenParams(s);
  const hEl = U.$(`#aemi-${s}-hint`); if (!hEl) return;
  const freqLbl = {12:'monthly',4:'quarterly',2:'half-yearly',1:'annual'}[p.freq]||'monthly';
  if (p.method==='flat') {
    hEl.innerHTML=`⚠️ <strong>Flat Rate</strong> — True reducing-balance equivalent ≈ <strong>${(p.R*1.8).toFixed(2)}%</strong>`;
  } else if (p.reduce==='daily') {
    hEl.innerHTML=`<strong>Daily Reducing</strong> (${freqLbl} compounding) — Interest accrues daily, slightly cheaper than monthly.`;
  } else {
    hEl.innerHTML=`<strong>Monthly Reducing Balance</strong> (${freqLbl} compounding) · EAR = (1 + ${p.R}%/${p.freq})^${p.freq}−1`;
  }
}

function _aemiEngine(P, R, Y, method, reduce, freq) {
  const N = Y * 12;
  if (method==='flat') {
    const totalInt=P*(R/100)*Y, emi=(P+totalInt)/N, mInt=totalInt/N, mPrin=P/N;
    let rows=[], bal=P;
    for(let mo=1;mo<=N;mo++){bal=Math.max(0,bal-mPrin); rows.push({mo,emi:Math.round(emi),interest:Math.round(mInt),principal:Math.round(mPrin),balance:Math.round(bal)});}
    return {emi,totalInt,N,rows,ear:R/100,r:R/100/12};
  }
  const ear=Math.pow(1+(R/100)/freq,freq)-1, rMo=Math.pow(1+ear,1/12)-1;
  const emi=P*rMo*Math.pow(1+rMo,N)/(Math.pow(1+rMo,N)-1);
  let rows=[], bal=P, totalInt=0;
  if (reduce==='daily') {
    const rDay=Math.pow(1+ear,1/365)-1, daysArr=[31,28,31,30,31,30,31,31,30,31,30,31];
    for(let mo=1;mo<=N;mo++){
      const days=daysArr[(mo-1)%12]; let moInt=0,dBal=bal;
      for(let d=0;d<days;d++){const di=dBal*rDay;moInt+=di;dBal+=di;}
      const pp=Math.min(emi-moInt,bal); bal=Math.max(0,bal-Math.max(0,pp)); totalInt+=moInt;
      rows.push({mo,emi:Math.round(emi),interest:Math.round(moInt),principal:Math.round(Math.max(0,pp)),balance:Math.round(bal)});
    }
  } else {
    for(let mo=1;mo<=N;mo++){
      const ip=bal*rMo, pp=Math.min(emi-ip,bal); bal=Math.max(0,bal-pp); totalInt+=ip;
      rows.push({mo,emi:Math.round(emi),interest:Math.round(ip),principal:Math.round(Math.max(0,pp)),balance:Math.round(bal)});
    }
  }
  return {emi,totalInt,N,rows,ear,r:rMo};
}

function _aemiTaxSave(P,R,Y,type,emi,r,showTax) {
  if (!showTax) return 0;
  const mR=r||R/100/12, yr1Int=P*mR*12, yr1Prin=emi*12-yr1Int;
  if (type==='home') return (Math.min(yr1Int,200000)+Math.min(yr1Prin,150000))*0.30;
  if (type==='education') return yr1Int*0.30;
  return 0;
}

function _aemiBuildYrRows(rows,Y) {
  return Array.from({length:Y},(_,i)=>{
    const sl=rows.slice(i*12,(i+1)*12);
    return {year:i+1,emi:sl.reduce((s,r)=>s+r.emi,0),interest:sl.reduce((s,r)=>s+r.interest,0),principal:sl.reduce((s,r)=>s+r.principal,0),balance:sl[sl.length-1]?.balance??0};
  });
}

// ══ LIFECYCLE CHART ══
function renderAemiLifecycle(scen) {
  const svg = document.getElementById('aemi-lifecycle-svg');
  const tip = document.getElementById('aemi-lc-tooltip');
  if (!svg) return;

  const dA = _aemiRowsA, dB = _aemiRowsB;
  const pA = _aemiParamsA, pB = _aemiParamsB;
  if (!dA.length && !dB.length) return;

  const W = svg.parentElement?.clientWidth || 600;
  const H = 300, padL=56, padR=24, padT=24, padB=40;
  const cW = W - padL - padR, cH = H - padT - padB;

  const datasets = [];
  if (scen === 'a' || scen === 'both') datasets.push({ rows: dA, color: 'var(--primary)', colorHex: '#0d9488', label: pA.label||'A', P: pA.P||0 });
  if (scen === 'b' || scen === 'both') datasets.push({ rows: dB, color: 'var(--accent)', colorHex: '#0891b2', label: pB.label||'B', P: pB.P||0 });

  const maxBal = Math.max(...datasets.flatMap(d => d.rows.map(r => r.balance)), 1);
  const maxMo  = Math.max(...datasets.map(d => d.rows.length), 1);

  const xScale = mo => padL + (mo / maxMo) * cW;
  const yScale = v  => padT + cH - (v / maxBal) * cH;

  let svgContent = `<defs>`;
  datasets.forEach((d, di) => {
    svgContent += `<linearGradient id="lcGrad${di}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${d.colorHex}" stop-opacity=".25"/>
      <stop offset="100%" stop-color="${d.colorHex}" stop-opacity=".02"/>
    </linearGradient>`;
  });
  svgContent += `</defs>`;

  // Grid lines
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const v = (maxBal / yTicks) * i;
    const y = yScale(v);
    const label = v >= 1e7 ? `₹${(v/1e7).toFixed(1)}Cr` : v >= 1e5 ? `₹${(v/1e5).toFixed(0)}L` : `₹${U.fmt(v,0)}`;
    svgContent += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,3"/>`;
    svgContent += `<text x="${padL-6}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--text-muted)">${label}</text>`;
  }

  // X-axis ticks (every ~2 years)
  const tickInterval = maxMo > 120 ? 24 : maxMo > 60 ? 12 : 6;
  for (let mo = 0; mo <= maxMo; mo += tickInterval) {
    const x = xScale(mo);
    const yr = Math.round(mo/12);
    svgContent += `<line x1="${x.toFixed(1)}" y1="${padT}" x2="${x.toFixed(1)}" y2="${padT+cH}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,4"/>`;
    svgContent += `<text x="${x.toFixed(1)}" y="${padT+cH+16}" text-anchor="middle" font-size="9" fill="var(--text-muted)">Yr ${yr}</text>`;
  }

  // Fill areas + lines
  datasets.forEach((d, di) => {
    if (!d.rows.length) return;
    const pts = d.rows.map((r,i) => `${xScale(i+1).toFixed(1)},${yScale(r.balance).toFixed(1)}`);
    const firstX = xScale(1).toFixed(1), firstY = yScale(d.rows[0].balance).toFixed(1);
    const lastX = xScale(d.rows.length).toFixed(1), baseY = (padT+cH).toFixed(1);
    const fillPath = `M ${firstX} ${firstY} L ${pts.join(' L ')} L ${lastX} ${baseY} L ${firstX} ${baseY} Z`;
    const linePath = `M ${firstX} ${firstY} L ${pts.join(' L ')}`;
    svgContent += `<path d="${fillPath}" fill="url(#lcGrad${di})" />`;
    svgContent += `<path d="${linePath}" fill="none" stroke="${d.colorHex}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;

    // Crossover point: find where interest < principal (inflection)
    let crossMo = -1;
    for (let i = 1; i < d.rows.length; i++) {
      if (d.rows[i].interest < d.rows[i].principal && d.rows[i-1].interest >= d.rows[i-1].principal) {
        crossMo = i+1; break;
      }
    }
    if (crossMo > 0) {
      const cx = xScale(crossMo).toFixed(1), cy = yScale(d.rows[crossMo-1].balance).toFixed(1);
      svgContent += `<circle cx="${cx}" cy="${cy}" r="5" fill="${d.colorHex}" stroke="white" stroke-width="2"/>`;
      svgContent += `<text x="${parseFloat(cx)+10}" y="${parseFloat(cy)-8}" font-size="9" font-weight="700" fill="${d.colorHex}">Yr${(crossMo/12).toFixed(0)} crossover</text>`;
    }
  });

  // Legend
  datasets.forEach((d, di) => {
    const lx = padL + di * 140;
    svgContent += `<rect x="${lx}" y="6" width="14" height="8" rx="3" fill="${d.colorHex}" opacity=".85"/>`;
    svgContent += `<text x="${lx+18}" y="14" font-size="10" font-weight="700" fill="${d.colorHex}">${d.label}</text>`;
  });

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('height', H);
  svg.innerHTML = svgContent;

  // ── Hover tooltip via mousemove on SVG ──
  svg.onmousemove = (e) => {
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const moFrac = (mx - padL) / cW * maxMo;
    if (moFrac < 0 || moFrac > maxMo) { tip.style.display='none'; return; }
    const moIdx = Math.round(moFrac) - 1;

    let html = `<div style="font-weight:700;margin-bottom:6px;color:var(--text-main);">Month ${moIdx+1} — Year ${((moIdx+1)/12).toFixed(1)}</div>`;
    datasets.forEach(d => {
      const r = d.rows[Math.min(moIdx, d.rows.length-1)];
      if (!r) return;
      const pctPaid = (1 - r.balance/(d.P||1))*100;
      html += `<div style="border-left:3px solid ${d.colorHex};padding-left:8px;margin-bottom:8px;">
        <div style="font-weight:700;color:${d.colorHex};font-size:.8rem;">${d.label}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;font-size:.77rem;">
          <span style="color:var(--text-muted);">Balance:</span><span style="font-weight:600;">₹${U.fmt(r.balance,0)}</span>
          <span style="color:var(--text-muted);">EMI:</span><span>₹${U.fmt(r.emi,0)}</span>
          <span style="color:var(--text-muted);">Interest:</span><span style="color:var(--warn);">₹${U.fmt(r.interest,0)}</span>
          <span style="color:var(--text-muted);">Principal:</span><span style="color:var(--accent);">₹${U.fmt(r.principal,0)}</span>
          <span style="color:var(--text-muted);">Loan Paid:</span><span style="font-weight:700;color:${d.colorHex};">${pctPaid.toFixed(1)}%</span>
        </div>
      </div>`;
    });
    tip.innerHTML = html;
    tip.style.display = 'block';
    // Position tooltip
    const wrapRect = document.getElementById('aemi-lifecycle-wrap').getBoundingClientRect();
    let tx = e.clientX - wrapRect.left + 16;
    if (tx + 230 > wrapRect.width) tx = e.clientX - wrapRect.left - 230;
    tip.style.left = tx + 'px';
    tip.style.top  = (e.clientY - wrapRect.top - 80) + 'px';
  };
  svg.onmouseleave = () => { tip.style.display='none'; };

  // Milestones
  const milEl = document.getElementById('aemi-lifecycle-milestones');
  if (milEl) {
    let mHtml = '';
    datasets.forEach(d => {
      if (!d.rows.length) return;
      const halfPaid  = d.rows.findIndex(r => r.balance <= d.P*0.5) + 1;
      const threeFour = d.rows.findIndex(r => r.balance <= d.P*0.25) + 1;
      const cross     = d.rows.findIndex((r,i) => i>0 && d.rows[i].interest < d.rows[i].principal) + 1;
      if (halfPaid > 0) mHtml += `<span style="background:${d.colorHex}22;border:1px solid ${d.colorHex}44;color:${d.colorHex};font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:14px;">${d.label}: 50% paid @ Yr ${(halfPaid/12).toFixed(1)}</span>`;
      if (cross > 0)   mHtml += `<span style="background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:var(--warn);font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:14px;">${d.label}: P>I @ Yr ${(cross/12).toFixed(1)}</span>`;
    });
    milEl.innerHTML = mHtml;
  }

  // Insight text
  const insightEl = document.getElementById('aemi-lifecycle-insight');
  if (insightEl && datasets.length) {
    const d = datasets[0];
    const earlyMo = Math.min(12, d.rows.length-1);
    const earlyIntPct = d.rows.slice(0,earlyMo).reduce((s,r)=>s+r.interest,0) / (d.rows.slice(0,earlyMo).reduce((s,r)=>s+r.emi,0)||1) * 100;
    insightEl.innerHTML = `📊 <strong>Early Loan Reality:</strong> In the first year of ${d.label}, approximately <strong>${earlyIntPct.toFixed(0)}%</strong> of your EMI goes toward interest — only <strong>${(100-earlyIntPct).toFixed(0)}%</strong> reduces principal. This is the power of prepayment: every ₹1 paid early eliminates this high-interest multiplier effect.${datasets.length>1 ? ` <br>💡 <strong>Cost Difference:</strong> ${datasets[0].label} total interest: ₹${U.fmt(_aemiParamsA.totalInt||0,0)} vs ${datasets[1].label}: ₹${U.fmt(_aemiParamsB.totalInt||0,0)} — saving ₹${U.fmt(Math.abs((_aemiParamsA.totalInt||0)-(_aemiParamsB.totalInt||0)),0)} by choosing the better option.` : ''}`;
  }
}

