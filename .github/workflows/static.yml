function calculateSCSS() {
  let P = U.parse(U.$('#sc-p').value);
  if (P > 3000000) {
      U.showToast("SCSS statutory limit is ₹30 Lakhs. Capping value automatically.", true);
      P = 3000000;
      U.$('#sc-p').value = U.fmt(P);
  }

  const R       = U.parse(U.$('#sc-r').value);
  const sDate   = new Date(U.$('#sc-s').value);
  const is15H   = U.$('#sc-15h').checked;
  const noPan   = U.$('#sc-nopan').checked;
  const tdsRate = (noPan && !is15H) ? 0.20 : 0.10;

  const scInputs = U.$('#sc-inputs') || document.querySelector('.command-center');
  U.clearErrors(scInputs);
  let scError = false;
  if (P <= 0) { U.setError(U.$('#sc-p'), 'Deposit amount required'); scError = true; }
  if (R <= 0) { U.setError(U.$('#sc-r'), 'Interest rate required'); scError = true; }
  if (isNaN(sDate)) { U.setError(U.$('#sc-s'), 'Valid start date required'); scError = true; }
  if (scError) return;

  const doExtend    = U.$('#sc-extend').checked;
  const extRate     = doExtend ? U.parse(U.$('#sc-ext-r').value) : R;
  // Base maturity = 5 years from opening date; extension adds 3 more years
  const maturityDate = U.addYMD(sDate, doExtend ? 8 : 5, 0, 0);

  // Returns the next SCSS statutory quarter-end: Mar 31 / Jun 30 / Sep 30 / Dec 31
  const getNextQEnd = (d) => {
    const m = d.getMonth(), y = d.getFullYear();
    if (m < 3)  return new Date(y, 2, 31);
    if (m < 6)  return new Date(y, 5, 30);
    if (m < 9)  return new Date(y, 8, 30);
    return new Date(y, 11, 31);
  };

  // Build the complete payout date list dynamically from sDate → maturityDate
  const payoutDates = [];
  let cursor = new Date(sDate);
  while (cursor < maturityDate) {
    const qEnd = getNextQEnd(cursor);
    if (qEnd >= maturityDate) {
      payoutDates.push(new Date(maturityDate));
      break;
    }
    payoutDates.push(new Date(qEnd));
    cursor = new Date(qEnd.getTime() + 86400000); // advance one day past quarter-end
  }

  const baseMatDate   = U.addYMD(sDate, 5, 0, 0); // always the 5-year base maturity point
  const standardQInt  = P * (R    / 100) * 0.25;
  const extQInt       = P * (extRate / 100) * 0.25;
  let totalI = 0, fyAccrued = 0, rows = [];
  let prevDate = new Date(sDate);

  payoutDates.forEach((payDate, idx) => {
    const isFinal      = payDate.getTime() === maturityDate.getTime();
    const isFirst      = idx === 0;
    const isExtension  = doExtend && payDate > baseMatDate;
    const isMarchEnd   = payDate.getMonth() === 2;

    // Extension block marker row at the 5-year base maturity point
    if (doExtend && !isFirst && payDate > baseMatDate && prevDate <= baseMatDate) {
      rows.push({ date: U.formatDate(baseMatDate), desc: `<strong style="color:var(--primary);">── 3-Year Extension Block Begins ──</strong>`, debit: '-', credit: '-', bal: `₹${U.fmt(P)}` });
    }

    // Pro-rata for first and final quarters; statutory formula for all full quarters
    const activeRate = isExtension ? extRate : R;
    const activeQInt = isExtension ? extQInt : standardQInt;
    const days = U.daysBetween(prevDate, payDate);
    const interest = (isFirst || isFinal)
      ? P * (activeRate / 100) * (days / 365)
      : activeQInt;

    fyAccrued += interest;
    totalI    += interest;

    let tds = 0;
    // TDS sweep happens on every Mar 31 (FY close) and also at final maturity
    if (isMarchEnd || isFinal) {
      if (fyAccrued > 50000 && !is15H) {
        tds = fyAccrued * tdsRate;
      }
      fyAccrued = 0;
    }

    rows.push({
      date:  U.formatDate(payDate),
      desc:  isFinal
        ? 'Final Payout & Account Closed'
        : (isFirst ? 'Pro-Rata First Payout' : (isExtension ? `Extension Q-Payout @ ${extRate}%` : 'Standard Q-Payout')),
      debit: tds > 0 ? U.fmt(tds) : '-',
      credit: U.fmt(interest - tds),
      bal:   isFinal ? 'Account Closed' : `₹${U.fmt(P)}`
    });

    prevDate = new Date(payDate);
  });

  U.$('#sc-out-p').textContent = `₹${U.fmt(P)}`;
  U.$('#sc-out-q').textContent = `₹${U.fmt(standardQInt)}`;
  U.$('#sc-out-i').textContent = `₹${U.fmt(totalI)}`;

  currentLedgerData = rows;
  U.$('#sc-table-container').innerHTML = `<table><thead><tr><th>Statutory Date</th><th>Details</th><th>TDS Hit (₹)</th><th>Net Credited (₹)</th><th>Principal Balance</th></tr></thead><tbody>${rows.map(r => `<tr><td style="color:var(--text-muted); font-weight:500;">${r.date}</td><td>${r.desc}</td><td class="num text-warn">${r.debit}</td><td class="num text-accent" style="font-weight:700;">${r.credit}</td><td class="num">${r.bal}</td></tr>`).join('')}</tbody></table>`;
}
