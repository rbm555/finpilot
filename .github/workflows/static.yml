let _crmSnapshot = '';
function crmSnapshotKPIs() {
  const kpis = U.$$('.kpi-card');
  if (!kpis.length) { U.showToast('Switch to another module (FD, EMI, etc.) first, then snapshot its results.', true); return; }
  let txt = '';
  kpis.forEach(k => {
    const label = k.querySelector('.kpi-label')?.textContent.trim() || '';
    const val   = k.querySelector('.kpi-val')?.textContent.trim() || '';
    if (label && val) txt += `${label}: ${val}; `;
  });
  _crmSnapshot = txt;
  const prev = U.$('#crm-snapshot-preview');
  prev.textContent = '📸 Snapshot: ' + txt.slice(0, 200);
  prev.style.display = 'block';
  U.showToast('KPI snapshot captured!');
}

function crmSaveClient() {
  const name = U.$('#crm-name').value.trim();
  if (!name) { U.showToast('Client name is required.', true); return; }
  const db  = crmLoad();
  const key = name.toLowerCase().replace(/\s+/g, '_');
  db[key]   = {
    name,
    phone:   U.$('#crm-phone').value.trim(),
    age:     U.$('#crm-age').value,
    risk:    U.$('#crm-risk').value,
    notes:   U.$('#crm-notes').value.trim(),
    snapshot:_crmSnapshot,
    module:  sessionStorage.getItem('advisory_current_module') || 'fd',
    saved:   new Date().toLocaleString('en-IN')
  };
  crmSave(db);
  _crmSnapshot = '';
  U.$('#crm-snapshot-preview').style.display = 'none';
  U.$('#crm-name').value = '';
  U.$('#crm-phone').value = '';
  U.$('#crm-notes').value = '';
  U.showToast(`Client "${name}" saved to vault!`);
  crmRenderList();
}

function crmRenderList() {
  const db    = crmLoad();
  const keys  = Object.keys(db);
  const listEl = U.$('#crm-list');
  const badge  = U.$('#crm-count-badge');
  if (badge) badge.textContent = keys.length + ' client' + (keys.length !== 1 ? 's' : '');
  if (!listEl) return;
  if (!keys.length) {
    listEl.innerHTML = `<div class="crm-empty">No clients saved yet.<br><span style="font-size:.8rem;">Fill the form on the left and click Save.</span></div>`;
    return;
  }
  listEl.innerHTML = keys.map(k => {
    const c = db[k];
    const initials = c.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const riskColors = { conservative:'#3b82f6', moderate:'#f59e0b', aggressive:'#ef4444' };
    return `<div class="crm-client-row" onclick="crmLoadClient('${k}')">
      <div style="display:flex; align-items:center; gap:14px;">
        <div class="crm-avatar" style="background:${riskColors[c.risk]||'var(--primary)'};">${initials}</div>
        <div>
          <div style="font-weight:600; font-size:.92rem;">${c.name}</div>
          <div style="font-size:.76rem; color:var(--text-muted);">${c.phone || 'No phone'} · Age ${c.age || '?'} · <span class="crm-tag">${c.risk}</span></div>
          ${c.snapshot ? `<div style="font-size:.72rem; color:var(--text-muted); margin-top:2px; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${c.snapshot}</div>` : ''}
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
        <div style="text-align:right; font-size:.72rem; color:var(--text-muted);">${c.saved || ''}</div>
        <button class="btn-secondary" style="padding:4px 10px; font-size:.72rem;" onclick="event.stopPropagation(); crmDeleteClient('${k}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function crmLoadClient(key) {
  const db = crmLoad();
  const c  = db[key];
  if (!c) return;
  U.$('#crm-name').value  = c.name || '';
  U.$('#crm-phone').value = c.phone || '';
  U.$('#crm-age').value   = c.age || '';
  U.$('#crm-notes').value = c.notes || '';
  if (c.risk) U.$('#crm-risk').value = c.risk;
  if (c.snapshot) {
    _crmSnapshot = c.snapshot;
    const prev = U.$('#crm-snapshot-preview');
    if (prev) { prev.textContent = '📸 Last Snapshot: ' + c.snapshot.slice(0,200); prev.style.display = 'block'; }
  }
  U.showToast(`Loaded client: ${c.name}`);
  if (c.module) { loadModule(c.module); }
}

function crmDeleteClient(key) {
  if (!confirm('Delete this client from vault?')) return;
  const db = crmLoad(); delete db[key]; crmSave(db);
  crmRenderList();
  U.showToast('Client deleted.');
}

// Expose CRM helpers globally (used in inline onclick)
window.crmLoadClient      = crmLoadClient;
window.crmDeleteClient    = crmDeleteClient;
window.crmSnapshotKPIs    = crmSnapshotKPIs;
window.crmSaveClient      = crmSaveClient;
window.crmRenderList      = crmRenderList;
window.crmExportAll       = crmExportAll;

function crmExportAll() {
  const db   = crmLoad();
  const keys = Object.keys(db);
  if (!keys.length) { U.showToast('No clients to export.', true); return; }
  let csv = 'Name,Phone,Age,Risk,Notes,Snapshot,LastModule,Saved\n';
  keys.forEach(k => {
    const c = db[k];
    csv += `"${c.name}","${c.phone}","${c.age}","${c.risk}","${(c.notes||'').replace(/"/g,'""')}","${(c.snapshot||'').replace(/"/g,'""')}","${c.module}","${c.saved}"\n`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = 'CRM_ClientVault_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

