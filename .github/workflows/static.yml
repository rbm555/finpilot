/* =========================================
   12. ULIP UNIT-LINKED INSURANCE PLAN SIMULATOR
   ========================================= */

// Simplified mortality table: annual rate per ₹1,000 Sum at Risk (LIC-style, indicative)
const ULIP_MORTALITY = { 18:1.00, 20:1.10, 25:1.20, 30:1.50, 35:2.00, 40:3.00, 45:5.00, 50:8.00, 55:13.00, 60:20.00, 65:30.00 };
function getULIPMortality(age) {
  const ages = Object.keys(ULIP_MORTALITY).map(Number).sort((a,b)=>a-b);
  if (age <= ages[0]) return ULIP_MORTALITY[ages[0]];
  if (age >= ages[ages.length-1]) return ULIP_MORTALITY[ages[ages.length-1]];
  const lo = ages.filter(a=>a<=age).pop(), hi = ages.find(a=>a>age);
  return ULIP_MORTALITY[lo] + (ULIP_MORTALITY[hi]-ULIP_MORTALITY[lo]) * ((age-lo)/(hi-lo));
}

