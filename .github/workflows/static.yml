function calculateULIP() {
  const annualPremium = U.parse(U.$('#ulip-p').value);
  const age           = U.parse(U.$('#ulip-age').value);
  const policyTerm    = U.parse(U.$('#ulip-term').value);
  const grossCAGR     = U.parse(U.$('#ulip-r').value);
  const fmc           = U.parse(U.$('#ulip-fmc').value);
  const pac1          = U.parse(U.$('#ulip-pac1').value) / 100;
  const pac2          = U.parse(U.$('#ulip-pac2').value) / 100;
  const pac3          = U.parse(U.$('#ulip-pac3').value) / 100;
  const adminMonthly  = U.parse(U.$('#ulip-admin').value);
  const saMult        = parseInt(U.$('.seg-btn.active', U.$('#ulip-sa-bar')).dataset.val);

  if (annualPremium <= 0 || age <= 0 || policyTerm < 10) return;

  const sumAssured  = annualPremium * saMult;
  // Net monthly NAV growth = gross CAGR minus FMC (FMC is deducted daily from NAV, modelled here as a rate reduction)
  const netAnnualR  = (grossCAGR - fmc) / 100;
  const monthlyRate = Math.pow(1 + netAnnualR, 1 / 12) - 1;

  let nav = 100, totalUnits = 0;
  let totalPremium = 0, totalMortChg = 0, totalAdminChg = 0, totalPACChg = 0;
  let ledgerRows = [], breakEvenYear = null;

  for (let yr = 1; yr <= policyTerm; yr++) {
    const pac = yr === 1 ? pac1 : yr <= 5 ? pac2 : pac3;
    let yrMortChg = 0, yrAdminChg = 0;
    const yrPACChg = annualPremium * pac;

    for (let mo = 1; mo <= 12; mo++) {
      // a) Invest net premium after PAC deduction
      const netInvest = (annualPremium / 12) * (1 - pac);
      totalUnits += netInvest / nav;

      // b) Deduct mortality charge in units (Sum at Risk × rate / 12000)
      const currentAge = age + (yr - 1) + (mo - 1) / 12;
      const mortRate   = getULIPMortality(currentAge);
      const fundValue  = totalUnits * nav;
      const sar        = Math.max(0, sumAssured - fundValue);
      const mortCharge = (sar * mortRate) / 12000;
      totalUnits  -= mortCharge / nav;
      yrMortChg   += mortCharge;

      // c) Deduct admin charge in units
      totalUnits  -= adminMonthly / nav;
      yrAdminChg  += adminMonthly;

      // d) NAV grows (FMC already removed from rate)
      nav *= (1 + monthlyRate);
    }

    totalPremium  += annualPremium;
    totalMortChg  += yrMortChg;
    totalAdminChg += yrAdminChg;
    totalPACChg   += yrPACChg;

    const fundValue = Math.max(0, totalUnits * nav);
    // Surrender value: during lock-in (yr < 5) → DPF pays 4% p.a. on premiums till lock-in end
    const surrenderVal = yr < 5
      ? totalPremium * Math.pow(1.04, 5 - yr) // grows at 4% in DPF till end of lock-in period
      : fundValue;

    if (!breakEvenYear && fundValue >= totalPremium) breakEvenYear = yr;

    ledgerRows.push({
      year:       yr,
      age:        age + yr - 1,
      premium:    U.fmt(annualPremium, 0),
      pac:        U.fmt(yrPACChg, 0),
      mortality:  U.fmt(yrMortChg, 0),
      admin:      U.fmt(yrAdminChg, 0),
      nav:        nav.toFixed(2),
      fundValue:  U.fmt(fundValue, 0),
      surrender:  yr < 5
        ? `<span style="color:var(--warn); font-size:0.75rem; font-weight:600;">Lock-in · DPF ₹${U.fmt(surrenderVal,0)}</span>`
        : U.fmt(surrenderVal, 0),
      status: breakEvenYear === yr
        ? `<span class="text-accent" style="font-size:0.8rem; font-weight:700;">✓ Break-even</span>`
        : (yr === policyTerm ? `<span style="color:var(--primary); font-size:0.8rem; font-weight:700;">Maturity</span>` : '')
    });
  }

  const finalFundValue = Math.max(0, totalUnits * nav);
  const totalCharges   = totalMortChg + totalAdminChg + totalPACChg;

  // ── Tax Treatment ──────────────────────────────────────────────────────────
  let taxNote = '', postTaxGain = finalFundValue - totalPremium;
  if (annualPremium <= 250000 && saMult >= 10) {
    taxNote = `<div style="background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.3); padding:12px 16px; border-radius:var(--radius-sm); color:var(--text-main); font-size:0.85rem; line-height:1.6;">✅ <strong>Tax-Free Maturity — Sec 10(10D) applies.</strong> Annual premium ≤ ₹2.5L and Sum Assured ≥ 10× AP. Entire maturity proceeds of <strong>₹${U.fmt(finalFundValue,0)}</strong> are exempt from income tax.</div>`;
  } else {
    const gain          = Math.max(0, finalFundValue - totalPremium);
    const taxableLTCG   = Math.max(0, gain - 125000);
    const taxLiability  = taxableLTCG * 0.125; // 12.5% LTCG post-July 2024
    postTaxGain = finalFundValue - totalPremium - taxLiability;
    taxNote = `<div style="background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.3); padding:12px 16px; border-radius:var(--radius-sm); color:var(--text-main); font-size:0.85rem; line-height:1.6;">⚠️ <strong>Taxable Maturity (Post-Feb 2021 Rule):</strong> Annual premium > ₹2.5L threshold. Gains taxed as LTCG at 12.5% above ₹1.25L exemption. Est. tax: <strong style="color:var(--warn);">₹${U.fmt(taxLiability,0)}</strong>. Net post-tax gain: <strong>₹${U.fmt(postTaxGain,0)}</strong>.</div>`;
  }

  // ── KPIs ───────────────────────────────────────────────────────────────────
  U.$('#ulip-out-p').textContent  = `₹${U.fmt(totalPremium, 0)}`;
  U.$('#ulip-out-fv').textContent = `₹${U.fmt(finalFundValue, 0)}`;
  U.$('#ulip-out-ch').textContent = `₹${U.fmt(totalCharges, 0)}`;
  U.$('#ulip-out-ng').textContent = `₹${U.fmt(postTaxGain, 0)}`;

  // ── Viz bar ────────────────────────────────────────────────────────────────
  const base  = finalFundValue || 1;
  const pPct  = (totalPremium / base) * 100;
  const cPct  = Math.min((totalCharges / base) * 100, 100 - pPct);
  const gPct  = Math.max(0, 100 - pPct - cPct);
  U.$('#ulip-viz-bar').innerHTML  = `<div class="viz-segment" style="background:var(--border); width:${pPct}%"></div><div class="viz-segment" style="background:var(--warn); width:${cPct}%"></div><div class="viz-segment" style="background:var(--accent); width:${gPct}%"></div>`;
  U.$('#ulip-viz-legend').innerHTML = `<div><span class="viz-dot" style="background:var(--border);"></span>Premium Invested</div><div><span class="viz-dot" style="background:var(--warn);"></span>All Charges</div><div><span class="viz-dot" style="background:var(--accent);"></span>Fund Growth</div>`;
  U.$('#ulip-tax-note').innerHTML = taxNote;

  currentLedgerData = ledgerRows;
  U.$('#ulip-table-container').innerHTML = `<table><thead><tr><th>Year</th><th>Age</th><th>Annual Premium</th><th>PAC (₹)</th><th>Mortality (₹)</th><th>Admin (₹)</th><th>NAV</th><th>Fund Value (₹)</th><th>Surrender Value</th><th>Status</th></tr></thead><tbody>${ledgerRows.map(r=>`<tr><td style="font-weight:600;">${r.year}</td><td>${r.age}</td><td class="num">${r.premium}</td><td class="num text-warn">${r.pac}</td><td class="num text-warn">${r.mortality}</td><td class="num text-warn">${r.admin}</td><td class="num">${r.nav}</td><td class="num" style="font-weight:700;">${r.fundValue}</td><td class="num">${r.surrender}</td><td>${r.status}</td></tr>`).join('')}</tbody></table>`;
  U.$('#ulip-print-context').innerHTML  = `Annual Premium: ₹${U.fmt(annualPremium,0)} | Sum Assured: ₹${U.fmt(sumAssured,0)} | Policy Term: ${policyTerm} Yrs | Return: ${grossCAGR}% Gross CAGR − ${fmc}% FMC = ${(grossCAGR-fmc).toFixed(2)}% Net | Break-even: Yr ${breakEvenYear||'N/A'}`;
  U.$('#ulip-print-time').textContent = new Date().toLocaleString('en-IN');
}

