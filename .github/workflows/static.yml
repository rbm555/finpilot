function calculateSSY() {
  const name = U.$('#ssy-name').value || "Daughter";
  const dob = new Date(U.$('#ssy-dob').value);
  const sDate = new Date(U.$('#ssy-s').value);
  let A = U.parse(U.$('#ssy-a').value);
  let currentRate = U.parse(U.$('#ssy-r').value) / 100;
  
  let ageAtStart = U.daysBetween(dob, sDate) / 365.25;
  if (ageAtStart > 10 || ageAtStart < 0) {
      U.showToast("Ineligible: Child must be under 10 years of age.", true);
      return;
  }
  if(A > 150000) { U.showToast("Maximum SSY deposit is ₹1.5 Lakhs per FY.", true); A = 150000; U.$('#ssy-a').value = U.fmt(A); }

  const matrixInput = U.$('#ssy-matrix').value.replace(/yr|y/gi, '');
  const rateMatrix = {};
  matrixInput.split(',').forEach(pair => {
     let [yr, rt] = pair.split(':');
     if(yr && rt && !isNaN(parseInt(yr)) && !isNaN(parseFloat(rt))) rateMatrix[parseInt(yr)] = parseFloat(rt)/100;
  });

  const ssyUseExact   = U.$('.seg-btn.active', U.$('#ssy-method-bar')).dataset.val === 'exact';
  const ssyDepDay     = ssyUseExact ? Math.min(28, Math.max(1, U.parse(U.$('#ssy-dep-day').value))) : 1;
  const ssyDepMonths  = (ssyUseExact && ssyDepDay > 5) ? 11 : 12;

  let balance = 0, totalInvested = 0, ledgerRows = [];
  let currentFyStart = U.getFYEnd(sDate).getFullYear() - 1;
  let depositLimit = 15, maturityLimit = 21;
  let currentAgeFloat = ageAtStart;

  for (let year = 1; year <= maturityLimit; year++) {
    if(rateMatrix[year]) currentRate = rateMatrix[year];

    let fyStr  = `${currentFyStart}-${String(currentFyStart+1).slice(-2)}`;
    let deposit = year <= depositLimit ? A : 0;
    let interest = ssyUseExact && deposit > 0
      ? balance * currentRate + deposit * currentRate * (ssyDepMonths / 12)
      : (balance + deposit) * currentRate;
    
    balance += deposit + interest; totalInvested += deposit;
    currentAgeFloat += 1;
    let displayAge = Math.floor(currentAgeFloat);
    
    let milestone = "";
    if (year === depositLimit) milestone = `<span style="color:var(--text-muted); font-size:0.8rem;">Final Deposit Year</span>`;
    if (displayAge === 18 && year <= maturityLimit && displayAge !== Math.floor(currentAgeFloat - 1)) {
        milestone = `<span style="color:var(--primary); font-size:0.8rem; font-weight:700;">Eligible for 50% Withdrawal (Education)</span>`;
    }
    if (year === maturityLimit) milestone = `<span style="color:var(--primary); font-size:0.8rem; font-weight:700;">Account Maturity</span>`;
    
    ledgerRows.push({ date: `FY ${fyStr}`, desc: milestone || `Age ${displayAge}`, debit: deposit > 0 ? U.fmt(deposit, 0) : "-", credit: `${U.fmt(interest, 0)} <span style="font-size:0.7rem; color:var(--text-muted);">(${(currentRate*100).toFixed(2)}%)</span>`, bal: U.fmt(balance, 0) });
    currentFyStart++;
  }

  currentLedgerData = ledgerRows;
  U.$('#ssy-out-p').textContent = `₹${U.fmt(totalInvested, 0)}`; 
  U.$('#ssy-out-i').textContent = `₹${U.fmt(balance - totalInvested, 0)}`; 
  U.$('#ssy-out-m').textContent = `₹${U.fmt(balance, 0)}`;

  // TEY — Tax Equivalent Yield for 30% and 20% slab
  // SSY effective yield: annualised from invested→maturity over 21 yrs
  const ssyYears = 21;
  const effectiveSSYRate = (Math.pow(balance / Math.max(totalInvested, 1), 1 / ssyYears) - 1) * 100;
  const tey30 = effectiveSSYRate / (1 - 0.30);
  const tey20 = effectiveSSYRate / (1 - 0.20);
  const ssyRateDisplay = (U.$$('.seg-btn', document.body).find ? parseFloat(U.$('#ssy-calc')?.dataset?.rate || 8.2) : 8.2);
  const teyEl   = U.$('#ssy-out-tey');
  const teySub  = U.$('#ssy-tey-sub');
  if (teyEl) teyEl.textContent = tey30.toFixed(2) + '%';
  if (teySub) teySub.innerHTML = `For 30% slab: <strong>${tey30.toFixed(2)}%</strong> | 20% slab: <strong>${tey20.toFixed(2)}%</strong> FD needed to match`;

  U.$('#ssy-table-container').innerHTML = `<table><thead><tr><th>Financial Year</th><th>${name}'s Age</th><th>Deposited</th><th>Interest Earned (Rate)</th><th>Fund Value</th></tr></thead><tbody>${ledgerRows.map(r => `<tr><td style="font-weight:500;">${r.date}</td><td>${r.desc}</td><td class="num">${r.debit}</td><td class="num text-accent">+ ${r.credit}</td><td class="num" style="font-weight:600;">${r.bal}</td></tr>`).join('')}</tbody></table>`;
  U.$('#ssy-pb-title').textContent = `${name}'s Higher Education & Marriage Fund`;
}
