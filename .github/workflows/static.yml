function calculatePPF() {
  let A = U.parse(U.$('#ppf-a').value);
  if(A > 150000) { U.showToast("Maximum PPF deposit is ₹1.5 Lakhs per FY.", true); A = 150000; U.$('#ppf-a').value = U.fmt(A); }
  
  let currentRate = U.parse(U.$('#ppf-r').value) / 100;
  const sDate = new Date(U.$('#ppf-s').value);
  if(isNaN(sDate)) return;
  
  // Exact Maturity Date Math: April 1st of the 16th Financial Year from opening.
  let openFyStartYear = sDate.getMonth() < 3 ? sDate.getFullYear() - 1 : sDate.getFullYear();
  let maturityYear = openFyStartYear + 16; 
  U.$('#ppf-out-date').textContent = `01-Apr-${maturityYear}`;

  const matrixInput = U.$('#ppf-matrix').value.replace(/yr|y/gi, '');
  const rateMatrix = {};
  matrixInput.split(',').forEach(pair => {
     let [yr, rt] = pair.split(':');
     if(yr && rt && !isNaN(parseInt(yr)) && !isNaN(parseFloat(rt))) rateMatrix[parseInt(yr)] = parseFloat(rt)/100;
  });

  const useExact  = U.$('.seg-btn.active', U.$('#ppf-method-bar')).dataset.val === 'exact';
  const depDay    = useExact ? Math.min(28, Math.max(1, U.parse(U.$('#ppf-dep-day').value))) : 1;
  // If deposit is after 5th, first month's interest is forfeited on that deposit
  // Effective annual multiplier: (12 months vs 11 months) on the deposit amount
  const depositMonths = (useExact && depDay > 5) ? 11 : 12;

  let balance = 0, totalInvested = 0, ledgerRows = [], balancesByYear = [];
  let currentFyStart = openFyStartYear;

  for (let year = 1; year <= 15; year++) {
    if(rateMatrix[year]) currentRate = rateMatrix[year];

    let fyStr  = `${currentFyStart}-${String(currentFyStart+1).slice(-2)}`;
    let opening = balance;
    // Exact method: deposit after 5th loses first month's interest on the deposit amount
    let interest = useExact
      ? opening * currentRate + A * currentRate * (depositMonths / 12)
      : (opening + A) * currentRate; // simplified: full year on opening+deposit
    
    balance = opening + A + interest; totalInvested += A; balancesByYear.push(balance);
    
    let privileges = "-";
    if (year >= 3 && year <= 6) privileges = `<span style="color:var(--primary); font-size:0.8rem; font-weight:600;">Loan: ₹${U.fmt(balancesByYear[year - 3] * 0.25, 0)}</span>`;
    else if (year >= 7) privileges = `<span style="color:var(--accent); font-size:0.8rem; font-weight:600;">Withdrawal: ₹${U.fmt(Math.min(balancesByYear[year - 2], (year >= 5 ? balancesByYear[year - 5] : balancesByYear[0])) * 0.50, 0)}</span>`;
    
    ledgerRows.push({ date: `FY ${fyStr} <span style="opacity:0.5; font-size:0.7rem; margin-left:4px;">(Yr ${year})</span>`, desc: privileges, debit: U.fmt(A, 0), credit: `${U.fmt(interest, 0)} <span style="font-size:0.7rem; color:var(--text-muted);">(${(currentRate*100).toFixed(2)}%)</span>`, bal: U.fmt(balance, 0) });
    currentFyStart++;
  }

  currentLedgerData = ledgerRows;
  U.$('#ppf-out-p').textContent = `₹${U.fmt(totalInvested, 0)}`; 
  U.$('#ppf-out-i').textContent = `₹${U.fmt(balance - totalInvested, 0)}`; 
  U.$('#ppf-out-m').textContent = `₹${U.fmt(balance, 0)}`;
  U.$('#ppf-table-container').innerHTML = `<table><thead><tr><th>Financial Year</th><th>Deposited</th><th>Interest Earned (Rate)</th><th>Closing Balance</th><th>Liquidity Options</th></tr></thead><tbody>${ledgerRows.map(r => `<tr><td style="font-weight:500;">${r.date}</td><td class="num">${r.debit}</td><td class="num text-accent">+ ${r.credit}</td><td class="num" style="font-weight:600;">${r.bal}</td><td>${r.desc}</td></tr>`).join('')}</tbody></table>`;
}

