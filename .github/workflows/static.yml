        <h3 class="section-title" style="justify-content:center; font-size:1.2rem; margin-bottom:20px;">Retention Advisory Result</h3>
        <div id="bb-result-badge" style="display:inline-block; padding:16px 32px; border-radius:30px; font-size:1.4rem; font-weight:800; border:1px solid var(--border); box-shadow:var(--shadow-sm);">Run comparison to see advice.</div>
        <p id="bb-result-sub" style="margin-top:16px; color:var(--text-muted); font-size:0.95rem; line-height:1.6; max-width:600px; margin-left:auto; margin-right:auto;"></p>
      </div>

      <div class="two-col-grid">
        <div class="kpi-card" style="border-top:4px solid var(--warn);">
          <h4 style="color:var(--warn); margin-bottom:16px; font-size:0.9rem; font-weight:700; display:flex; align-items:center; gap:8px;">❌ Scenario A: Break FD</h4>
          <div style="font-size:0.85rem; line-height:2.2; color:var(--text-muted);">
             Interest earned at original rate: <strong id="bb-a-orig" style="float:right; color:var(--text-main);">₹0</strong><br>
             Revised Rate (Applicable - Penalty): <strong id="bb-a-rev-rate" style="float:right; color:var(--text-main);">0%</strong><br>
             Actual Interest to be paid out: <strong id="bb-a-actual" style="float:right; color:var(--text-main);">₹0</strong><br>
             <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border); color:var(--warn); font-weight:700;">
               Total Loss (Penalty Hit): <span id="bb-a-loss" style="font-size:1.3rem; float:right;">₹0</span>
