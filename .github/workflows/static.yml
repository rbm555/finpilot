  `;
  U.bindFormat(U.$('#sc-p'));
  // 15H and No-PAN are mutually exclusive
  U.$('#sc-15h').addEventListener('change', () => { if (U.$('#sc-15h').checked) U.$('#sc-nopan').checked = false; });
  U.$('#sc-nopan').addEventListener('change', () => { if (U.$('#sc-nopan').checked) U.$('#sc-15h').checked = false; });
  // Show extension rate input when extension toggle is on
  U.$('#sc-extend').addEventListener('change', () => {
    U.$('#sc-extend-rate-wrap').style.display = U.$('#sc-extend').checked ? 'block' : 'none';
    calculateSCSS();
  });
  U.$('#sc-calc').onclick = calculateSCSS;
