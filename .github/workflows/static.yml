      U.$('#rd-eff-rate-label').innerHTML = `Effective Rate: <strong class="text-main">${(U.parse(U.$('#rd-r').value) + premium).toFixed(2)}%</strong>`;
  });

  // Reverse Mode Toggle Logic
  U.$('#rd-mode').addEventListener('change', (e) => {
