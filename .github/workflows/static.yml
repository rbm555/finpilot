function calculateProSWPModule() {
  const fdP        = U.parse(U.$('#profd-p').value);
  const fdRateP   = U.parse(U.$('#profd-r').value);
  const fdTaxRate = U.parse(U.$('#profd-tax').value);
  const withdrawW = U.parse(U.$('#pros-w').value);
  const nMonths    = U.parse(U.$('#pros-n').value);
  const hybLumpsum = U.parse(U.$('#prohyb-lumpsum').value);
  const hybSip     = U.parse(U.$('#prohyb-sip').value);
  const accMonths  = U.parse(U.$('#prohyb-acc').value);
  const hybRateP   = U.parse(U.$('#prohyb-r').value);
  const ltcgRate   = U.parse(U.$('#prohyb-ltcg').value);
  const stcgRate   = U.parse(U.$('#prohyb-stcg').value);
  const holdMonths = U.parse(U.$('#prohyb-hold').value);

  const inputsRoot = U.$('#pro-swp-inputs');
  U.clearErrors(inputsRoot);

  let hasError = false;
  if (fdP <= 0) { U.setError(U.$('#profd-p'), 'Enter FD corpus'); hasError = true; }
  if (fdRateP <= 0) { U.setError(U.$('#profd-r'), 'Enter FD rate > 0'); hasError = true; }
  if (withdrawW <= 0) { U.setError(U.$('#pros-w'), 'Enter monthly withdrawal > 0'); hasError = true; }
  if (nMonths <= 0) { U.setError(U.$('#pros-n'), 'Duration must be >= 1'); hasError = true; }
  if (hybRateP <= 0) { U.setError(U.$('#prohyb-r'), 'Enter hybrid return > 0'); hasError = true; }
  if (holdMonths <= 0) { U.setError(U.$('#prohyb-hold'), 'Holding window must be >= 1'); hasError = true; }
  if (hasError) return;

  // -------- FD MIS (interest accrues monthly; tax on interest; investor withdraws post-tax) --------
  let fdBalance = fdP;
  let fdTotalTax = 0;
  for (let m = 0; m < nMonths; m++) {
    if (fdBalance <= 0) break;
    const interestGross = fdBalance * (fdRateP / 100) / 12;
    const tax = interestGross * (fdTaxRate / 100);
    const netCredited = interestGross - tax;
    fdBalance = fdBalance + netCredited - withdrawW;
    fdTotalTax += tax;
  }

  // -------- Hybrid FIFO lots + SWP withdrawals (tax deducted from sale proceeds) --------
  const nav0 = 100;
  const monthlyR = Math.pow(1 + hybRateP / 100, 1 / 12) - 1;
  const totalMonths = accMonths + nMonths;

  const navAt = new Array(totalMonths + 1);
  for (let t = 0; t <= totalMonths; t++) navAt[t] = nav0 * Math.pow(1 + monthlyR, t);

  // Each lot: { units, costNav, acqMonth }
  let lots = [];
  function lotUnitsSum() {
    let s = 0;
    for (let i = 0; i < lots.length; i++) s += lots[i].units;
    return s;
  }

  // Build lots during accumulation
  for (let t = 0; t < accMonths; t++) {
    const invest = (t === 0 ? hybLumpsum : 0) + hybSip;
    if (invest <= 0) continue;
    const nav = navAt[t];
    lots.push({ units: invest / nav, costNav: nav, acqMonth: t });
  }

  function simulateSell(unitsSell, tNow) {
    let remaining = unitsSell;
    let proceeds = 0;
    let tax = 0;
    const nav = navAt[tNow];
    for (let i = 0; i < lots.length && remaining > 1e-12; i++) {
      const lot = lots[i];
      const uSold = Math.min(lot.units, remaining);
      const cost = uSold * lot.costNav;
      const gain = uSold * (nav - lot.costNav);
      proceeds += uSold * nav;
      if (gain > 0) {
        const holding = tNow - lot.acqMonth;
        const rate = holding >= holdMonths ? ltcgRate : stcgRate;
        tax += gain * (rate / 100);
      }
      remaining -= uSold;
    }
    return { netCash: proceeds - tax, tax };
  }

  function applySell(unitsSell, tNow) {
    let remaining = unitsSell;
    let proceeds = 0;
    let tax = 0;
    const nav = navAt[tNow];
    for (let i = 0; i < lots.length && remaining > 1e-12; i++) {
      const lot = lots[i];
      const uSold = Math.min(lot.units, remaining);
      const gain = uSold * (nav - lot.costNav);
      proceeds += uSold * nav;
      if (gain > 0) {
        const holding = tNow - lot.acqMonth;
        const rate = holding >= holdMonths ? ltcgRate : stcgRate;
        tax += gain * (rate / 100);
      }
      lot.units -= uSold;
      remaining -= uSold;
    }
    // Drop empty lots
    lots = lots.filter(x => x.units > 1e-10);
    return { netCash: proceeds - tax, tax };
  }

  let hybTotalTax = 0;
  let lastT = accMonths > 0 ? accMonths - 1 : 0;

  for (let t = accMonths; t < accMonths + nMonths; t++) {
    const availableUnits = lotUnitsSum();
    if (availableUnits <= 1e-12) break;

    const simMax = simulateSell(availableUnits, t);
    if (simMax.netCash < withdrawW - 1e-6) {
      // Not enough net cash to honor this withdrawal; stop.
      lastT = t;
      break;
    }

    // Binary search the unitsSell such that netCash ~= withdrawW
    let lo = 0, hi = availableUnits;
    for (let iter = 0; iter < 26; iter++) {
      const mid = (lo + hi) / 2;
      const sim = simulateSell(mid, t);
      if (sim.netCash >= withdrawW) hi = mid;
      else lo = mid;
    }

    const applied = applySell(hi, t);
    hybTotalTax += applied.tax;
    lastT = t;
  }

  const endUnits = lotUnitsSum();
  const hybEndingPrincipal = endUnits * navAt[lastT];

  // -------- KPIs + Visuals --------
  const taxSaved = Math.max(0, fdTotalTax - hybTotalTax);

  U.animateKpiRupee(U.$('#pros-out-fd-end'), fdBalance, { decimals: 0 });
  U.animateKpiRupee(U.$('#pros-out-hyb-end'), hybEndingPrincipal, { decimals: 0 });
  U.animateKpiRupee(U.$('#pros-out-fd-tax'), fdTotalTax, { decimals: 0 });
  U.animateKpiRupee(U.$('#pros-out-hyb-tax'), hybTotalTax, { decimals: 0 });
  U.animateKpiRupee(U.$('#pros-out-tax-saved'), taxSaved, { decimals: 0 });

  const fmtR = v => '₹' + U.fmt(v, 0);

  function proAnimateSvgBars(container, items, { durationMs = 700, width = 340 } = {}) {
    if (!container) return;
    // Clear immediately so the latest "Run" shows correct initial state
    container.innerHTML = '';
    // Cancel any previous animation running on the same container
    const gen = container._proSvgAnimGen = (container._proSvgAnimGen || 0) + 1;
    const start = performance.now();
    const ease = x => 1 - Math.pow(1 - x, 3);
    function frame(now) {
      if (container._proSvgAnimGen !== gen) return;
      const t = Math.min(1, (now - start) / durationMs);
      const s = ease(t);
      const scaled = items.map(it => ({ ...it, value: (Number(it.value) || 0) * s }));
      U.svgBarChart(container, scaled, { width, barHeight: 26, gap: 10, labelWidth: 140 });
      if (t < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
