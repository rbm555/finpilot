          <div class="form-group"><label>Client Name *</label><input type="text" id="crm-name" placeholder="e.g. Suresh Kumar"></div>
          <div class="form-group"><label>Phone</label><input type="text" id="crm-phone" placeholder="+91 98765 43210"></div>
          <div class="form-group"><label>Age</label><input type="number" id="crm-age" placeholder="45"></div>
          <div class="form-group"><label>Risk Profile</label>
            <select id="crm-risk"><option value="conservative">Conservative</option><option value="moderate" selected>Moderate</option><option value="aggressive">Aggressive</option></select>
          </div>
        </div>
        <div class="form-group" style="margin-top:12px;"><label>Portfolio Notes / Key Products Discussed</label><textarea id="crm-notes" rows="3" style="width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-hover);color:var(--text-main);font-size:.9rem;resize:vertical;" placeholder="e.g. FD ₹10L at 7.25%, SIP ₹5000 in ELSS..."></textarea></div>
