function calculateDebtDestroyer() {
  const P = U.parse(U.$('#debt-p').value);
  const N = U.parse(U.$('#debt-n').value);
  const R = U.parse(U.$('#debt-r').value);
  const extra = U.parse(U.$('#debt-extra').value);
  const stepPct = U.parse(U.$('#debt-step').value);
  const inputs = U.$('#debt-inputs');
  U.clearErrors(inputs);

  let err = false;
  if (P <= 0) { U.setError(U.$('#debt-p'), 'Principal must be > 0'); err = true; }
  if (N <= 0) { U.setError(U.$('#debt-n'), 'Tenure must be >= 1'); err = true; }
  if (R <= 0) { U.setError(U.$('#debt-r'), 'Rate must be > 0'); err = true; }
  if (err) return;

  const r = (R / 100) / 12;
  const baseEmi = P * r * Math.pow(1 + r, N) / (Math.pow(1 + r, N) - 1);
  const oldTotalInt = (baseEmi * N) - P;

  // Drops map
  const drops = new Map();
  const dropsContainer = U.$('#debt-drops');
  U.$$('.debt-drop-month', dropsContainer || document).forEach((mEl, idx) => {
    const aEl = U.$$('.debt-drop-amt', dropsContainer || document)[idx];
    const m = Math.floor(U.parse(mEl.value));
    const a = U.parse(aEl ? aEl.value : 0);
    if (m >= 1 && a > 0) drops.set(m, (drops.get(m) || 0) + a);
  });

  let bal = P;
  let month = 0;
  let totalInt = 0;
  let currentEmi = baseEmi + extra;
  const stepFactor = 1 + (stepPct / 100);

  let rows = [];

  while (bal > 0.01 && month < 1200) {
    month++;
    // apply annual step-up at start of years 2,3,...
    if (month > 1 && (month - 1) % 12 === 0 && stepPct > 0) {
      currentEmi *= stepFactor;
    }

    const intPaid = bal * r;
    let prinPaid = currentEmi - intPaid;
    if (prinPaid < 0) prinPaid = 0;
    if (prinPaid > bal) prinPaid = bal;
    totalInt += intPaid;
    bal -= prinPaid;

    // lumpsum drop after EMI
    const drop = drops.get(month) || 0;
    if (drop > 0) {
      const applied = Math.min(drop, bal);
      bal -= applied;
    }

    if (month <= 24) {
      rows.push({
        month,
        emi: currentEmi,
        interest: intPaid,
        principal: prinPaid,
        drop,
        bal
      });
    }
  }

  const newN = month;
  const savedInt = Math.max(0, oldTotalInt - totalInt);
  const savedTime = Math.max(0, N - newN);

  U.animateKpiRupee(U.$('#debt-out-base'), baseEmi, { decimals: 0 });
  U.animateKpiRupee(U.$('#debt-out-new'), baseEmi + extra, { decimals: 0 });
  U.animateKpiRupee(U.$('#debt-out-old-int'), oldTotalInt, { decimals: 0 });
  U.animateKpiRupee(U.$('#debt-out-new-int'), totalInt, { decimals: 0 });
  U.animateKpiRupee(U.$('#debt-out-saved'), savedInt, { decimals: 0 });
  U.$('#debt-out-msaved').textContent = String(savedTime);

  // Charts
  const fmtR = v => '₹' + U.fmt(v, 0);
  U.svgBarChart(U.$('#debt-chart-int'), [
    { label: 'Original Interest', value: oldTotalInt, color: 'var(--warn)', format: fmtR },
    { label: 'New Interest', value: totalInt, color: 'var(--accent)', format: fmtR }
  ], { width: 360, barHeight: 26, gap: 10, labelWidth: 150 });

  U.svgBarChart(U.$('#debt-chart-tenure'), [
    { label: 'Original Tenure', value: N, color: '#94a3b8', format: v => `${Math.round(v)} mo` },
    { label: 'New Tenure', value: newN, color: 'var(--primary)', format: v => `${Math.round(v)} mo` }
  ], { width: 360, barHeight: 26, gap: 10, labelWidth: 150 });

  // Ledger table
  currentLedgerData = rows.map(r => ({
    Month: r.month,
    EMI: Math.round(r.emi),
    Interest: Math.round(r.interest),
    Principal: Math.round(r.principal),
    Drop: Math.round(r.drop),
    Balance: Math.round(r.bal)
  }));

  U.$('#debt-table').innerHTML = `<table><thead><tr>
    <th>Month</th><th>EMI (₹)</th><th>Interest (₹)</th><th>Principal (₹)</th><th>Lumpsum Drop (₹)</th><th>Balance (₹)</th>
  </tr></thead><tbody>
    ${rows.map(r => `<tr>
      <td style="font-weight:700; color:var(--text-muted);">${r.month}</td>
      <td class="num">${U.fmt(r.emi,0)}</td>
      <td class="num text-warn">${U.fmt(r.interest,0)}</td>
      <td class="num text-accent">${U.fmt(r.principal,0)}</td>
      <td class="num">${r.drop>0?U.fmt(r.drop,0):'-'}</td>
      <td class="num" style="font-weight:800;">${U.fmt(r.bal,0)}</td>
    </tr>`).join('')}
  </tbody></table>`;
}

