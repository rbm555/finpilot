<script>
/* ===== v11.0 Finpilot Global Utilities ===== */
const U = {
  $: (s, b = document) => b.querySelector(s),
  $$: (s, b = document) => Array.from(b.querySelectorAll(s)),
  parse: v => { const n = parseFloat(String(v ?? '').replace(/,/g, '')); return Number.isFinite(n) ? Math.max(0, n) : 0 },
  fmt: (n, d=0) => Number(n).toLocaleString('en-IN', { minimumFractionDigits: d, maximumFractionDigits: d }),
  bindFormat: (inputEl) => {
    inputEl.addEventListener('input', (e) => {
      let val = e.target.value.replace(/,/g, '');
      if(!isNaN(val) && val !== '') e.target.value = Number(val).toLocaleString('en-IN');
    });
  },
  addYMD: (date, y, m, d) => {
    let x = new Date(date);
    let newYear  = x.getFullYear() + y;
    let newMonth = x.getMonth() + m;
    // Carry over months that overflow/underflow into years
    newYear  += Math.floor(newMonth / 12);
    newMonth  = ((newMonth % 12) + 12) % 12;
    // Clamp day to the last valid day of the target month (fixes Jan-31 + 1m = Feb-28 not Mar-3)
    let daysInMonth = new Date(newYear, newMonth + 1, 0).getDate();
    let newDay = Math.min(x.getDate(), daysInMonth);
    x = new Date(newYear, newMonth, newDay);
    x.setDate(x.getDate() + d);
    return x;
  },
  daysBetween: (d1, d2) => Math.round((d2.getTime() - d1.getTime()) / 86400000),
  getFYEnd: d => d.getMonth() >= 3 ? new Date(d.getFullYear() + 1, 2, 31) : new Date(d.getFullYear(), 2, 31),
  formatDate: d => d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }),
  showToast: (msg, isError = false) => {
    const t = U.$('#app-toast');
    t.textContent = msg;
    t.style.borderLeftColor = isError ? 'var(--warn)' : 'var(--accent)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  },
  // Inline field validation helpers
  setError: (el, msg) => {
    if (!el) return;
    el.classList.add('input-error');
    let helper = el.nextElementSibling;
    if (!helper || !helper.classList.contains('validate-msg')) {
      helper = document.createElement('div');
      helper.className = 'helper-text validate-msg';
      el.parentNode.insertBefore(helper, el.nextSibling);
    }
    helper.textContent = msg;
  },
  clearError: (el) => {
    if (!el) return;
    el.classList.remove('input-error');
    const next = el.nextElementSibling;
    if (next && next.classList.contains('validate-msg')) next.remove();
  },
  clearErrors: (container) => {
    U.$$(`.input-error`, container).forEach(el => U.clearError(el));
  },

  /* ----- Pro Phase 1: duration + number animation ----- */
  proKpiDurationMs: 520,

  parseDisplayedNumber(el) {
    if (!el) return 0;
    const t = String(el.textContent || '').replace(/₹/g, '').replace(/,/g, '').trim().split(/\s/)[0];
    const n = parseFloat(t);
    return Number.isFinite(n) ? n : 0;
  },

  animateValue(el, from, to, durationMs, renderFn) {
    if (!el || typeof renderFn !== 'function') return;
    el._proAnimGen = (el._proAnimGen || 0) + 1;
    const gen = el._proAnimGen;
    const t0 = performance.now();
    const dur = Math.max(16, durationMs || U.proKpiDurationMs);
    const ease = t => 1 - Math.pow(1 - t, 3);
    function frame(now) {
      if (el._proAnimGen !== gen) return;
      const u = Math.min(1, (now - t0) / dur);
      const cur = from + (to - from) * ease(u);
      renderFn(u >= 1 ? to : cur);
      if (u < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  },

  /** Animate a plain rupee KPI (.kpi-val). */
  animateKpiRupee(el, endVal, opts = {}) {
    if (!el) return;
    const from = U.parseDisplayedNumber(el);
    const dec = opts.decimals != null ? opts.decimals : 0;
    U.animateValue(el, from, Number(endVal) || 0, opts.durationMs, (v) => {
      const x = dec === 0 ? Math.round(v) : v;
      el.textContent = '₹' + U.fmt(x, dec);
    });
  },

  /** ----- Pro financial math (annual decimal rates, e.g. 0.07 = 7%) ----- */
  fv(pv, rAnnual, years, periodsPerYear = 1) {
    pv = Number(pv) || 0;
    rAnnual = Number(rAnnual) || 0;
    years = Number(years) || 0;
    const m = Math.max(1, periodsPerYear);
    return pv * Math.pow(1 + rAnnual / m, m * years);
  },
  pv(fv, rAnnual, years, periodsPerYear = 1) {
    const m = Math.max(1, periodsPerYear);
    return (Number(fv) || 0) / Math.pow(1 + (Number(rAnnual) || 0) / m, m * (Number(years) || 0));
  },
  /** NPV with uniform periods; ratePerPeriod is per step (e.g. monthly rate), flows[0] at t=0 */
  npv(ratePerPeriod, flows) {
    if (!flows || !flows.length) return 0;
    const r = Number(ratePerPeriod) || 0;
    return flows.reduce((acc, cf, i) => acc + (Number(cf) || 0) / Math.pow(1 + r, i), 0);
  },
  /** IRR: uniform period cash flows; returns rate *per period* (not annualized). */
  irr(flows, guess = 0.1) {
    if (!flows || flows.length < 2) return NaN;
    let r = guess;
    for (let iter = 0; iter < 100; iter++) {
      let npv = 0, d = 0;
      for (let i = 0; i < flows.length; i++) {
        const cf = Number(flows[i]) || 0;
        const den = Math.pow(1 + r, i);
        npv += cf / den;
        d -= (i * cf) / Math.pow(1 + r, i + 1);
      }
      if (Math.abs(npv) < 1e-9) return r;
      if (Math.abs(d) < 1e-14) break;
      const nr = r - npv / d;
      if (!Number.isFinite(nr) || nr <= -1 + 1e-6) { r *= 0.5; continue; }
      r = nr;
    }
    return r;
  },
  /** XIRR: irregular dates; returns annual decimal rate. flows[i] with dates[i] (Date | parseable). */
  xirr(flows, dates, guess = 0.1) {
    if (!flows || !dates || flows.length !== dates.length || flows.length < 2) return NaN;
    const t0 = new Date(dates[0]).getTime();
    if (!Number.isFinite(t0)) return NaN;
    const yr = dates.map(d => (new Date(d).getTime() - t0) / (365.25 * 86400000));
    let r = guess;
    for (let iter = 0; iter < 100; iter++) {
      let npvx = 0, dNpv = 0;
      for (let i = 0; i < flows.length; i++) {
        const cf = Number(flows[i]) || 0;
        const ti = yr[i];
        const den = Math.pow(1 + r, ti);
        npvx += cf / den;
        dNpv -= (ti * cf) / Math.pow(1 + r, ti + 1);
      }
      if (Math.abs(npvx) < 1e-9) return r;
      if (Math.abs(dNpv) < 1e-14) break;
      const nr = r - npvx / dNpv;
      if (!Number.isFinite(nr) || nr <= -0.999999) { r *= 0.5; continue; }
      r = nr;
    }
    return r;
  },

  /** Clear container before drawing SVG widgets */
  svgClear(container) { if (container) container.innerHTML = ''; },

  /** Native SVG donut — slices: [{ label, value, color }] */
  svgDonut(container, slices, opts = {}) {
    if (!container) return;
    U.svgClear(container);
    const total = slices.reduce((s, x) => s + Math.max(0, Number(x.value) || 0), 0) || 0;
    const size = opts.size || 200;
    const cx = size / 2;
    const cy = size / 2;
    const rOut = (size / 2) - 10;
    const rIn = rOut * (opts.innerRatio != null ? opts.innerRatio : 0.58);
    const wrap = document.createElement('div');
    wrap.style.display = 'flex';
    wrap.style.flexWrap = 'wrap';
    wrap.style.alignItems = 'center';
    wrap.style.gap = '20px';
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', String(size));
    svg.setAttribute('height', String(size));
    svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
    svg.classList.add('pro-svg-chart');
    svg.style.overflow = 'visible';
    const arcPath = (a0, a1) => {
      const large = (a1 - a0) > Math.PI ? 1 : 0;
      const xo0 = cx + rOut * Math.cos(a0), yo0 = cy + rOut * Math.sin(a0);
      const xo1 = cx + rOut * Math.cos(a1), yo1 = cy + rOut * Math.sin(a1);
      const xi0 = cx + rIn * Math.cos(a1), yi0 = cy + rIn * Math.sin(a1);
      const xi1 = cx + rIn * Math.cos(a0), yi1 = cy + rIn * Math.sin(a0);
      return `M ${xo0} ${yo0} A ${rOut} ${rOut} 0 ${large} 1 ${xo1} ${yo1} L ${xi0} ${yi0} A ${rIn} ${rIn} 0 ${large} 0 ${xi1} ${yi1} Z`;
    };
    if (total <= 0) {
      const c = document.createElementNS(svg.namespaceURI, 'circle');
      c.setAttribute('cx', String(cx)); c.setAttribute('cy', String(cy));
      c.setAttribute('r', String((rOut + rIn) / 2));
      c.setAttribute('fill', 'none');
      c.setAttribute('stroke', 'var(--border)');
      c.setAttribute('stroke-width', String(rOut - rIn));
      svg.appendChild(c);
    } else {
      let ang = -Math.PI / 2;
      slices.forEach(s => {
        const v = Math.max(0, Number(s.value) || 0);
        if (v <= 0) return;
        const a0 = ang;
        const a1 = ang + (v / total) * 2 * Math.PI * 0.999;
        const p = document.createElementNS(svg.namespaceURI, 'path');
        p.setAttribute('d', arcPath(a0, a1));
        p.setAttribute('fill', s.color || 'var(--accent)');
        p.classList.add('slice');
        p.setAttribute('title', `${s.label}: ₹${U.fmt(v)}`);
        svg.appendChild(p);
        ang = a1;
      });
    }
    const leg = document.createElement('div');
    leg.style.fontSize = '0.75rem';
    leg.style.color = 'var(--text-muted)';
    leg.style.lineHeight = '1.6';
    slices.filter(s => (Number(s.value) || 0) > 0).forEach(s => {
      const row = document.createElement('div');
      row.style.display = 'flex';
      row.style.alignItems = 'center';
      row.style.gap = '8px';
      const dot = document.createElement('span');
      dot.style.width = '10px'; dot.style.height = '10px'; dot.style.borderRadius = '50%';
      dot.style.background = s.color || 'var(--accent)';
      row.appendChild(dot);
      const t = document.createElement('span');
      t.innerHTML = `<strong style="color:var(--text-main)">${s.label}</strong> · ₹${U.fmt(Number(s.value) || 0)}`;
      row.appendChild(t);
      leg.appendChild(row);
    });
    wrap.appendChild(svg);
    wrap.appendChild(leg);
    container.appendChild(wrap);
  },

  /** Horizontal bar chart — items: [{ label, value, color, format?(v) }] */
  svgBarChart(container, items, opts = {}) {
    if (!container) return;
    U.svgClear(container);
    const W = opts.width || 340;
    const rowH = opts.barHeight || 24;
    const gap = opts.gap || 10;
    const padL = opts.labelWidth || 108;
    const padT = 8;
    const valPad = opts.valPad || 80; // reserved right-side space for value text
    const n = Math.max(1, items.length);
    const H = padT + n * (rowH + gap) + 8;
    const maxV = Math.max(...items.map(i => Math.abs(Number(i.value) || 0)), 1e-9);
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    // SVG is wide enough to always show the value label outside
    const svgW = W + valPad;
    svg.setAttribute('width', String(svgW));
    svg.setAttribute('height', String(H));
    svg.setAttribute('viewBox', `0 0 ${svgW} ${H}`);
    svg.style.cssText = 'max-width:100%; overflow:visible;';
    svg.classList.add('pro-svg-chart');
    const chartW = W - padL - 4;
    let y = padT;
    items.forEach(it => {
      const v = Math.abs(Number(it.value) || 0);
      const lbl = document.createElementNS(svg.namespaceURI, 'text');
      lbl.setAttribute('x', '0');
      lbl.setAttribute('y', String(y + rowH * 0.72));
      lbl.setAttribute('font-size', '11');
      lbl.setAttribute('fill', 'var(--text-muted)');
      lbl.textContent = String(it.label || '').slice(0, 26);
      const bw = Math.max(2, (v / maxV) * chartW);
      const rect = document.createElementNS(svg.namespaceURI, 'rect');
      rect.setAttribute('x', String(padL));
      rect.setAttribute('y', String(y));
      rect.setAttribute('width', String(bw));
      rect.setAttribute('height', String(rowH));
      rect.setAttribute('rx', '5');
      rect.setAttribute('fill', it.color || 'var(--accent)');
      rect.classList.add('bar-seg');
      const valStr = typeof it.format === 'function' ? it.format(v) : String(v);
      rect.setAttribute('title', `${it.label}: ${valStr}`);
      // Value label: always outside bar (to the right), within the extra valPad space
      const vt = document.createElementNS(svg.namespaceURI, 'text');
      vt.setAttribute('x', String(padL + bw + 7));
      vt.setAttribute('y', String(y + rowH * 0.72));
      vt.setAttribute('font-size', '11');
      vt.setAttribute('font-weight', '700');
      vt.setAttribute('fill', 'var(--text-main)');
      vt.textContent = valStr;
      svg.appendChild(lbl);
      svg.appendChild(rect);
      svg.appendChild(vt);
      y += rowH + gap;
    });
    // Wrap in a scrollable div so it never clips on small screens
    const wrap = document.createElement('div');
    wrap.style.cssText = 'overflow-x:auto; padding-right:4px;';
    wrap.appendChild(svg);
    container.appendChild(wrap);
  }
};

