        <div id="guard-badge" style="display:inline-block; padding:16px 32px; border-radius:30px; font-size:1.4rem; font-weight:800; border:1px solid var(--border); box-shadow:var(--shadow-sm);">Run audit to check eligibility.</div>
        <p id="guard-sub" style="margin-top:16px; color:var(--text-muted); font-size:0.95rem; line-height:1.6; max-width:600px; margin-left:auto; margin-right:auto;"></p>
      </div>

      <div class="kpi-row">
        <div class="kpi-card" style="border-color:var(--primary); background:rgba(13,148,136,0.03);"><div class="kpi-label" style="color:var(--primary);">Form Type Required</div><div class="kpi-val" id="guard-out-type" style="color:var(--primary);">15G</div></div>
