window.toggleDaysHelper = function(prefix) { const h = U.$(`#${prefix}-days-helper`); h.style.display = h.style.display === 'none' ? 'block' : 'none'; };
window.applyTargetDate = function(prefix) {
  const sDate = new Date(U.$(`#${prefix}-s`).value), tDate = new Date(U.$(`#${prefix}-target-date`).value);
  if (tDate <= sDate) return alert("Target date must be in the future.");
  let y = tDate.getFullYear() - sDate.getFullYear(), m = tDate.getMonth() - sDate.getMonth(), d = tDate.getDate() - sDate.getDate();
  if (d < 0) { m--; d += new Date(tDate.getFullYear(), tDate.getMonth(), 0).getDate(); }
  if (m < 0) { y--; m += 12; }
  U.$(`#${prefix}-ty`).value = y; U.$(`#${prefix}-tm`).value = m; U.$(`#${prefix}-td`).value = d;
  toggleDaysHelper(prefix); renderTargetedFYChips(prefix);
};

function renderTargetedFYChips(prefix) {
  const startDate = new Date(U.$(`#${prefix}-s`).value), ty = U.parse(U.$(`#${prefix}-ty`).value), tm = U.parse(U.$(`#${prefix}-tm`).value), td = U.$(`#${prefix}-td`) ? U.parse(U.$(`#${prefix}-td`).value) : 0;
  const chipContainer = U.$(`#${prefix}-fy-chips`);
  if (ty === 0 && tm === 0 && td === 0) return chipContainer.innerHTML = '<span class="helper-text">Enter tenure to view FYs.</span>';
  const maturityDate = U.addYMD(startDate, ty, tm, td);
  let chipsHTML = '', curr = new Date(startDate);
  while (curr <= maturityDate) {
    let fyEnd = U.getFYEnd(curr);
    if (fyEnd > startDate) {
      let fyStr = (fyEnd.getFullYear() - 1) + '-' + String(fyEnd.getFullYear()).slice(-2);
      if (!chipsHTML.includes(fyStr)) chipsHTML += `<label class="fy-chip"><input type="checkbox" class="fy-exempt-cb" value="${fyStr}"> FY ${fyStr}</label>`;
    }
    curr = U.addYMD(curr, 1, 0, 0);
  }
  chipContainer.innerHTML = chipsHTML || '<span class="helper-text">Tenure too short.</span>';
}

function handlePremiumToggle(e, prefix) {
