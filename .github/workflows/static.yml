function calculateCorporate() {
  const dr = U.parse(U.$('#corp-dr').value) / 100; // annual decimal
  const yearsIn = U.$$('.corp-year').map(x => Math.floor(U.parse(x.value)));
  const flowsIn = U.$$('.corp-cf').map(x => {
    const raw = String(x.value || '').replace(/,/g, '').trim();
    const n = parseFloat(raw);
    return Number.isFinite(n) ? n : 0;
  });

  if (!flowsIn.length) return;

  // Normalize into array by sorted year; missing years assumed 0
  let pairs = yearsIn.map((y, i) => ({ y, cf: flowsIn[i] }));
  pairs.sort((a, b) => a.y - b.y);
  const maxY = Math.max(...pairs.map(p => p.y));
  const flows = new Array(maxY + 1).fill(0);
  pairs.forEach(p => { if (p.y >= 0 && p.y < flows.length) flows[p.y] += p.cf; });

  const npv = flows.reduce((acc, cf, i) => acc + (cf / Math.pow(1 + dr, i)), 0);
  const irr = U.irr(flows, 0.1); // per year because flows are yearly

  U.animateKpiRupee(U.$('#corp-out-npv'), npv, { decimals: 0 });
  U.$('#corp-out-irr').textContent = (Number.isFinite(irr) ? (irr * 100).toFixed(2) : 0).toFixed(2) + '%';

  const hint = !Number.isFinite(irr) ? 'Needs review' : (npv >= 0 ? 'NPV Positive ✅' : 'NPV Negative ⚠️');
  U.$('#corp-out-hint').textContent = hint;

  const fmtR = v => (v < 0 ? `-₹${U.fmt(Math.abs(v), 0)}` : `₹${U.fmt(v, 0)}`);
  U.svgBarChart(U.$('#corp-chart'), flows.map((cf, i) => ({
    label: `Year ${i}`,
    value: Math.abs(cf),
    color: cf >= 0 ? 'var(--accent)' : 'var(--warn)',
    format: () => fmtR(cf)
  })), { width: 420, barHeight: 22, gap: 8, labelWidth: 88 });
}

