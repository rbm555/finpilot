        <h2 class="section-title" style="margin:0;">RD Parameters</h2>
        <select id="rd-mode" style="width:auto; padding:6px 12px; font-size:0.8rem; font-weight:600; background:var(--bg); border:1px solid var(--border);">
           <option value="fwd">Standard RD</option>
           <option value="rev">Target Goal (Reverse)</option>
        </select>
      </div>
      
      <div class="input-section" id="rd-inputs">
