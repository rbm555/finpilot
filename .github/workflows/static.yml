function calculatePortfolio() {
  const assets = [
    { id:'port-fd',   label:'FD & RDs',      color:'#3b82f6', type:'liquid'  },
    { id:'port-eq',   label:'Equity / MF',   color:'#10b981', type:'growth'  },
    { id:'port-ppf',  label:'PPF / SSY',     color:'#8b5cf6', type:'secure'  },
    { id:'port-gold', label:'Gold / SGB',    color:'#d97706', type:'hedge'   },
    { id:'port-nps',  label:'NPS / Pension', color:'#0284c7', type:'pension' },
    { id:'port-ulip', label:'ULIP / Insur.', color:'#6366f1', type:'insure'  },
    { id:'port-re',   label:'Real Estate',   color:'#94a3b8', type:'growth'  },
    { id:'port-cash', label:'Cash',          color:'#cbd5e1', type:'liquid'  },
  ];
  const vals    = assets.map(a => ({ ...a, value: U.parse(U.$('#' + a.id).value) }));
  const total   = vals.reduce((s, a) => s + a.value, 0);
  const age     = U.parse(U.$('#port-age').value);
  const income  = U.parse(U.$('#port-income').value);

  U.animateKpiRupee(U.$('#port-out-total'), total, { decimals: 0 });

  // Donut chart
  U.svgDonut(U.$('#port-donut'), vals.filter(a => a.value > 0).map(a => ({ label: a.label, value: a.value, color: a.color })), { size: 200 });

  // Allocation list
  const listEl = U.$('#port-alloc-list');
  listEl.innerHTML = vals.filter(a => a.value > 0).map(a => {
    const pct = total > 0 ? (a.value / total * 100).toFixed(1) : '0.0';
    return `<div class="port-alloc-row">
      <div style="width:100px; font-size:.82rem; font-weight:600; color:var(--text-main);">${a.label}</div>
      <div class="port-alloc-bar"><div class="port-alloc-fill" style="width:${pct}%; background:${a.color};"></div></div>
      <div style="width:50px; text-align:right; font-size:.82rem; font-weight:700;">${pct}%</div>
      <div style="width:110px; text-align:right; font-size:.82rem; color:var(--text-muted);">₹${U.fmt(a.value,0)}</div>
    </div>`;
  }).join('');

  // Risk score: 0-10
  const eqVal   = U.parse(U.$('#port-eq').value) + U.parse(U.$('#port-ulip').value) * 0.5;
  const riskPct = total > 0 ? (eqVal / total * 100) : 0;
  let riskLabel, riskColor;
  if (riskPct < 25)      { riskLabel = '🛡️ Conservative'; riskColor = '#3b82f6'; }
  else if (riskPct < 50) { riskLabel = '⚖️ Moderate';     riskColor = '#f59e0b'; }
  else if (riskPct < 70) { riskLabel = '📈 Moderately Aggressive'; riskColor = '#f97316'; }
  else                   { riskLabel = '🔥 Aggressive';   riskColor = '#ef4444'; }
  U.$('#port-risk-label').textContent  = riskLabel;
  U.$('#port-risk-label').style.color  = riskColor;
  const meterEl = U.$('#port-risk-meter');
  meterEl.innerHTML = [riskColor, '#f59e0b', '#f97316', '#ef4444'].map((c, i) => {
    const active = riskPct >= i * 25;
    return `<div class="port-risk-seg" style="background:${active ? c : 'var(--border)'}; width:28px; height:10px; border-radius:3px;"></div>`;
  }).join('');

  // Advisory
  const liqPct   = total > 0 ? ((U.parse(U.$('#port-fd').value) + U.parse(U.$('#port-cash').value)) / total * 100) : 0;
  const advPoints = [];
  if (liqPct < 10) advPoints.push(`⚠️ <strong>Emergency Fund Gap:</strong> Liquid assets (FD + Cash) are only ${liqPct.toFixed(1)}% of the portfolio. Recommended minimum is 10-15% (ideally 6 months of expenses).`);
  if (riskPct > 70 && age > 55) advPoints.push(`⚠️ <strong>Equity Overweight for Age:</strong> ${riskPct.toFixed(1)}% in growth assets is high for age ${age}. Consider systematic shift to debt/FD.`);
  if (U.parse(U.$('#port-ppf').value) < income * 0.05) advPoints.push(`💡 <strong>Boost Long-Term Security:</strong> PPF/SSY allocation is below 5% of annual income. Tax-free sovereign instruments are under-utilised.`);
  if (U.parse(U.$('#port-gold').value) === 0) advPoints.push(`💡 <strong>Zero Gold Hedge:</strong> No allocation to Gold/SGB. Consider 5-10% as inflation hedge. SGB offers additional 2.5% coupon over physical gold.`);
  if (U.parse(U.$('#port-nps').value) === 0) advPoints.push(`💡 <strong>NPS Not Utilised:</strong> An additional ₹50,000 tax deduction under Sec 80CCD(1B) is being missed — this saves ₹${U.fmt(50000*(U.parse(U.$('#port-income').value)>1000000?0.30:0.20),0)} in taxes per year.`);
  if (!advPoints.length) advPoints.push(`✅ <strong>Well Balanced Portfolio!</strong> Your allocation appears diversified across liquidity, growth, security, and hedge. Review annually and rebalance if any asset class drifts by >5%.`);
  U.$('#port-advisory').innerHTML = advPoints.join('<br><br>');
}

/* ═══════════════════════════════════════════════════════════════════════════
   HINDI / ENGLISH BILINGUAL TOGGLE
   ─────────────────────────────────────────────────────────────────────────── */
let _isHindi = false;
function toggleHindi() {
  _isHindi = !_isHindi;
  document.body.classList.toggle('hindi-mode', _isHindi);
  U.showToast(_isHindi ? 'भाषा बदली: हिन्दी' : 'Language: English');
}

/* ═══════════════════════════════════════════════════════════════════════════
   PDF DOWNLOAD — PRINT-TO-PDF BRANDED PROPOSAL
   ─────────────────────────────────────────────────────────────────────────── */
function downloadPDF() {
  const cfg = JSON.parse(localStorage.getItem('advisory_print_config') || '{}');
  // Inject branded header into PDF
  let hdr = U.$('.pdf-brand-header');
  if (!hdr) {
    hdr = document.createElement('div');
    hdr.className = 'pdf-brand-header no-print-display';
    document.body.insertBefore(hdr, document.body.firstChild);
  }
  hdr.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div style="font-size:1.2rem; font-weight:800;">${cfg.branch || 'Branch Advisory OS'}</div>
        <div style="font-size:.85rem; color:#555;">${cfg.city || ''}</div>
      </div>
      <div style="text-align:right; font-size:.82rem; color:#555;">
        <div style="font-weight:700;">${cfg.advisor || ''}</div>
        <div>${cfg.phone || ''}</div>
        <div>Generated: ${new Date().toLocaleString('en-IN')}</div>
      </div>
    </div>`;
  const wm = document.createElement('div');
  wm.className = 'pdf-watermark';
  wm.textContent = 'Finpilot Advisory OS — Advisory Use Only';
  document.body.appendChild(wm);
  // Make the disclaimer visible for printing
  const discEl = U.$('.fp-print-disclaimer');
  if (discEl) discEl.style.display = 'block';
  const cleanup = () => {
    if (wm.parentNode) wm.parentNode.removeChild(wm);
    if (discEl) discEl.style.display = '';
    window.removeEventListener('afterprint', cleanup);
  };
  window.addEventListener('afterprint', cleanup);
  window.print();
}


/* ═══════════════════════════════════════════════════════════════════════════
   UNIVERSAL: Save for Client (CRM Quick-Save)
   ─────────────────────────────────────────────────────────────────────────── */
function saveForClient() {
  // Collect KPIs from current results area
  const kpis = U.$$('.kpi-card');
  let snapshot = '';
  kpis.forEach(k => {
    const lbl = k.querySelector('.kpi-label')?.textContent?.trim() || '';
    const val = k.querySelector('.kpi-val')?.textContent?.trim() || '';
    if (lbl && val && val !== '₹0' && val !== '0%') snapshot += `${lbl}: ${val}; `;
  });
  if (!snapshot) { U.showToast('No results to save — calculate first.', true); return; }

  const modName = document.title || 'Advisory OS';
  const modKey  = sessionStorage.getItem('advisory_current_module') || 'general';
  const modLabels = {
    'fd':'Fixed Deposit','rd':'Recurring Deposit','scss':'SCSS Pension',
    'ppf':'PPF Simulator','ssy':'SSY Planner','mf':'Mutual Fund',
    'goal':'Goal Planner','emi':'EMI Saver','ladder':'FD Ladder',
    'adv-emi':'Advanced EMI','fd-matrix':'FD Matrix','sgb':'SGB',
    'nps':'NPS Planner','pro-debt':'Debt Destroyer','pro-shock':'Rate Shock',
    'pro-corp':'Corporate Evaluator','pro-swp':'SWP vs FD','ulip':'ULIP',
    'break':'Break vs Borrow','pro-harvest':'Tax Harvester','pro-sweep':'Lazy Money',
    '15g':'15G/H Guard','crm':'CRM','portfolio':'Portfolio'
  };
  const label = modLabels[modKey] || modKey;

  // Show quick-save modal
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:3000;';
  modal.innerHTML = `
    <div style="background:var(--surface);border-radius:var(--radius-lg);padding:28px;width:90%;max-width:420px;box-shadow:var(--shadow-lg);">
      <div style="font-size:1rem;font-weight:700;margin-bottom:16px;">💾 Save Results for Client</div>
      <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:14px;padding:10px 12px;background:var(--surface-hover);border-radius:var(--radius-sm);line-height:1.5;">
        📸 <strong>${label}:</strong> ${snapshot.slice(0,180)}${snapshot.length>180?'…':''}
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <label style="font-size:.78rem;font-weight:500;color:var(--text-muted);">Client Name *</label>
        <input type="text" id="qsave-name" placeholder="e.g. Suresh Kumar" list="qsave-clients" style="width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-hover);color:var(--text-main);font-size:.9rem;margin-top:4px;">
        <datalist id="qsave-clients">${Object.values(crmLoad()).map(c=>`<option value="${c.name}">`).join('')}</datalist>
      </div>
      <div class="form-group" style="margin-bottom:18px;">
        <label style="font-size:.78rem;font-weight:500;color:var(--text-muted);">Notes (optional)</label>
        <textarea id="qsave-notes" rows="2" style="width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-hover);color:var(--text-main);font-size:.88rem;resize:none;margin-top:4px;"></textarea>
      </div>
      <div style="display:flex;gap:10px;">
        <button onclick="this.closest('[style*="position:fixed"]').remove()" style="flex:1;padding:11px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);cursor:pointer;font-size:.88rem;font-weight:600;">Cancel</button>
        <button onclick="window._doQuickSave()" style="flex:2;padding:11px;background:var(--primary);color:var(--primary-fg);border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:.88rem;font-weight:700;">Save to Client Vault</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  setTimeout(() => document.getElementById('qsave-name')?.focus(), 60);

  window._doQuickSave = function() {
    const name = (document.getElementById('qsave-name')?.value || '').trim();
    if (!name) { U.showToast('Enter client name.', true); return; }
    const notes = document.getElementById('qsave-notes')?.value || '';
    const db  = crmLoad();
    const key = name.toLowerCase().replace(/\s+/g,'_');
    const existing = db[key] || {};
    db[key] = {
      name,
      phone:    existing.phone || '',
      age:      existing.age   || '',
      risk:     existing.risk  || 'moderate',
      notes:    notes || existing.notes || '',
      snapshot: snapshot,
      module:   modKey,
      saved:    new Date().toLocaleString('en-IN')
    };
    crmSave(db);
    modal.remove();
    U.showToast(`✅ Saved to "${name}" in Client Vault!`);
  };
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
}
window.saveForClient = saveForClient;

// Initialize Application — restore last visited module (or default to FD)
window.addEventListener('DOMContentLoaded', () => {
  const last = sessionStorage.getItem('advisory_current_module') || 'fd';
  loadModule(last);
});

</script>
</body>
