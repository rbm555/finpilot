            <label>Other Non-Interest Income (₹)</label>
            <input type="text" id="guard-other" inputmode="numeric" pattern="[0-9,]*" value="50,000">
            <div class="helper-text">Salary, Pension, Rent, Business Income, etc.</div>
          </div>
        </div>
      </div>
      <button class="btn-primary" id="guard-calc">Run Compliance Audit</button>
    </div>
    
    <div class="results-area">
      <div class="fp-card" style="padding:40px; text-align:center; margin-bottom:24px;">
