  U.bindFormat(U.$('#emi-p'));
  U.bindFormat(U.$('#emi-extra'));
  U.bindFormat(U.$('#emi-lump'));

  // Strategy bar
  U.$('#emi-strategy-bar', container).addEventListener('click', e => {
    if (!e.target.classList.contains('seg-btn')) return;
    U.$$('.seg-btn', U.$('#emi-strategy-bar', container)).forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    const v = e.target.dataset.val;
    U.$('#emi-recurring-row').style.display = (v === 'lumpsum') ? 'none' : '';
    U.$('#emi-lumpsum-row').style.display   = (v === 'recurring') ? 'none' : '';
    calculateEMI();
  });

  U.$('#emi-calc').onclick = calculateEMI;
  setTimeout(calculateEMI, 50);
}

function calculateEMI() {
  const P   = U.parse(U.$('#emi-p').value);
  const N   = U.parse(U.$('#emi-n').value);
  const R   = U.parse(U.$('#emi-r').value);
  if (P <= 0 || N <= 0 || R <= 0) return;

  const strategy = (U.$('.seg-btn.active', U.$('#emi-strategy-bar')) || {}).dataset?.val || 'recurring';
  const extra    = strategy !== 'lumpsum' ? U.parse(U.$('#emi-extra').value) : 0;
  const lump     = strategy !== 'recurring' ? U.parse(U.$('#emi-lump').value) : 0;
  const lumpMo   = strategy !== 'recurring' ? Math.max(1, U.parse(U.$('#emi-lump-mo').value)) : 0;

  const r       = (R / 100) / 12;
  const baseEmi = P * r * Math.pow(1 + r, N) / (Math.pow(1 + r, N) - 1);
  const oldTotalInt = (baseEmi * N) - P;

  // Amortize with prepayment
  let bal = P, newN = 0, newTotalInt = 0;
  const newEmi = baseEmi + extra;
  let rows = [];

  while (bal > 0.01 && newN < 1200) {
    newN++;
    const ip  = bal * r;
    let   pp  = newEmi - ip; if (pp < 0) pp = 0; if (pp > bal) pp = bal;
    newTotalInt += ip;
    bal -= pp;
    // Lumpsum drop after EMI at chosen month
    if (lump > 0 && newN === lumpMo) { const applied = Math.min(lump, bal); bal -= applied; }
    if (newN <= 24) rows.push({ mo: newN, emi: Math.round(newEmi + (newN === lumpMo ? lump : 0)), interest: Math.round(ip), principal: Math.round(pp + (newN === lumpMo ? Math.min(lump, bal + Math.min(lump,bal)) : 0)), balance: Math.round(Math.max(0, bal)) });
  }

  const savedInt  = Math.max(0, oldTotalInt - newTotalInt);
  const savedTime = Math.max(0, N - newN);

  U.animateKpiRupee(U.$('#emi-out-base'), baseEmi, { decimals: 0 });
  U.animateKpiRupee(U.$('#emi-out-new'),  newEmi,  { decimals: 0 });
  U.animateKpiRupee(U.$('#emi-old-int'),  oldTotalInt, { decimals: 0 });
  U.animateKpiRupee(U.$('#emi-saved-int'), savedInt, { decimals: 0 });
  const oi2 = U.$('#emi-old-int2'); if (oi2) oi2.textContent = '₹' + U.fmt(oldTotalInt, 0);
  U.$('#emi-old-time').textContent  = `${N} Mos (${(N/12).toFixed(1)} Yrs)`;
  const si2 = U.$('#emi-saved-int2'); if (si2) si2.textContent = '₹' + U.fmt(savedInt, 0);
  U.$('#emi-saved-time').textContent = `${savedTime} Mos (${(savedTime/12).toFixed(1)} Yrs)`;

  currentLedgerData = rows;
  const tbl = U.$('#emi-table');
  if (tbl) tbl.innerHTML = `<table><thead><tr><th>Month</th><th>EMI / Pymt (₹)</th><th>Interest (₹)</th><th>Principal (₹)</th><th>Balance (₹)</th></tr></thead><tbody>
    ${rows.map(r => `<tr ${r.mo === lumpMo && lump > 0 ? 'style="background:rgba(13,148,136,0.06);"' : ''}>
      <td style="font-weight:700;color:var(--text-muted);">${r.mo}${r.mo === lumpMo && lump > 0 ? ' 💰' : ''}</td>
      <td class="num">${U.fmt(r.emi, 0)}</td>
      <td class="num text-warn">${U.fmt(r.interest, 0)}</td>
      <td class="num text-accent">${U.fmt(r.principal, 0)}</td>
      <td class="num" style="font-weight:700;">${U.fmt(r.balance, 0)}</td>
    </tr>`).join('')}
  </tbody></table>`;
}


