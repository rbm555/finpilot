        <div class="aemi-panel" id="aemi-panel-amortisation" style="display:none;">
          <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;" class="no-print">
            <div style="display:flex;gap:6px;">
              <button class="aemi-scen-tab" data-scen="a" style="padding:4px 14px;border-radius:16px;border:2px solid var(--primary);background:var(--primary);color:#fff;font-size:.73rem;font-weight:700;cursor:pointer;">Scenario A</button>
              <button class="aemi-scen-tab" data-scen="b" style="padding:4px 14px;border-radius:16px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-size:.73rem;font-weight:700;cursor:pointer;">Scenario B</button>
