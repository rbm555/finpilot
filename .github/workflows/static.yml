    <div class="results-area">
      <div class="print-header"><h2 style="margin:0; font-size:1.8rem; color:var(--text-main);">Recurring Deposit Statement</h2><div id="rd-print-context" style="color:var(--text-muted); font-size:0.95rem; margin-top:8px; line-height:1.5;"></div></div>
      <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-label" id="rd-l-1">Total Invested</div><div class="kpi-val" id="rd-out-p">₹0</div></div>
        <div class="kpi-card"><div class="kpi-label">Gross Interest</div><div class="kpi-val text-accent" id="rd-out-i">₹0</div></div>
        <div class="kpi-card" id="rd-c-3"><div class="kpi-label">TDS Deducted</div><div class="kpi-val text-warn" id="rd-out-t">₹0</div></div>
        <div class="kpi-card" style="border: 1px solid var(--border); box-shadow: var(--shadow-md);"><div class="kpi-label" id="rd-l-4">Net Maturity</div><div class="kpi-val" id="rd-out-m">₹0</div></div>
      </div>
      
      <div class="fp-card no-print" style="padding:24px; margin-bottom:24px;" id="rd-viz-container">
