      <div class="print-footer" style="color:var(--text-muted);"><div><strong>System Generated</strong> | Timestamp: <span id="fd-print-time"></span></div><div><strong>Authorized Signatory:</strong> ________________________</div></div>
    </div>
  `;

  U.bindFormat(U.$('#fd-p'));
  U.$('#fd-premium-bar').addEventListener('click', e => handlePremiumToggle(e, 'fd'));
  U.$('#fd-r').addEventListener('input', () => { 
      const premium = parseFloat(U.$('.seg-btn.active', U.$('#fd-premium-bar')).dataset.val);
      U.$('#fd-eff-rate-label').innerHTML = `Effective Rate: <strong class="text-main">${(U.parse(U.$('#fd-r').value) + premium).toFixed(2)}%</strong>`;
  });

  const renderFY = () => renderTargetedFYChips('fd');
  ['#fd-s', '#fd-ty', '#fd-tm', '#fd-td'].forEach(id => U.$(id).addEventListener('change', renderFY));
  renderFY();
  
  // Wire payout bar
  U.$$('.seg-btn', U.$('#fd-payout-bar')).forEach(btn => {
    btn.addEventListener('click', () => {
      U.$$('.seg-btn', U.$('#fd-payout-bar')).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const val = btn.dataset.val;
      const hintEl = U.$('#fd-payout-hint');
      const hints = {
        'cumulative':  'Cumulative (Reinvestment) — interest compounded quarterly, paid at maturity. Maximises final corpus.',
        'monthly':     '⚠️ Monthly Payout — Indian banks apply a discount (~0.25–0.50% p.a.) on monthly payout FDs since interest is paid early.',
        'quarterly':   'Quarterly Payout — interest paid every 3 months at the nominal rate. No compounding.',
        'halfyearly':  'Half-Yearly Payout — interest paid every 6 months at the nominal rate.',
        'annual':      'Annual Payout — interest paid once per year at the nominal rate.'
      };
      if (hintEl) hintEl.innerHTML = hints[val] || '';
      calculateFDEventLedger();
    });
  });
  U.$('#fd-calc').onclick = calculateFDEventLedger;
  setTimeout(calculateFDEventLedger, 50);
}

function calculateFDEventLedger() {
  const P = U.parse(U.$('#fd-p').value);
  const baseRate = U.parse(U.$('#fd-r').value);
  const premiumRate = parseFloat(U.$('.seg-btn.active', U.$('#fd-premium-bar')).dataset.val);
  // Payout mode
  const payoutBar = U.$('#fd-payout-bar');
  const payoutMode = payoutBar ? (U.$('.seg-btn.active', payoutBar)?.dataset?.val || 'cumulative') : 'cumulative';
  // Monthly payout: Indian banks typically discount the rate by ~0.25%
  const monthlyDiscount = 0.25;
  const effectiveRate = payoutMode === 'monthly' ? Math.max(0.01, (baseRate + premiumRate) - monthlyDiscount) : (baseRate + premiumRate);
  const R = effectiveRate;
  
  const ty = U.parse(U.$('#fd-ty').value);
  const tm = U.parse(U.$('#fd-tm').value);
  const td = U.parse(U.$('#fd-td').value);
  const startDate = new Date(U.$('#fd-s').value);
  
  const isSenior = U.$('#fd-senior').checked;
  const noPan = U.$('#fd-pan').checked;
  const exemptFYs = new Set(U.$$('.fy-exempt-cb:checked').map(cb => cb.value));

  U.clearErrors(U.$('#fd-inputs'));
  let hasError = false;
  if (P <= 0) { U.setError(U.$('#fd-p'), 'Principal must be greater than ₹0'); hasError = true; }
  if (baseRate <= 0) { U.setError(U.$('#fd-r'), 'Interest rate required'); hasError = true; }
  if (ty === 0 && tm === 0 && td === 0) {
    U.setError(U.$('#fd-ty'), 'Enter at least 1 month tenure');
    hasError = true;
  }
  if (hasError) {
    U.$('#fd-table-container').innerHTML = '<div style="padding:32px; text-align:center; color:var(--warn); font-weight:500;">Please fix the highlighted fields above.</div>';
    const dEl = U.$('#fd-pro-donut'), bEl = U.$('#fd-pro-bars');
    if (dEl) U.svgClear(dEl);
    if (bEl) U.svgClear(bEl);
    return;
  }

  const maturityDate = U.addYMD(startDate, ty, tm, td);
  const threshold = isSenior ? 50000 : 40000;
  const baseTdsRate = noPan ? 0.20 : 0.10;
  
  let events = [{ date: new Date(startDate), type: 'DEPOSIT', desc: 'Account Opened' }];
  let qDate = new Date(startDate); 
  
  while (true) { 
      qDate = U.addYMD(qDate, 0, 3, 0); 
      if (qDate >= maturityDate) break; 
      events.push({ date: new Date(qDate), type: 'COMPOUND', desc: 'Quarterly Interest' }); 
  }
  
  let fyDate = new Date(startDate); 
  while (true) { 
    let fyEnd = U.getFYEnd(fyDate); 
    if (fyEnd >= maturityDate) break; 
    if (fyEnd > startDate) {
        events.push({ date: new Date(fyEnd), type: 'FY_END', desc: `FY End Check`, fyKey: (fyEnd.getFullYear()-1)+'-'+String(fyEnd.getFullYear()).slice(-2) }); 
    }
    fyDate = U.addYMD(fyDate, 1, 0, 0); 
  }
  
  events.push({ date: new Date(maturityDate), type: 'MATURITY', desc: 'Maturity & Final Payout' });
  events.sort((a, b) => a.date.getTime() === b.date.getTime() ? ({'DEPOSIT':1, 'COMPOUND':2, 'FY_END':3, 'MATURITY':4}[a.type] - {'DEPOSIT':1, 'COMPOUND':2, 'FY_END':3, 'MATURITY':4}[b.type]) : a.date - b.date);

  let balance = P, uncapitalizedInterest = 0, fyAccruedInterest = 0, totalTDS = 0, totalGrossInterest = 0, ledgerRows = [], lastDate = new Date(startDate);

  events.forEach(ev => {
    let days = U.daysBetween(lastDate, ev.date);
    let stepInterest = 0;
    
    if (days > 0) { 
        stepInterest = (balance * R * days) / 36500; 
        uncapitalizedInterest += stepInterest; 
        fyAccruedInterest += stepInterest; 
        totalGrossInterest += stepInterest; 
    }
    
    if (ev.type === 'COMPOUND' || ev.type === 'MATURITY') { 
        if (uncapitalizedInterest > 0) { 
            balance += uncapitalizedInterest; 
            ledgerRows.push({ date: U.formatDate(ev.date), desc: ev.desc, debit: '-', credit: `+ ${U.fmt(uncapitalizedInterest)}`, bal: U.fmt(balance) }); 
            uncapitalizedInterest = 0; 
        } 
    }
    
    if (ev.type === 'FY_END' || ev.type === 'MATURITY') {
      if(ev.type === 'FY_END') ledgerRows.push({ date: U.formatDate(ev.date), desc: ev.desc, debit: '-', credit: '-', bal: U.fmt(balance) });
      let currentFyKey = ev.fyKey || (U.getFYEnd(ev.date).getFullYear()-1+'-'+String(U.getFYEnd(ev.date).getFullYear()).slice(-2));
      
      if (fyAccruedInterest > threshold && !exemptFYs.has(currentFyKey)) { 
        let tdsAmount = fyAccruedInterest * baseTdsRate; 
        balance -= tdsAmount; 
        totalTDS += tdsAmount; 
        ledgerRows.push({ date: U.formatDate(ev.date), desc: `TDS Deducted (${currentFyKey})`, debit: `- ${U.fmt(tdsAmount)}`, credit: '-', bal: U.fmt(balance) }); 
      }
      fyAccruedInterest = 0; 
    }
    
    if (ev.type === 'DEPOSIT') {
        ledgerRows.push({ date: U.formatDate(ev.date), desc: ev.desc, debit: '-', credit: U.fmt(P), bal: U.fmt(balance) });
    }
    lastDate = ev.date;
  });

  currentLedgerData = ledgerRows;
  U.animateKpiRupee(U.$('#fd-out-p'), P);
  U.animateKpiRupee(U.$('#fd-out-i'), totalGrossInterest);
  U.animateKpiRupee(U.$('#fd-out-t'), totalTDS);

  // Payout mode: show periodic payout KPI
  const payoutKpiCard  = U.$('#fd-payout-kpi');
  const payoutKpiLabel = U.$('#fd-payout-kpi-label');
  const payoutKpiVal   = U.$('#fd-out-payout');
  const matLabel       = U.$('#fd-mat-label');
  const totalDays      = U.daysBetween(startDate, maturityDate) || 1;
  const totalYears     = totalDays / 365.25;

  if (payoutMode === 'cumulative') {
    if (payoutKpiCard) payoutKpiCard.style.display = 'none';
    if (matLabel)      matLabel.textContent = 'Net Maturity (Cumulative)';
    U.animateKpiRupee(U.$('#fd-out-m'), balance);
  } else {
    // Non-cumulative: principal returned at maturity, periodic payouts = simple interest
    const freqMap    = { monthly: 12, quarterly: 4, halfyearly: 2, annual: 1 };
    const freqLabel  = { monthly: '/ Month', quarterly: '/ Quarter', halfyearly: '/ 6 Months', annual: '/ Year' };
    const freq       = freqMap[payoutMode] || 4;
    const perPayout  = (P * R / 100) / freq;
    const totalPay   = perPayout * Math.round(totalYears * freq);
    const netPayout  = perPayout * (1 - (totalTDS > 0 ? (noPan ? 0.20 : 0.10) : 0));
    if (payoutKpiCard)  payoutKpiCard.style.display = '';
    if (payoutKpiLabel) payoutKpiLabel.textContent = 'Payout ' + (freqLabel[payoutMode] || '');
    if (payoutKpiVal)   { U.animateKpiRupee(payoutKpiVal, netPayout); }
    if (matLabel)       matLabel.textContent = 'Principal Returned';
    U.animateKpiRupee(U.$('#fd-out-m'), P); // principal returned at maturity
    // Update gross interest to total periodic interest
    U.animateKpiRupee(U.$('#fd-out-i'), totalPay);
  }

  // Denominator = P + grossInterest ensures all three segments sum to exactly 100%
  const vizTotal = P + totalGrossInterest || 1;
  const pPct = (P / vizTotal) * 100;
  const iPct = ((totalGrossInterest - totalTDS) / vizTotal) * 100;
  const tPct = totalTDS > 0 ? (totalTDS / vizTotal) * 100 : 0;
  const netIntFD = Math.max(0, totalGrossInterest - totalTDS);
  const ruFmt = (v) => '₹' + U.fmt(v);

  U.$('#fd-viz-bar').innerHTML = `<div class="viz-segment" style="background:var(--border); width:${pPct}%"></div><div class="viz-segment" style="background:var(--accent); width:${iPct}%"></div>${tPct > 0 ? `<div class="viz-segment" style="background:var(--warn); width:${tPct}%"></div>` : ''}`;
  U.$('#fd-viz-legend').innerHTML = `<div><span class="viz-dot" style="background:var(--border);"></span>Principal</div><div><span class="viz-dot" style="background:var(--accent);"></span>Net Yield</div>${tPct > 0 ? `<div><span class="viz-dot" style="background:var(--warn);"></span>TDS Deducted</div>` : ''}`;

  const donutEl = U.$('#fd-pro-donut');
  const barEl = U.$('#fd-pro-bars');
  if (donutEl) {
    U.svgDonut(donutEl, [
      { label: 'Principal', value: P, color: '#94a3b8' },
      { label: 'Net interest', value: netIntFD, color: '#10b981' },
      { label: 'TDS', value: totalTDS, color: '#ef4444' },
    ], { innerRatio: 0.6 });
  }
  if (barEl) {
    U.svgBarChart(barEl, [
      { label: 'Principal', value: P, color: '#94a3b8', format: ruFmt },
      { label: 'Net interest', value: netIntFD, color: '#10b981', format: ruFmt },
      { label: 'TDS', value: totalTDS, color: '#ef4444', format: ruFmt },
    ], { width: 320, barHeight: 26 });
  }
  
  // For non-cumulative payout FDs: generate simple periodic payout schedule
  if (payoutMode !== 'cumulative') {
    const freqMonths = { monthly:1, quarterly:3, halfyearly:6, annual:12 }[payoutMode] || 3;
    const freqLabel  = { monthly:'Monthly', quarterly:'Quarterly', halfyearly:'Half-Yearly', annual:'Annual' }[payoutMode];
    const tdsRate    = totalTDS > 0 ? (noPan ? 0.20 : 0.10) : 0;
    const grossPayout = (P * R / 100) * freqMonths / 12;
    const netPayout   = grossPayout * (1 - tdsRate);
    const tdsOnPayout = grossPayout * tdsRate;
    let payoutRows = [], d = new Date(startDate), rowNum = 0;
    d = new Date(d.getFullYear(), d.getMonth() + freqMonths, d.getDate());
    while (d <= maturityDate) {
      rowNum++;
      payoutRows.push(`<tr>
        <td style="color:var(--text-muted);font-weight:500;">${U.formatDate(d)}</td>
        <td>${freqLabel} Interest Payout #${rowNum}</td>
        <td class="num text-warn">${tdsOnPayout > 0 ? '- ' + U.fmt(tdsOnPayout) : '—'}</td>
        <td class="num text-accent">+ ${U.fmt(netPayout)}</td>
        <td class="num" style="font-weight:600;">₹${U.fmt(P)} (Principal)</td>
      </tr>`);
      const next = new Date(d); next.setMonth(next.getMonth() + freqMonths); d = next;
    }
    // Final row — principal return
    payoutRows.push(`<tr style="font-weight:700; background:rgba(16,185,129,.05);">
      <td style="color:var(--text-muted);">${U.formatDate(maturityDate)}</td>
      <td>✅ Principal Returned at Maturity</td>
      <td class="num">—</td>
      <td class="num text-accent">+ ${U.fmt(P)}</td>
      <td class="num" style="color:var(--accent);">Closed</td>
    </tr>`);
    currentLedgerData = payoutRows.map((r,i)=>({ '#': i+1, Row: r.replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim() }));
    U.$('#fd-table-container').innerHTML = `<table><thead><tr>
      <th>Payout Date</th><th>Description</th>
      <th>TDS (₹)</th><th>Net Payout (₹)</th><th>Principal</th>
    </tr></thead><tbody>${payoutRows.join('')}</tbody></table>`;
  } else {
    U.$('#fd-table-container').innerHTML = `<table><thead><tr><th>Date</th><th>Transaction Details</th><th>Debit (₹)</th><th>Credit (₹)</th><th>Running Balance (₹)</th></tr></thead><tbody>${ledgerRows.map(r => `<tr><td style="color:var(--text-muted); font-weight:500;">${r.date}</td><td>${r.desc}</td><td class="num text-warn">${r.debit}</td><td class="num text-accent">${r.credit}</td><td class="num" style="font-weight:600; color:var(--text-main);">${r.bal}</td></tr>`).join('')}</tbody></table>`;
  }
  
  const exemptStr = exemptFYs.size > 0 ? Array.from(exemptFYs).join(', ') : 'None';
  const payoutModeLabel = { cumulative:'Cumulative (Reinvestment)', monthly:'Monthly Payout (Discounted Rate)', quarterly:'Quarterly Payout', halfyearly:'Half-Yearly Payout', annual:'Annual Payout' }[payoutMode] || payoutMode;
  U.$('#fd-print-context').innerHTML = `<strong>Principal:</strong> ₹${U.fmt(P)} &nbsp;|&nbsp; <strong>Rate:</strong> ${R.toFixed(2)}% p.a. &nbsp;|&nbsp; <strong>Payout:</strong> ${payoutModeLabel}<br><strong>Tenure:</strong> ${U.formatDate(startDate)} → ${U.formatDate(maturityDate)} &nbsp;|&nbsp; <strong>15G/H Exempt FYs:</strong> ${exemptStr}`;
  U.$('#fd-print-time').textContent = new Date().toLocaleString('en-IN');
}

/* =========================================
   2. RECURRING DEPOSIT (RD) + REVERSE MODE
   ========================================= */
