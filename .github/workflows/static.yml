        <div class="toggle-row"><span class="toggle-label">No PAN (20% TDS)</span><input type="checkbox" id="rd-pan" class="ios-toggle"></div>
        <div class="toggle-row" style="margin-top:8px;"><span class="toggle-label">Senior (₹50k Limit)</span><input type="checkbox" id="rd-senior" class="ios-toggle"></div>
        <div class="form-group" style="margin-top:12px;"><label style="font-size:0.75rem;">Targeted 15G/15H Exemptions</label><div id="rd-fy-chips" class="fy-chip-wrap"></div></div>
      </div>
      <button class="btn-primary" id="rd-calc">Generate Ledger</button>
