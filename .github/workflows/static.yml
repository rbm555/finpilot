     U.$('#rd-a').value = isRev ? "5,00,000" : "10,000";
     
     U.$('#rd-tax-section').style.display = isRev ? 'none' : 'block';
     U.$('#rd-c-3').style.display = isRev ? 'none' : 'block'; // Hide TDS KPI
     U.$('#rd-viz-container').style.display = isRev ? 'none' : 'block'; // Hide Visualizer
     U.$('#rd-table-wrap').style.display = isRev ? 'none' : 'block'; // Hide Ledger
     
     U.$('#rd-calc').textContent = isRev ? "Calculate Required Monthly SIP" : "Generate Ledger";
     calculateRDEventLedger();
  });

  const renderFY = () => renderTargetedFYChips('rd');
  ['#rd-s', '#rd-ty', '#rd-tm'].forEach(id => U.$(id).addEventListener('change', renderFY));
  renderFY();
  
  U.$('#rd-calc').onclick = calculateRDEventLedger; 
  setTimeout(calculateRDEventLedger, 50);
}

function calculateRDEventLedger() {
  const isRev = U.$('#rd-mode').value === 'rev';
  const val = U.parse(U.$('#rd-a').value);
  const baseRate = U.parse(U.$('#rd-r').value);
  const premiumRate = parseFloat(U.$('.seg-btn.active', U.$('#rd-premium-bar')).dataset.val);
  const R = baseRate + premiumRate;
  
  const ty = U.parse(U.$('#rd-ty').value);
  const tm = U.parse(U.$('#rd-tm').value);
  const startDate = new Date(U.$('#rd-s').value);
  const totalMonths = (ty * 12) + tm;
  
  const rdInputs = U.$('#rd-inputs') || U.$('.command-center');
  U.clearErrors(rdInputs);
  let hasRDError = false;
  if (val <= 0) { U.setError(U.$('#rd-a'), isRev ? 'Target amount required' : 'Monthly instalment required'); hasRDError = true; }
  if (baseRate <= 0) { U.setError(U.$('#rd-r'), 'Interest rate required'); hasRDError = true; }
  if (totalMonths <= 0) { U.setError(U.$('#rd-ty'), 'Tenure must be at least 1 month'); hasRDError = true; }
  if (hasRDError) return;

  // REVERSE RD MATH (Target Goal) — uses quarterly compounding per Indian bank practice
  if (isRev) {
      // Indian RD compounds quarterly. Convert to equivalent monthly rate first:
      //   qRate  = R/400  (quarterly rate)
      //   monthlyRate_equiv = (1 + qRate)^(1/3) - 1
      // Then apply standard FV-of-annuity:
      //   FV = P × [(1 + mR)^n - 1] / mR
      //   → P = FV × mR / [(1 + mR)^n - 1]
      const qRate     = (R / 100) / 4;
      const monthlyR  = Math.pow(1 + qRate, 1 / 3) - 1;
      const requiredM = val * monthlyR / (Math.pow(1 + monthlyR, totalMonths) - 1);
      const totalInv  = requiredM * totalMonths;

      U.$('#rd-l-1').textContent = "Required Monthly SIP";
      U.animateKpiRupee(U.$('#rd-out-p'), requiredM, { decimals: 0 });
      U.animateKpiRupee(U.$('#rd-out-i'), val - totalInv, { decimals: 0 });
      U.$('#rd-l-4').textContent = "Target Goal";
      U.animateKpiRupee(U.$('#rd-out-m'), val, { decimals: 0 });
      return;
  }

  // FORWARD RD MATH (Standard Ledger)
  const M = val;
  const maturityDate = U.addYMD(startDate, 0, totalMonths, 0);
  const isSenior = U.$('#rd-senior').checked;
  const noPan = U.$('#rd-pan').checked;
  const exemptFYs = new Set(U.$$('.fy-exempt-cb:checked').map(cb => cb.value));
  const threshold = isSenior ? 50000 : 40000;
  const baseTdsRate = noPan ? 0.20 : 0.10;
  
  let events = []; 
  for (let i = 0; i < totalMonths; i++) {
      events.push({ date: U.addYMD(startDate, 0, i, 0), type: 'DEPOSIT', desc: `Installment ${i + 1}` });
  }
  
  let qDate = new Date(startDate); 
  while (true) { 
      qDate = U.addYMD(qDate, 0, 3, 0); 
      if (qDate >= maturityDate) break; 
      events.push({ date: new Date(qDate), type: 'COMPOUND', desc: 'Quarterly Interest' }); 
  }
  
  let fyDate = new Date(startDate); 
  while (true) { 
      let fyEnd = U.getFYEnd(fyDate); 
      if (fyEnd >= maturityDate) break; 
      if (fyEnd > startDate) {
          events.push({ date: new Date(fyEnd), type: 'FY_END', desc: `FY End Check`, fyKey: (fyEnd.getFullYear()-1)+'-'+String(fyEnd.getFullYear()).slice(-2) }); 
      }
      fyDate = U.addYMD(fyDate, 1, 0, 0); 
  }
  
  events.push({ date: new Date(maturityDate), type: 'MATURITY', desc: 'Maturity & Final Payout' });
  events.sort((a, b) => a.date.getTime() === b.date.getTime() ? ({'DEPOSIT':1, 'COMPOUND':2, 'FY_END':3, 'MATURITY':4}[a.type] - {'DEPOSIT':1, 'COMPOUND':2, 'FY_END':3, 'MATURITY':4}[b.type]) : a.date - b.date);

  let balance = 0, totalInvested = 0, uncapitalizedInterest = 0, fyAccruedInterest = 0, totalTDS = 0, totalGrossInterest = 0, ledgerRows = [], lastDate = new Date(startDate);

  events.forEach(ev => {
    let days = U.daysBetween(lastDate, ev.date);
    let stepInterest = 0;
    
    if (days > 0 && balance > 0) { 
        stepInterest = (balance * R * days) / 36500; 
        uncapitalizedInterest += stepInterest; 
        fyAccruedInterest += stepInterest; 
        totalGrossInterest += stepInterest; 
    }
    
    if (ev.type === 'DEPOSIT') { 
        balance += M; 
        totalInvested += M; 
        ledgerRows.push({ date: U.formatDate(ev.date), desc: ev.desc, debit: '-', credit: `+ ${U.fmt(M)}`, bal: U.fmt(balance) }); 
    }
    
    if (ev.type === 'COMPOUND' || ev.type === 'MATURITY') { 
        if (uncapitalizedInterest > 0) { 
            balance += uncapitalizedInterest; 
            ledgerRows.push({ date: U.formatDate(ev.date), desc: ev.desc, debit: '-', credit: `+ ${U.fmt(uncapitalizedInterest)}`, bal: U.fmt(balance) }); 
            uncapitalizedInterest = 0; 
        } 
    }
    
    if (ev.type === 'FY_END' || ev.type === 'MATURITY') {
      if(ev.type === 'FY_END') ledgerRows.push({ date: U.formatDate(ev.date), desc: ev.desc, debit: '-', credit: '-', bal: U.fmt(balance) });
      let currentFyKey = ev.fyKey || (U.getFYEnd(ev.date).getFullYear()-1+'-'+String(U.getFYEnd(ev.date).getFullYear()).slice(-2));
      
      if (fyAccruedInterest > threshold && !exemptFYs.has(currentFyKey)) { 
          let tdsAmount = fyAccruedInterest * baseTdsRate; 
          balance -= tdsAmount; 
          totalTDS += tdsAmount; 
          ledgerRows.push({ date: U.formatDate(ev.date), desc: `TDS Deducted (${currentFyKey})`, debit: `- ${U.fmt(tdsAmount)}`, credit: '-', bal: U.fmt(balance) }); 
      }
      fyAccruedInterest = 0; 
    }
    lastDate = ev.date;
  });

  currentLedgerData = ledgerRows;
  U.$('#rd-l-1').textContent = "Total Invested";
  U.animateKpiRupee(U.$('#rd-out-p'), totalInvested);
  U.animateKpiRupee(U.$('#rd-out-i'), totalGrossInterest);
  U.animateKpiRupee(U.$('#rd-out-t'), totalTDS);
  U.$('#rd-l-4').textContent = "Net Maturity";
  U.animateKpiRupee(U.$('#rd-out-m'), balance);
  
  const rdVizTotal = totalInvested + totalGrossInterest || 1;
  const pPct = (totalInvested / rdVizTotal) * 100;
  const iPct = ((totalGrossInterest - totalTDS) / rdVizTotal) * 100;
  const tPct = totalTDS > 0 ? (totalTDS / rdVizTotal) * 100 : 0;

  U.$('#rd-viz-bar').innerHTML = `<div class="viz-segment" style="background:var(--border); width:${pPct}%"></div><div class="viz-segment" style="background:var(--accent); width:${iPct}%"></div>${tPct > 0 ? `<div class="viz-segment" style="background:var(--warn); width:${tPct}%"></div>` : ''}`;
  U.$('#rd-viz-legend').innerHTML = `<div><span class="viz-dot" style="background:var(--border);"></span>Total Invested</div><div><span class="viz-dot" style="background:var(--accent);"></span>Net Yield</div>${tPct > 0 ? `<div><span class="viz-dot" style="background:var(--warn);"></span>TDS Deducted</div>` : ''}`;
  
  U.$('#rd-table-container').innerHTML = `<table><thead><tr><th>Date</th><th>Transaction Details</th><th>Debit (₹)</th><th>Credit (₹)</th><th>Running Balance (₹)</th></tr></thead><tbody>${ledgerRows.map(r => `<tr><td style="color:var(--text-muted); font-weight:500;">${r.date}</td><td>${r.desc}</td><td class="num text-warn">${r.debit}</td><td class="num text-accent">${r.credit}</td><td class="num" style="font-weight:600; color:var(--text-main);">${r.bal}</td></tr>`).join('')}</tbody></table>`;
  
  const exemptStr = exemptFYs.size > 0 ? Array.from(exemptFYs).join(', ') : 'None';
  U.$('#rd-print-context').innerHTML = `<strong>Installment:</strong> ₹${U.fmt(M)} / month <br><strong>Effective Rate:</strong> ${R.toFixed(2)}% p.a. <br><strong>Tenure:</strong> ${totalMonths} Months <br><strong>Targeted 15G/H Exemptions:</strong> ${exemptStr}`;
  U.$('#rd-print-time').textContent = new Date().toLocaleString('en-IN');
}
/* =========================================
   3. BREAK VS BORROW (RETENTION MODULE)
   ========================================= */
function buildBreakBorrowModule(container) {
  container.innerHTML = `
