  const idleEarnings = idleBal * (idleRate / 100);
  const sweepEarnings = idleBal * (sweepRate / 100);

  U.animateKpiRupee(U.$('#sweep-out-daily'), dailyCost, { decimals: 0, durationMs: 820 });
