function calculateGoal() {
  const name = U.$('#goal-name').value || 'Financial Goal', pv = U.parse(U.$('#goal-cost').value), years = U.parse(U.$('#goal-years').value), inflation = U.parse(U.$('#goal-inf').value) / 100, cagr = U.parse(U.$('#goal-cagr').value) / 100;
  if (pv <= 0 || years <= 0) return;

  const fv = pv * Math.pow(1 + inflation, years), reqLumpsum = fv / Math.pow(1 + cagr, years);
  const months = years * 12, monthlyRate = Math.pow(1 + cagr, 1/12) - 1, reqSip = (fv * monthlyRate) / (Math.pow(1 + monthlyRate, months) - 1);

  U.$('#goal-fv').textContent = `₹${U.fmt(fv, 0)}`; 
  U.$('#goal-inf-text').textContent = `Adjusted for ${U.fmt(inflation*100)}% annual inflation over ${years} years. (Current cost: ₹${U.fmt(pv,0)})`;
  U.$('#goal-sip').innerHTML = `₹${U.fmt(reqSip, 0)} <span style="font-size:1rem; font-weight:500; color:var(--text-muted);">/ mo</span>`; 
  U.$('#goal-lumpsum').textContent = `₹${U.fmt(reqLumpsum, 0)}`;

  U.$('#goal-narrative').innerHTML = `If you were to fund <strong>${name}</strong> today, it would cost roughly ₹${U.fmt(pv,0)}. However, factoring in the invisible tax of inflation at ${U.fmt(inflation*100)}%, the actual capital required when you need the funds in ${years} years will be a staggering <strong class="text-main">₹${U.fmt(fv,0)}</strong>.<br><br>To successfully bridge this gap, assuming a ${U.fmt(cagr*100)}% market return, you must commit to a disciplined monthly investment of <strong class="text-main">₹${U.fmt(reqSip,0)}</strong> starting immediately.`;
  U.$('#pb-title').textContent = name; 
  U.$('#pb-subtitle').textContent = `Financial Action Plan - ${years} Year Horizon`;
}
