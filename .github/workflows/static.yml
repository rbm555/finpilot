  `;

  U.bindFormat(U.$('#guard-int'));
  U.bindFormat(U.$('#guard-other'));

  const regimeHints = {
    new: 'New Regime: Basic exemption ₹3L (all ages). Tax nil up to ₹7L (Sec 87A rebate of ₹25,000).',
    old: 'Old Regime: Basic exemption ₹2.5L (under 60) / ₹3L (60–79) / ₹5L (80+). Tax nil up to ₹5L (Sec 87A rebate of ₹12,500).'
  };

  const makeSegClickable = (barId) => {
    U.$(`#${barId}`).addEventListener('click', e => {
