      U.$$('.seg-btn', U.$(`#${barId}`)).forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      if (barId === 'guard-regime-bar') {
        U.$('#guard-regime-hint').textContent = regimeHints[e.target.dataset.val];
      }
      calculateGuard();
    });
  };
  makeSegClickable('guard-age-bar');
  makeSegClickable('guard-regime-bar');

  U.$('#guard-calc').onclick = calculateGuard;
  setTimeout(calculateGuard, 50);
}

function calculateGuard() {
  const ageTier  = U.$('.seg-btn.active', U.$('#guard-age-bar')).dataset.val;   // '15g' | '15h' | '15h-vs'
  const regime   = U.$('.seg-btn.active', U.$('#guard-regime-bar')).dataset.val; // 'new' | 'old'
  const intInc   = U.parse(U.$('#guard-int').value);
  const otherInc = U.parse(U.$('#guard-other').value);
  const totalInc = intInc + otherInc;

  // ── Threshold table ───────────────────────────────────────────────────────
  // basicExemption : income below which zero tax is computed (before any rebate)
  // nilTaxLimit    : effective ceiling below which total tax liability is NIL
  //                  (accounts for Sec 87A rebate: ₹25k new / ₹12.5k old up to ₹5L)
  let basicExemption, nilTaxLimit, formLabel;

  if (regime === 'new') {
    basicExemption = 300000;  // ₹3L — same for all ages under new regime
    nilTaxLimit    = 700000;  // ₹7L — 87A rebate makes tax nil up to here
    formLabel = ageTier === '15g' ? 'Form 15G' : 'Form 15H';
  } else {
    // Old Regime — exemption varies by age
    if (ageTier === '15g')    { basicExemption = 250000; nilTaxLimit = 500000; formLabel = 'Form 15G'; }
    else if (ageTier === '15h') { basicExemption = 300000; nilTaxLimit = 500000; formLabel = 'Form 15H'; }
    else                        { basicExemption = 500000; nilTaxLimit = 500000; formLabel = 'Form 15H (Very Senior)'; } // 80+ — no 87A rebate, but ₹5L exemption itself is enough
  }

  let isEligible = true;
  let reasons    = [];

  if (ageTier === '15g') {
    // Form 15G: BOTH conditions must hold simultaneously (Sec 197A)
    // Condition 1: Estimated total income tax is NIL
    if (totalInc > nilTaxLimit) {
      isEligible = false;
      reasons.push(`<strong>Condition 1 fails:</strong> Total income ₹${U.fmt(totalInc)} exceeds the nil-tax ceiling of ₹${U.fmt(nilTaxLimit)}. Tax liability exists.`);
    }
    // Condition 2: Total interest income must NOT exceed the basic exemption limit
    if (intInc > basicExemption) {
      isEligible = false;
      reasons.push(`<strong>Condition 2 fails:</strong> Interest income ₹${U.fmt(intInc)} exceeds the basic exemption limit of ₹${U.fmt(basicExemption)}.`);
    }
  } else {
    // Form 15H: Single condition — estimated tax on total income is NIL
    if (totalInc > nilTaxLimit) {
      isEligible = false;
      reasons.push(`Total income ₹${U.fmt(totalInc)} exceeds the nil-tax ceiling of ₹${U.fmt(nilTaxLimit)}. Estimated tax liability is not nil.`);
    }
  }

  const badge = U.$('#guard-badge');
  const sub   = U.$('#guard-sub');

  U.$('#guard-out-type').textContent = formLabel;
  U.$('#guard-out-tot').textContent  = `₹${U.fmt(totalInc)}`;

  if (isEligible) {
    badge.style.cssText = 'display:inline-block; padding:16px 32px; border-radius:30px; font-size:1.4rem; font-weight:800; border:2px solid var(--accent); color:var(--accent); background:rgba(16,185,129,0.05); box-shadow:var(--shadow-sm);';
    badge.innerHTML = `✅ VALID TO SUBMIT`;
    sub.innerHTML   = `The customer meets <strong>all statutory conditions</strong> for <strong>${formLabel}</strong>. Total income ₹${U.fmt(totalInc)} is within the nil-tax threshold (₹${U.fmt(nilTaxLimit)}), and interest income ₹${U.fmt(intInc)} is within the basic exemption limit (₹${U.fmt(basicExemption)}). Form may be accepted.`;
  } else {
    badge.style.cssText = 'display:inline-block; padding:16px 32px; border-radius:30px; font-size:1.4rem; font-weight:800; border:2px solid var(--warn); color:var(--warn); background:rgba(239,68,68,0.05); box-shadow:var(--shadow-sm);';
    badge.innerHTML = `❌ INVALID SUBMISSION`;
    sub.innerHTML   = `<strong style="color:var(--warn);">Do not accept the form.</strong><br><br>${reasons.map(r => `• ${r}`).join('<br>')}`;
  }
}

