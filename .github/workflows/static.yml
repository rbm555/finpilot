function calculateSGB() {
  const grams    = U.parse(U.$('#sgb-grams').value);
  const issueP   = U.parse(U.$('#sgb-price').value);
  const cagr     = U.parse(U.$('#sgb-cagr').value) / 100;
  const slab     = U.parse(U.$('#sgb-slab').value) / 100;
  const costPct  = U.parse(U.$('#sgb-cost').value) / 100;
  if (grams <= 0 || issueP <= 0) return;

  const invested  = grams * issueP;
  const couponPA  = invested * 0.025;                // 2.5% p.a. on issue price
  const halfCoup  = couponPA / 2;
  const totalCoup = couponPA * 8;
  const matPrice  = issueP * Math.pow(1 + cagr, 8);
  const matValue  = grams * matPrice;
  const capGain   = matValue - invested;             // EXEMPT at RBI redemption

  // XIRR: negative invested today, semi-annual coupons, maturity proceeds
  const today = new Date();
  const flows = [-invested];
  const dates = [today];
  for (let i = 1; i <= 16; i++) {
    const d = new Date(today); d.setMonth(d.getMonth() + i * 6);
    flows.push(halfCoup * (1 - slab));
    dates.push(d);
  }
  const matDate = new Date(today); matDate.setFullYear(matDate.getFullYear() + 8);
  flows[flows.length - 1] += matValue; // add redemption on last date
  const xirr = U.xirr(flows, dates, 0.1) || 0;

  // Physical gold (same CAGR, no coupon, storage cost, LTCG 20% approx)
  const physNet   = matValue * Math.pow(1 - costPct, 8); // net of storage
  const physGain  = physNet - invested;
  const physLTCG  = physGain > 0 ? physGain * 0.20 : 0;  // simplified 20%
  const physFinal = physNet - physLTCG;

  U.animateKpiRupee(U.$('#sgb-out-inv'),  invested,   { decimals: 0 });
  U.animateKpiRupee(U.$('#sgb-out-mat'),  matValue,   { decimals: 0 });
  U.animateKpiRupee(U.$('#sgb-out-coup'), totalCoup,  { decimals: 0 });
  U.$('#sgb-out-xirr').textContent = Number.isFinite(xirr) ? (xirr*100).toFixed(2)+'%' : 'N/A';

  const sgbTotal = matValue + totalCoup * (1 - slab);
  U.animateKpiRupee(U.$('#sgb-card-val'),  sgbTotal,   { decimals: 0 });
  U.animateKpiRupee(U.$('#sgb-phys-val'),  physFinal,  { decimals: 0 });

  // Table: yearly data
  let rows = '';
  for (let yr = 1; yr <= 8; yr++) {
    const goldP   = issueP * Math.pow(1 + cagr, yr);
    const goldV   = grams * goldP;
    const capG    = goldV - invested;
    rows += `<tr>
      <td style="font-weight:700;">${yr}</td>
      <td class="num">₹${U.fmt(halfCoup,0)} × 2</td>
      <td class="num text-accent">₹${U.fmt(halfCoup*(1-slab)*2,0)}</td>
      <td class="num">₹${U.fmt(goldP,0)}/g</td>
      <td class="num" style="font-weight:700;">₹${U.fmt(goldV,0)}</td>
      <td class="num" style="color:${capG>0?'var(--accent)':'var(--warn)'};">${capG>=0?'+':''}₹${U.fmt(capG,0)} ${yr===8?'<span style="color:var(--accent);font-size:.7rem;font-weight:700;">EXEMPT</span>':''}</td>
    </tr>`;
  }
  U.$('#sgb-table').innerHTML = `<table><thead><tr>
    <th>Year</th><th>Semi-Annual Coupon (Gross)</th><th>Post-Tax Coupon</th><th>Gold Price/gram</th><th>Portfolio Value</th><th>Capital Gain</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

