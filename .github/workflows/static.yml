function calculateMFFIFO() {
  const type = U.$('#mf-type').value, R = U.parse(U.$('#mf-r').value), ty = U.parse(U.$('#mf-ty').value), tm = U.parse(U.$('#mf-tm').value), startDate = new Date(U.$('#mf-s').value);
  const assetType = U.$('#mf-asset').value, slabRate = U.parse(U.$('#mf-slab').value) / 100, stepUp = U.parse(U.$('#mf-step').value) / 100;
  let A = U.parse(U.$('#mf-a').value);
  
  const totalMonths = (ty * 12) + tm;
  if (A <= 0 || totalMonths <= 0) return;

  const maturityDate = U.addYMD(startDate, 0, totalMonths, 0), monthlyRate = Math.pow(1 + R/100, 1/12) - 1;
  let currentNav = 100.0000, tranches = [], ledgerRows = [], totalInvested = 0, totalUnits = 0;

  if (type === 'lumpsum') {
    let units = A / currentNav; tranches.push({ date: startDate, units: units, costNav: currentNav }); totalInvested = A; totalUnits = units;
    ledgerRows.push({ date: U.formatDate(startDate), desc: "Lumpsum", debit: "-", credit: `+ ${U.fmt(A)}`, bal: `${totalUnits.toFixed(4)} Units` });
    for(let i=0; i<totalMonths; i++) currentNav *= (1 + monthlyRate);
  } else {
    for (let i = 0; i < totalMonths; i++) {
      if (i > 0 && i % 12 === 0 && stepUp > 0) A = A * (1 + stepUp); // Apply Annual Step-Up
      let trDate = U.addYMD(startDate, 0, i, 0), units = A / currentNav;
      tranches.push({ date: trDate, units: units, costNav: currentNav }); totalInvested += A; totalUnits += units;
      ledgerRows.push({ date: U.formatDate(trDate), desc: `SIP @ NAV ${currentNav.toFixed(2)}`, debit: "-", credit: `+ ${U.fmt(A,0)}`, bal: `${totalUnits.toFixed(4)} Units` });
      currentNav *= (1 + monthlyRate); 
    }
  }

  currentLedgerData = ledgerRows;
  const finalNav = currentNav, finalValue = totalUnits * finalNav;
  let stcgGain = 0, ltcgGain = 0, debtGain = 0;
  
  // Equity LTCG threshold is "more than 12 calendar months" (IT Act Sec 112A),
  // NOT simply > 365 days. A unit bought Jan 1, 2024 and sold Dec 31, 2024 is
  // 365 days but only 11 months → STCG. Using calendar months avoids misclassification.
  const isEquityLTCG = (purchaseDate, redemptionDate) => {
    const months = (redemptionDate.getFullYear() - purchaseDate.getFullYear()) * 12
                 + (redemptionDate.getMonth()     - purchaseDate.getMonth());
    if (months > 12) return true;
    if (months === 12 && redemptionDate.getDate() > purchaseDate.getDate()) return true;
    return false;
  };

  tranches.forEach(tr => {
    const trancheGain = (tr.units * finalNav) - (tr.units * tr.costNav);
    if (assetType === 'debt') {
      debtGain += trancheGain;
    } else {
      if (isEquityLTCG(tr.date, maturityDate)) ltcgGain += trancheGain;
      else stcgGain += trancheGain;
    }
  });

  let taxLiability = 0, taxBreakdown = '';
  if (assetType === 'debt') {
    taxLiability = debtGain * slabRate; taxBreakdown = `Taxed at Slab Rate (${slabRate*100}%)`;
  } else {
    let taxableLtcg = Math.max(0, ltcgGain - 125000), ltcgTax = taxableLtcg * 0.125, stcgTax = stcgGain * 0.20;
    taxLiability = ltcgTax + stcgTax; 
    taxBreakdown = `<strong class="text-warn">STCG (20%): ₹${U.fmt(stcgTax)}</strong> &nbsp;&nbsp;|&nbsp;&nbsp; <strong class="text-warn">LTCG (12.5%): ₹${U.fmt(ltcgTax)}</strong>`;
  }

  const postTaxValue = finalValue - taxLiability;
  U.$('#mf-out-p').textContent = `₹${U.fmt(totalInvested,0)}`; 
  U.$('#mf-out-g').textContent = `₹${U.fmt(finalValue,0)}`; 
  U.$('#mf-out-t').textContent = `₹${U.fmt(taxLiability,0)}`; 
  U.$('#mf-out-n').textContent = `₹${U.fmt(postTaxValue,0)}`;

  // finalValue = totalInvested + totalGain, so dividing by finalValue already sums to 100%
  const grossGain = finalValue - totalInvested;
  const mfVizTotal = finalValue || 1;
  const pPct  = (totalInvested / mfVizTotal) * 100;
  const tPct  = taxLiability > 0 ? (taxLiability / mfVizTotal) * 100 : 0;
  const iPct  = Math.max(0, 100 - pPct - tPct);
  U.$('#mf-viz-bar').innerHTML = `<div class="viz-segment" style="background:#cbd5e1; width:${pPct}%"></div><div class="viz-segment" style="background:var(--accent); width:${iPct}%"></div>${tPct > 0 ? `<div class="viz-segment" style="background:var(--warn); width:${tPct}%"></div>` : ''}`;
  U.$('#mf-viz-legend').innerHTML = `<div><span class="viz-dot" style="background:#cbd5e1;"></span>Invested</div><div><span class="viz-dot" style="background:var(--accent);"></span>Net Yield</div>${tPct > 0 ? `<div><span class="viz-dot" style="background:var(--warn);"></span>Tax Liability</div>` : ''}`;

  U.$('#mf-tax-breakdown').innerHTML = `<strong>Tax FIFO Analysis (Assuming Single FY Redemption):</strong><br>${assetType === 'equity' ? `Long-Term Gains (&gt;12m): ₹${U.fmt(ltcgGain)} <br> Short-Term Gains (&lt;12m): ₹${U.fmt(stcgGain)} <br><br> ${taxBreakdown}` : `Total Debt Gains: ₹${U.fmt(debtGain)} <br><br> ${taxBreakdown}`}`;
  U.$('#mf-table-container').innerHTML = `<table><thead><tr><th>Date</th><th>Details</th><th>Debit (₹)</th><th>Credit (₹)</th><th>Balance</th></tr></thead><tbody>${ledgerRows.map(r => `<tr><td style="color:var(--text-muted); font-weight:500;">${r.date}</td><td>${r.desc}</td><td class="num text-warn">${r.debit}</td><td class="num text-accent">${r.credit}</td><td class="num" style="font-weight:600;">${r.bal}</td></tr>`).join('')}</tbody></table>`;
}

