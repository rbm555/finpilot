function calculateNPS() {
  const age       = U.parse(U.$('#nps-age').value);
  const contrib   = U.parse(U.$('#nps-contrib').value);
  const salary    = U.parse(U.$('#nps-salary').value);
  const slab      = U.parse(U.$('#nps-slab').value) / 100;
  const eqPct     = U.parse(U.$('#nps-eq').value) / 100;
  const dtPct     = U.parse(U.$('#nps-dt').value) / 100;
  const eqR       = U.parse(U.$('#nps-eq-r').value) / 100;
  const dtR       = U.parse(U.$('#nps-dt-r').value) / 100;
  const annR      = U.parse(U.$('#nps-ann-r').value) / 100;
  const retAge    = 60;
  const years     = Math.max(1, retAge - age);

  if (contrib <= 0 || salary <= 0) return;

  // Normalize allocations to sum to 1
  const totalAlloc = eqPct + dtPct || 1;
  const eqW = eqPct / totalAlloc, dtW = dtPct / totalAlloc;
  const blendedR = eqW * eqR + dtW * dtR;
  const monthly  = contrib;
  const mr       = Math.pow(1 + blendedR, 1/12) - 1;
  const corpus   = monthly * (Math.pow(1 + mr, years * 12) - 1) / mr * (1 + mr);

  const lumpsum  = corpus * 0.60;
  const annCorpus= corpus * 0.40;
  const pensionMo= annCorpus * annR / 12;

  // Tax savings
  const ded80c   = Math.min(contrib * 12, salary * 0.10, 150000);
  const ded80cb  = 50000;
  const annualTax= (ded80c + ded80cb) * slab;

  U.animateKpiRupee(U.$('#nps-out-corpus'), corpus, { decimals: 0 });
  U.$('#nps-out-years-sub').textContent = `${years} years of contributions at ${(blendedR*100).toFixed(1)}% blended CAGR`;
  U.animateKpiRupee(U.$('#nps-out-lump'), lumpsum,   { decimals: 0 });
  U.animateKpiRupee(U.$('#nps-out-ann'),  annCorpus, { decimals: 0 });
  U.$('#nps-out-pension-mo').innerHTML = `Monthly pension: <strong style="color:var(--primary);">₹${U.fmt(pensionMo,0)}</strong>`;
  U.animateKpiRupee(U.$('#nps-out-taxsave'), annualTax, { decimals: 0 });

  U.$('#nps-80c').textContent  = '₹' + U.fmt(ded80c, 0);
  U.$('#nps-80cb').textContent = '₹50,000';
  U.$('#nps-80ccd2').textContent = '₹' + U.fmt(salary * 0.10, 0);

  U.$('#nps-verdict').innerHTML = `✅ By contributing ₹${U.fmt(contrib,0)}/mo to NPS, you save ₹${U.fmt(annualTax,0)} in tax annually (Sec 80CCD(1) ₹${U.fmt(ded80c,0)} + <strong style="color:var(--accent);">exclusive Sec 80CCD(1B) ₹50,000</strong>). At retirement, ₹${U.fmt(lumpsum,0)} is <strong>completely tax-free</strong>. Your 40% annuity corpus of ₹${U.fmt(annCorpus,0)} will generate a monthly pension of <strong>₹${U.fmt(pensionMo,0)}</strong>.`;

  // Year-wise table
  let bal = 0, rows = '';
  for (let y = 1; y <= years; y++) {
    const prevBal = bal;
    bal = bal * Math.pow(1 + blendedR, 1) + monthly * 12;
    const taxSaving = y <= 1 ? annualTax : annualTax;
    rows += `<tr><td style="font-weight:700;">${y}</td><td class="num">${age + y - 1}</td><td class="num">₹${U.fmt(monthly * 12, 0)}</td><td class="num text-accent">₹${U.fmt(bal - prevBal - monthly * 12, 0)}</td><td class="num" style="font-weight:800;">₹${U.fmt(bal, 0)}</td><td class="num text-accent">₹${U.fmt(taxSaving, 0)}</td></tr>`;
  }
  U.$('#nps-table').innerHTML = `<table><thead><tr><th>Year</th><th>Age</th><th>Contributions</th><th>Returns Earned</th><th>Corpus</th><th>Tax Saved</th></tr></thead><tbody>${rows}</tbody></table>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   GRANDMASTER: CRM CLIENT VAULT (localStorage)
   ─────────────────────────────────────────────────────────────────────────── */
const CRM_KEY = 'advisory_crm_clients_v2';

function crmLoad() {
  try { return JSON.parse(localStorage.getItem(CRM_KEY) || '{}'); } catch(e) { return {}; }
}
function crmSave(db) {
  try { localStorage.setItem(CRM_KEY, JSON.stringify(db)); } catch(e) {}
}

function buildCRMModule(container) {
  container.innerHTML = `
    <div class="command-center no-print" style="max-width:480px;">
      <div class="input-section">
        <div class="section-title">👤 Add / Update Client</div>
