  });
  U.$('#bb-appl').addEventListener('input', () => { U.$('#bb-appl').dataset.userEdited = '1'; });

  ['#bb-p', '#bb-r', '#bb-run'].forEach(id => U.$(id).addEventListener('input', updateLTV));
  
  U.$('#bb-calc').onclick = calculateBreakBorrow; 
