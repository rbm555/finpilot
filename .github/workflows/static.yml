        <!-- SUMMARY TAB -->
        <div class="aemi-panel" id="aemi-panel-summary" style="display:none; padding:20px;">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:16px;">
            <div>
              <div class="aemi-ctrl-label" style="margin-bottom:8px; color:var(--primary);">A — Payment Breakdown</div>
              <div id="aemi-a-donut"></div>
            </div>
            <div>
              <div class="aemi-ctrl-label" style="margin-bottom:8px; color:var(--accent);">B — Payment Breakdown</div>
              <div id="aemi-b-donut"></div>
            </div>
          </div>
          <!-- Side-by-side metrics bar chart -->
