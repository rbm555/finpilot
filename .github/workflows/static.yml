            </div>
            <div class="helper-text" style="margin-top:4px;" id="guard-regime-hint">New Regime: Basic exemption ₹3L. Tax nil up to ₹7L (Sec 87A rebate).</div>
          </div>
        </div>
      </div>
      <div class="input-section">
