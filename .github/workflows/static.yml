// ══ MAIN CALCULATE ══
function calculateAdvEMI() {
  const pA = _aemiGetScenParams('a'), pB = _aemiGetScenParams('b');
  const showFlatWarn = (U.$('#aemi-flatwarn')||{}).checked!==false;
  const showTaxA = (U.$('#aemi-a-tax')||{}).checked===true;
  const showTaxB = (U.$('#aemi-b-tax')||{}).checked===true;
  const extra    = U.parse((U.$('#aemi-extra')||{}).value||'0');
  const invR     = U.parse((U.$('#aemi-inv-r')||{}).value||'12')/100;
  if (pA.P<=0||pA.R<=0||pA.Y<=0||pB.P<=0||pB.R<=0||pB.Y<=0) return;

  const eA=_aemiEngine(pA.P,pA.R,pA.Y,pA.method,pA.reduce,pA.freq);
  const eB=_aemiEngine(pB.P,pB.R,pB.Y,pB.method,pB.reduce,pB.freq);
  const taxA=_aemiTaxSave(pA.P,pA.R,pA.Y,pA.type,eA.emi,eA.r,showTaxA);
  const taxB=_aemiTaxSave(pB.P,pB.R,pB.Y,pB.type,eB.emi,eB.r,showTaxB);

  _aemiRowsA=eA.rows; _aemiRowsB=eB.rows;
  _aemiYrA=_aemiBuildYrRows(eA.rows,pA.Y);
  _aemiYrB=_aemiBuildYrRows(eB.rows,pB.Y);

  // Store for print report
  _aemiParamsA={...pA,emi:eA.emi,totalInt:eA.totalInt,ear:eA.ear,taxSave:taxA};
  _aemiParamsB={...pB,emi:eB.emi,totalInt:eB.totalInt,ear:eB.ear,taxSave:taxB};

  // Update hints
  _aemiUpdateScenHint('a'); _aemiUpdateScenHint('b');

  // Headlines
  U.$('#aemi-a-headline-lbl').textContent=pA.label;
  U.$('#aemi-b-headline-lbl').textContent=pB.label;
  U.animateKpiRupee(U.$('#aemi-a-emi'),eA.emi,{decimals:0});
  U.animateKpiRupee(U.$('#aemi-a-int'),eA.totalInt,{decimals:0});
  U.animateKpiRupee(U.$('#aemi-a-tot'),pA.P+eA.totalInt,{decimals:0});
  U.animateKpiRupee(U.$('#aemi-a-tax-kpi'),taxA,{decimals:0});
  U.animateKpiRupee(U.$('#aemi-b-emi'),eB.emi,{decimals:0});
  U.animateKpiRupee(U.$('#aemi-b-int'),eB.totalInt,{decimals:0});
  U.animateKpiRupee(U.$('#aemi-b-tot'),pB.P+eB.totalInt,{decimals:0});
  U.animateKpiRupee(U.$('#aemi-b-tax-kpi'),taxB,{decimals:0});

  // EAR labels
  const mLblA=pA.method==='flat'?'Flat Rate':`${pA.reduce==='daily'?'Daily':'Monthly'} Reducing`;
  const mLblB=pB.method==='flat'?'Flat Rate':`${pB.reduce==='daily'?'Daily':'Monthly'} Reducing`;
  const earA=U.$('#aemi-a-ear-label'), earB=U.$('#aemi-b-ear-label');
  if(earA) earA.innerHTML=`${mLblA} · EAR <strong>${(eA.ear*100).toFixed(3)}%</strong>${showFlatWarn&&pA.method==='flat'?` ⚠️ ≈${(pA.R*1.8).toFixed(2)}% RB equiv`:''}`;
  if(earB) earB.innerHTML=`${mLblB} · EAR <strong>${(eB.ear*100).toFixed(3)}%</strong>${showFlatWarn&&pB.method==='flat'?` ⚠️ ≈${(pB.R*1.8).toFixed(2)}% RB equiv`:''}`;

  // Winner verdict
  const netA=(pA.P+eA.totalInt)-taxA*pA.Y, netB=(pB.P+eB.totalInt)-taxB*pB.Y;
  const winner=netA<=netB?'A':'B';
  const wLbl=winner==='A'?pA.label:pB.label, wColor=winner==='A'?'var(--primary)':'var(--accent)';
  const diff=Math.abs(netA-netB);
  const vBanner=U.$('#aemi-verdict-banner');
  if(vBanner){
    vBanner.style.cssText=`background:${winner==='A'?'rgba(13,148,136,.05)':'rgba(8,145,178,.05)'};border:1.5px solid ${wColor};`;
    vBanner.innerHTML=`🏆 <strong style="color:${wColor}">${wLbl}</strong> is the better deal — saves <strong>₹${U.fmt(diff,0)}</strong> on total net outgo after tax benefits across the full tenure.`;
  }

  // LIFECYCLE tab (default active)
  renderAemiLifecycle('a');

  // SUMMARY tab
  const dA=U.$('#aemi-a-donut'), dB=U.$('#aemi-b-donut');
  if(dA) U.svgDonut(dA,[{label:'Principal',value:pA.P,color:'var(--primary)'},{label:'Interest',value:eA.totalInt,color:'var(--warn)'}],{size:140});
  if(dB) U.svgDonut(dB,[{label:'Principal',value:pB.P,color:'var(--accent)'},{label:'Interest',value:eB.totalInt,color:'var(--warn)'}],{size:140});

  // Summary bar comparison
  const barsEl=U.$('#aemi-summary-bars');
  if(barsEl) {
    U.svgBarChart(barsEl,[
      {label:`${pA.label} EMI`,       value:eA.emi,      color:'var(--primary)',  format:v=>'₹'+U.fmt(v,0)},
      {label:`${pB.label} EMI`,       value:eB.emi,      color:'var(--accent)',   format:v=>'₹'+U.fmt(v,0)},
      {label:`${pA.label} Total Int`, value:eA.totalInt, color:'rgba(220,38,38,.7)', format:v=>'₹'+U.fmt(v,0)},
      {label:`${pB.label} Total Int`, value:eB.totalInt, color:'rgba(220,38,38,.4)', format:v=>'₹'+U.fmt(v,0)},
    ],{width:420, barHeight:24, gap:8, labelWidth:160});
  }

  const narr=U.$('#aemi-summary-narrative');
  if(narr) narr.innerHTML=`<strong>${pA.label}:</strong> ₹${U.fmt(eA.emi,0)}/mo · ${pA.Y}yr · Total interest ₹${U.fmt(eA.totalInt,0)} (${((eA.totalInt/pA.P)*100).toFixed(0)}% of P) · EAR ${(eA.ear*100).toFixed(2)}%.<br>
    <strong>${pB.label}:</strong> ₹${U.fmt(eB.emi,0)}/mo · ${pB.Y}yr · Total interest ₹${U.fmt(eB.totalInt,0)} (${((eB.totalInt/pB.P)*100).toFixed(0)}% of P) · EAR ${(eB.ear*100).toFixed(2)}%.
    ${taxA>0||taxB>0?`<br><strong>Tax saving (30% slab, Yr 1 est.):</strong> ${pA.label} → ₹${U.fmt(taxA,0)}/yr · ${pB.label} → ₹${U.fmt(taxB,0)}/yr.`:''}`;

  // Amortisation default A
  renderAdvEMIAmortTable('a',false);

  // Year-wise default A
  renderAdvEMIYearChart('a'); renderAdvEMIYearTable('a');

  // Compare matrix
  const cEl=U.$('#aemi-compare-grid');
  if(cEl) {
    const scenarios=[
      {label:'Reducing · Monthly · Monthly Cpd',   m:'reducing',rc:'monthly',f:12},
      {label:'Reducing · Monthly · Quarterly Cpd',  m:'reducing',rc:'monthly',f:4},
      {label:'Reducing · Monthly · Annual Cpd',     m:'reducing',rc:'monthly',f:1},
      {label:'Reducing · Daily · Monthly Cpd',      m:'reducing',rc:'daily',  f:12},
      {label:'Reducing · Daily · Annual Cpd',       m:'reducing',rc:'daily',  f:1},
      {label:'Flat Rate',                            m:'flat',    rc:'monthly',f:1},
    ];
    const curLbl=pA.method==='flat'?'Flat Rate':`Reducing · ${pA.reduce==='daily'?'Daily':'Monthly'} · ${{12:'Monthly',4:'Quarterly',2:'Half-Yearly',1:'Annual'}[pA.freq]} Cpd`;
    cEl.innerHTML=`<table class="matrix-table" style="font-size:.77rem;"><thead>
      <tr><th rowspan="2" style="min-width:170px;">Method</th>
          <th colspan="3" style="text-align:center;color:var(--primary);border-bottom:2px solid var(--primary);">${pA.label}</th>
          <th colspan="3" style="text-align:center;color:var(--accent);border-bottom:2px solid var(--accent);">${pB.label}</th></tr>
      <tr><th>EMI</th><th>Total Int</th><th>Total Pay</th><th>EMI</th><th>Total Int</th><th>Total Pay</th></tr>
    </thead><tbody>${scenarios.map(sc=>{
      const rA=_aemiEngine(pA.P,pA.R,pA.Y,sc.m,sc.rc,sc.f);
      const rB=_aemiEngine(pB.P,pB.R,pB.Y,sc.m,sc.rc,sc.f);
      const isAct=(pA.method===sc.m&&(sc.m==='flat'||pA.reduce===sc.rc)&&pA.freq===sc.f);
      return `<tr style="${isAct?'background:rgba(13,148,136,.08);font-weight:700;':''}">
        <td style="font-size:.75rem;">${isAct?'▶ ':''}${sc.label}</td>
        <td class="num">₹${U.fmt(rA.emi,0)}</td><td class="num text-warn">₹${U.fmt(rA.totalInt,0)}</td><td class="num">₹${U.fmt(pA.P+rA.totalInt,0)}</td>
        <td class="num">₹${U.fmt(rB.emi,0)}</td><td class="num text-warn">₹${U.fmt(rB.totalInt,0)}</td><td class="num">₹${U.fmt(pB.P+rB.totalInt,0)}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
  }

  // Opportunity cost
  const mR2=eA.r||pA.R/100/12; let ppBal=pA.P,ppMo=0,ppInt=0;
  const nEmi=eA.emi+extra;
  if(pA.method!=='flat'){while(ppBal>0.01&&ppMo<1200){const ip=ppBal*mR2;let pp=nEmi-ip;if(pp<0)pp=0;if(pp>ppBal)pp=ppBal;ppInt+=ip;ppBal-=pp;ppMo++;}}
  else{ppMo=eA.N;ppInt=eA.totalInt;}
  const intSaved=Math.max(0,eA.totalInt-ppInt),tenSaved=Math.max(0,eA.N-ppMo);
  const mr3=Math.pow(1+invR,1/12)-1;
  const corpus=extra*(Math.pow(1+mr3,eA.N)-1)/mr3*(1+mr3);
  U.animateKpiRupee(U.$('#aemi-opp-saved'),intSaved,{decimals:0});
  U.$('#aemi-opp-time').textContent=`${tenSaved} mo`;
  U.animateKpiRupee(U.$('#aemi-opp-corpus'),corpus,{decimals:0});
  const delta=corpus-intSaved;
  U.$('#aemi-opp-delta').textContent=(delta>=0?'+':'-')+'₹'+U.fmt(Math.abs(delta),0);
  const vEl=U.$('#aemi-opp-verdict');
  if(vEl){
    if(delta>0){vEl.style.cssText='background:rgba(8,145,178,.06);border:1px solid var(--accent);color:var(--text-main);';vEl.innerHTML=`📈 <strong>Invest the Extra</strong> — At ${U.$('#aemi-inv-r').value}% CAGR, corpus ₹${U.fmt(corpus,0)} exceeds interest saved ₹${U.fmt(intSaved,0)} by <strong>₹${U.fmt(delta,0)}</strong>.`;}
    else{vEl.style.cssText='background:rgba(13,148,136,.06);border:1px solid var(--primary);color:var(--text-main);';vEl.innerHTML=`🧹 <strong>Prepay the Loan</strong> — Guaranteed saving ₹${U.fmt(intSaved,0)} beats investment corpus by ₹${U.fmt(Math.abs(delta),0)}.`;}
  }

  currentLedgerData=_aemiYrA.map(r=>({Year:r.year,'Annual EMI':r.emi,Interest:r.interest,Principal:r.principal,Balance:r.balance}));
}

function renderAdvEMIAmortTable(scen,showFull) {
  const rows=(scen==='a'?_aemiRowsA:_aemiRowsB).slice(0,showFull?9999:24);
  const tbl=U.$('#aemi-amort-table'); if(!tbl) return;
  tbl.innerHTML=`<table><thead><tr><th>Month</th><th>EMI (₹)</th><th>Interest (₹)</th><th>Principal (₹)</th><th>Balance (₹)</th><th>% Loan Paid</th></tr></thead><tbody>
    ${rows.map(r=>{
      const P = scen==='a'?(_aemiParamsA.P||1):(_aemiParamsB.P||1);
      const pctPaid=((1-r.balance/P)*100).toFixed(1);
      const barW=Math.round((1-r.balance/P)*60);
      return `<tr>
        <td style="font-weight:700;color:var(--text-muted);">${r.mo}</td>
        <td class="num">${U.fmt(r.emi,0)}</td>
        <td class="num text-warn">${U.fmt(r.interest,0)}</td>
        <td class="num text-accent">${U.fmt(r.principal,0)}</td>
        <td class="num" style="font-weight:700;">${U.fmt(r.balance,0)}</td>
        <td><div style="display:flex;align-items:center;gap:6px;"><div style="width:60px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;"><div style="width:${barW}px;height:100%;background:var(--primary);border-radius:3px;"></div></div><span style="font-size:.75rem;color:var(--text-muted);">${pctPaid}%</span></div></td>
      </tr>`;
    }).join('')}
  </tbody></table>`;
}

function renderAdvEMIYearChart(scen) {
  const yr=scen==='a'?_aemiYrA:_aemiYrB, color=scen==='a'?'var(--primary)':'var(--accent)';
  const chartEl=U.$('#aemi-yr-chart'); if(!chartEl||!yr.length) return;
  chartEl.innerHTML='';
  const Y=yr.length,bw=20,gp=4,cW=Math.max(300,Y*(bw+gp)+60),cH=165;
  const maxV=Math.max(...yr.map(r=>r.interest+r.principal));
  const scl=125/maxV;
  const colorHex=scen==='a'?'#0d9488':'#0891b2';
  let bars='';
  yr.forEach((d,i)=>{
    const x=36+i*(bw+gp),ph=d.principal*scl,ih=d.interest*scl,py=cH-18-ph,iy=py-ih;
    bars+=`<rect x="${x}" y="${py}" width="${bw}" height="${ph}" rx="2" fill="${colorHex}" opacity=".85"><title>Yr${d.year} Principal ₹${U.fmt(d.principal,0)}</title></rect>`;
    bars+=`<rect x="${x}" y="${iy}" width="${bw}" height="${ih}" rx="2" fill="#dc2626" opacity=".65"><title>Yr${d.year} Interest ₹${U.fmt(d.interest,0)}</title></rect>`;
    if(i%5===0||i===Y-1) bars+=`<text x="${x+bw/2}" y="${cH-2}" text-anchor="middle" font-size="8" fill="var(--text-muted)">Y${d.year}</text>`;
  });
  chartEl.innerHTML=`<svg width="${cW}" height="${cH}" viewBox="0 0 ${cW} ${cH}" style="max-width:100%;overflow:visible;">
    ${bars}
    <rect x="36" y="5" width="10" height="7" rx="2" fill="${colorHex}" opacity=".85"/><text x="50" y="12" font-size="8.5" font-weight="600" fill="var(--text-muted)">Principal</text>
