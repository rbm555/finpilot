    const val   = U.$('.kpi-val',   k).textContent.trim();
    txt += `• ${label}: *${val}*\n`;
  });
  // Use modern Clipboard API when available (HTTPS / localhost)
  // Fall back to execCommand for file:// context
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(txt)
      .then(() => U.showToast("Summary copied to clipboard!"))
      .catch(() => execCopy(txt));
  } else {
    execCopy(txt);
  }
}

function execCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:-99px;left:-99px;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    document.execCommand('copy');
    U.showToast("Summary copied to clipboard!");
  } catch (e) {
    U.showToast("Copy failed — please copy manually.", true);
  }
  document.body.removeChild(ta);
}

let currentLedgerData = []; 
function exportCSV(filename) {
  // Read data directly from the DOM table — avoids global state race condition
  const ws = U.$('#workspace');
  const table = ws ? ws.querySelector('table') : null;
  if (!table) {
    // Fallback to global if DOM table not found
    if (!currentLedgerData || !currentLedgerData.length) return U.showToast("Generate a calculation first.", true);
    _doExportCSV(filename, currentLedgerData); return;
  }
  const headers = Array.from(table.querySelectorAll('thead th')).map(th => th.textContent.trim());
  if (!headers.length) return U.showToast("No table data to export.", true);
  const rows = Array.from(table.querySelectorAll('tbody tr')).map(tr =>
    Array.from(tr.querySelectorAll('td')).map(td =>
      td.textContent.trim().replace(/[₹]/g,'').replace(/,/g,'')
    )
  );
  _doExportCSV(filename, null, headers, rows);
}

function _doExportCSV(filename, dataArr, headers, rows) {
  let csv = '';
  if (dataArr && dataArr.length) {
    const keys = Object.keys(dataArr[0]);
    csv = keys.join(',') + '\n';
    dataArr.forEach(r => {
      csv += keys.map(k => `"${String(r[k]||'').replace(/[₹\s,]/g,'').replace(/<[^>]*>?/gm,'')}"` ).join(',') + '\n';
    });
  } else if (headers && rows) {
    csv = headers.map(h => `"${h}"`).join(',') + '\n';
    rows.forEach(row => { csv += row.map(c => `"${c}"`).join(',') + '\n'; });
  } else { return U.showToast("No data to export.", true); }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = `${filename}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

/* ===== Module State Persistence (sessionStorage) ===== */
let _activeModule = null;

function _saveModuleState(type) {
  if (!type) return;
  const ws = U.$('#workspace');
  if (!ws) return;
  const state = {};
  // All named inputs
  U.$$('input[id], select[id], textarea[id]', ws).forEach(el => {
    state[el.id] = el.type === 'checkbox' ? el.checked : el.value;
  });
  // Active segmented-control value per bar (by bar id)
  U.$$('.segmented-control[id]', ws).forEach(bar => {
    const active = U.$('.seg-btn.active', bar);
    if (active) state[`__seg__${bar.id}`] = active.dataset.val;
  });
  try { sessionStorage.setItem(`advisory_state_${type}`, JSON.stringify(state)); } catch(e) {}
}

function _restoreModuleState(type) {
  const raw = sessionStorage.getItem(`advisory_state_${type}`);
  if (!raw) return;
  try {
    const state = JSON.parse(raw);
    // Restore plain inputs first
    Object.entries(state).forEach(([key, val]) => {
      if (key.startsWith('__seg__')) return;
      const el = U.$(`#${key}`);
      if (!el) return;
      if (el.type === 'checkbox') {
        if (el.checked !== val) { el.checked = val; el.dispatchEvent(new Event('change', {bubbles:true})); }
      } else {
        el.value = val;
      }
    });
    // Restore segmented controls — simulate click so side-effect handlers fire
    Object.entries(state).forEach(([key, val]) => {
      if (!key.startsWith('__seg__')) return;
      const barId = key.slice(7);
      const bar = U.$(`#${barId}`);
      if (!bar) return;
      const target = U.$(`.seg-btn[data-val="${val}"]`, bar);
      if (target && !target.classList.contains('active')) target.click();
    });
  } catch(e) {}
}

/* ===== Module Loader ===== */
function loadModule(type) {
  // Persist current module state before switching
  if (_activeModule && _activeModule !== type) _saveModuleState(_activeModule);

  U.$$('.nav-btn').forEach(b => { b.classList.remove('active'); b.removeAttribute('aria-current'); });
  const activeBtn = U.$(`.nav-btn[data-target="${type}"]`);
  if (activeBtn) { activeBtn.classList.add('active'); activeBtn.setAttribute('aria-current', 'page'); }
  const ws = U.$('#workspace');
  // Toggle full-width layout for Advanced EMI module
  const wg = document.querySelector('.workspace-grid');
  if (wg) wg.classList.toggle('aemi-full-layout', type === 'adv-emi');
  
  if (typeof buildFDModule === 'function' && type === 'fd') buildFDModule(ws);
  else if (typeof buildRDModule === 'function' && type === 'rd') buildRDModule(ws);
  else if (typeof buildBreakBorrowModule === 'function' && type === 'break') buildBreakBorrowModule(ws);
  else if (typeof buildSCSSModule === 'function' && type === 'scss') buildSCSSModule(ws);
  else if (typeof buildMFModule === 'function' && type === 'mf') buildMFModule(ws);
  else if (typeof buildULIPModule === 'function' && type === 'ulip') buildULIPModule(ws);
  else if (typeof buildGoalModule === 'function' && type === 'goal') buildGoalModule(ws);
  else if (typeof buildPPFModule === 'function' && type === 'ppf') buildPPFModule(ws);
  else if (typeof buildSSYModule === 'function' && type === 'ssy') buildSSYModule(ws);
  else if (typeof build15GModule === 'function' && type === '15g') build15GModule(ws);
  else if (typeof buildEMIModule === 'function' && type === 'emi') buildEMIModule(ws);
  else if (typeof buildLadderModule === 'function' && type === 'ladder') buildLadderModule(ws);
  else if (typeof buildProSWPModule === 'function' && type === 'pro-swp') buildProSWPModule(ws);
  else if (typeof buildProHarvestModule === 'function' && type === 'pro-harvest') buildProHarvestModule(ws);
  else if (typeof buildProSweepModule === 'function' && type === 'pro-sweep') buildProSweepModule(ws);
  else if (typeof buildProDebtDestroyerModule === 'function' && type === 'pro-debt') buildProDebtDestroyerModule(ws);
  else if (typeof buildProRateShockModule === 'function' && type === 'pro-shock') buildProRateShockModule(ws);
  else if (typeof buildProCorporateModule === 'function' && type === 'pro-corp') buildProCorporateModule(ws);
  else if (typeof buildAdvEMIModule === 'function' && type === 'adv-emi') buildAdvEMIModule(ws);
  else if (typeof buildFDMatrixModule === 'function' && type === 'fd-matrix') buildFDMatrixModule(ws);
  else if (typeof buildSGBModule === 'function' && type === 'sgb') buildSGBModule(ws);
  else if (typeof buildNPSModule === 'function' && type === 'nps') buildNPSModule(ws);
  else if (typeof buildCRMModule === 'function' && type === 'crm') buildCRMModule(ws);
  else if (typeof buildPortfolioModule === 'function' && type === 'portfolio') buildPortfolioModule(ws);

  // Restore saved state immediately (before the ~50ms auto-calc fires)
  _restoreModuleState(type);
  _activeModule = type;
  try { sessionStorage.setItem('advisory_current_module', type); } catch(e) {}

  // P5-2: Auto-bind number formatting to every text input in the newly built module
  U.$$('input[type="text"]', ws).forEach(el => U.bindFormat(el));

  // P5-3: Inject Reset button into each module's first section-title bar
  const firstTitle = ws.querySelector('.section-title');
  if (firstTitle && !firstTitle.querySelector('.module-reset-btn')) {
    const rb = document.createElement('button');
    rb.className = 'btn-secondary module-reset-btn';
    rb.setAttribute('aria-label', 'Reset module to default values');
    rb.title = 'Reset to defaults';
    rb.style.cssText = 'float:right; padding:3px 11px; font-size:0.74rem; margin-top:-2px;';
    rb.textContent = '↺ Reset';
    rb.onclick = () => {
      try { sessionStorage.removeItem('advisory_state_' + _activeModule); } catch(e) {}
      loadModule(_activeModule);
    };
    firstTitle.appendChild(rb);
  }
}
