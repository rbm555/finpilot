function calculateLadder() {
  const P       = U.parse(U.$('#lad-p').value);
  const rates   = [1,2,3,4,5].map(i => U.parse(U.$(`#lad-r${i}`).value));
  const applyTDS = U.$('#lad-tds').checked;
  const senior   = U.$('#lad-senior').checked;
  const tdsLimit = senior ? 50000 : 40000;
  if (P <= 0) return;

  const tranche = P / 5;
  let rows = [], totalInterest = 0, totalTDS = 0;

  for (let i = 0; i < 5; i++) {
    const yrs      = i + 1;
    const R        = rates[i];
    const mat      = tranche * Math.pow(1 + (R / 400), 4 * yrs);  // quarterly compounding
    const interest = mat - tranche;

    // Simplified per-FY TDS: divide interest evenly over years to estimate FY accrual
    let estTDS = 0;
    if (applyTDS) {
      const annualInt = interest / yrs; // average interest per FY
      if (annualInt > tdsLimit) estTDS = (annualInt - 0) * 0.10 * yrs; // 10% TDS on full interest (annual > threshold)
      // More precisely: TDS on entire FY interest if it breaches the slab
      estTDS = interest * 0.10; // simplified: 10% on all interest for this tranche
    }
    const netMat = mat - estTDS;

    totalInterest += interest;
    totalTDS      += estTDS;

    rows.push({
      tranche:   `Tranche ${i+1}`,
      tenure:    `${yrs} Year${yrs>1?'s':''}`,
      invested:  U.fmt(tranche, 0),
      rate:      `${R.toFixed(2)}%`,
      interest:  U.fmt(interest, 0),
      tds:       estTDS > 0 ? U.fmt(estTDS, 0) : '-',
      netMat:    U.fmt(netMat, 0),
      action:    'Reinvest @ 5-Year Rate'
    });
  }

  const blendedYield = (totalInterest / P) / 3 * 100; // avg annualised yield over ~3yr avg tenure

  // KPIs
  U.$('#lad-out-p').textContent     = `₹${U.fmt(P, 0)}`;
  U.$('#lad-out-i').textContent     = `₹${U.fmt(totalInterest, 0)}`;
  U.$('#lad-out-tds').textContent   = applyTDS ? `₹${U.fmt(totalTDS, 0)}` : 'N/A';
  U.$('#lad-out-yield').textContent = `${blendedYield.toFixed(2)}%`;

  currentLedgerData = rows;
  U.$('#lad-table-container').innerHTML = `<table><thead><tr><th>Tranche</th><th>Tenure</th><th>Invested (₹)</th><th>Rate</th><th>Gross Interest (₹)</th><th>Est. TDS (₹)</th><th>Net Maturity (₹)</th><th>Action at Maturity</th></tr></thead><tbody>${rows.map(r=>`<tr><td style="font-weight:600;">${r.tranche}</td><td>${r.tenure}</td><td class="num">${r.invested}</td><td class="num" style="font-weight:600;">${r.rate}</td><td class="num text-accent">${r.interest}</td><td class="num text-warn">${r.tds}</td><td class="num" style="font-weight:700;">${r.netMat}</td><td style="color:var(--text-muted); font-size:0.8rem;">${r.action}</td></tr>`).join('')}</tbody></table>`;
}

