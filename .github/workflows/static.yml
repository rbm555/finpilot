      <div class="fp-card ledger-box" style="padding:0; overflow:hidden;">
        <div style="padding:20px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;" class="no-print">
          <h3 class="section-title" style="margin:0;">Exact Payout Schedule</h3>
          <button class="btn-secondary" onclick="exportCSV('SCSS_Schedule')">📥 Export CSV</button>
