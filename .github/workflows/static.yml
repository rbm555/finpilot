        <div class="aemi-panel" id="aemi-panel-yearwise" style="display:none;">
          <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;" class="no-print">
