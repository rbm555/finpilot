function calculateFDMatrix() {
  const P    = U.parse(U.$('#fdm-p').value);
  const Y    = U.parse(U.$('#fdm-y').value);
  const R    = U.parse(U.$('#fdm-r').value);
  const slab = U.parse(U.$('#fdm-tax').value) / 100;
  const mode = U.$('.seg-btn.active', U.$('#fdm-mode-bar')).dataset.val;
  if (P <= 0 || Y <= 0 || R <= 0) return;

  const { matVal, grossInt, apy, postTaxXirr, payout } = fdmCalc(P, R, Y, slab, mode);

  U.$('#fdm-out-nom').textContent    = R.toFixed(2) + '%';
  U.$('#fdm-out-apy').textContent    = (apy * 100).toFixed(2) + '%';
  U.animateKpiRupee(U.$('#fdm-out-gross'), matVal, { decimals: 0 });
  U.animateKpiRupee(U.$('#fdm-out-posttax'), matVal - (matVal - P) * slab, { decimals: 0 });
  U.$('#fdm-out-xirr').textContent   = Number.isFinite(postTaxXirr) ? (postTaxXirr*100).toFixed(2)+'%' : 'N/A';

  const modeLabel = { cum: 'Cumulative (Quarterly Compounding)', monthly: 'Monthly Payout (Simple Interest)', quarterly: 'Quarterly Payout', halfyearly: 'Half-Yearly Payout', annual: 'Annual Payout' }[mode];
  const narrative = mode === 'cum'
    ? `Under <strong>${modeLabel}</strong>, your ₹${U.fmt(P,0)} grows to <strong>₹${U.fmt(matVal,0)}</strong> in ${Y} years. The <strong>nominal rate of ${R}%</strong> compounding quarterly produces an Annualized Yield (APY) of <strong>${(apy*100).toFixed(2)}%</strong> — the real return for every rupee invested. After applying ${(slab*100).toFixed(0)}% tax slab on interest, your <strong>Post-Tax XIRR is ${Number.isFinite(postTaxXirr)?(postTaxXirr*100).toFixed(2):'N/A'}%</strong>. To match this tax-free, a PPF/SSY offering only ${Number.isFinite(postTaxXirr)?(postTaxXirr*100).toFixed(2):'N/A'}% is mathematically equivalent.`
    : `Under <strong>${modeLabel}</strong>, you receive ₹${U.fmt(payout,0)} per period. Total interest over ${Y} years: ₹${U.fmt(grossInt,0)}. Gross return (simple): ${(grossInt/P*100/Y).toFixed(2)}% p.a. Post-tax return: ${((grossInt*(1-slab))/P*100/Y).toFixed(2)}% p.a. <strong>Note:</strong> Non-cumulative payouts do not benefit from compounding — the APY equals the nominal rate.`;
  U.$('#fdm-yield-narrative').innerHTML = narrative;

  // Multi-rate comparison table
  const rates = [1,2,3,4,5].map(i => U.parse(U.$(`#fdm-cr${i}`).value));
  const teyLabel = slab > 0 ? `TEY-equiv FD (${(slab*100).toFixed(0)}% slab)` : 'TEY N/A';
  let rows = rates.map(rate => {
    if (rate <= 0) return '';
    const c = fdmCalc(P, rate, Y, slab, mode);
    const tey = slab > 0 ? (rate / (1 - slab)).toFixed(2) + '% FD needed' : '—Tax free slab';
    const postTaxVal = P + c.grossInt * (1 - slab);
    return `<tr>
      <td><span class="rate-badge">${rate.toFixed(2)}%</span></td>
      <td class="num">₹${U.fmt(c.matVal, 0)}</td>
      <td class="num">₹${U.fmt(c.grossInt, 0)}</td>
      <td class="num">₹${U.fmt(postTaxVal, 0)}</td>
      <td><span class="apy-badge">${(c.apy*100).toFixed(2)}%</span></td>
      <td>${Number.isFinite(c.postTaxXirr)?(c.postTaxXirr*100).toFixed(2)+'%':'N/A'}</td>
      <td>${tey}</td>
    </tr>`;
  }).join('');
  U.$('#fdm-matrix-table').innerHTML = `<table class="matrix-table"><thead><tr>
    <th>Nominal Rate</th><th>Gross Maturity</th><th>Gross Interest</th><th>Post-Tax Value</th>
    <th>APY</th><th>Post-Tax XIRR</th><th>${teyLabel}</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

function fdmCalc(P, R, Y, slab, mode) {
  const r_q  = R / 400;
  const n_q  = Y * 4;
  let matVal, grossInt, apy, payout = 0;
  if (mode === 'cum') {
    matVal   = P * Math.pow(1 + r_q, n_q);
    grossInt = matVal - P;
    apy      = Math.pow(1 + r_q, 4) - 1;
  } else {
    const freq = { monthly: 12, quarterly: 4, halfyearly: 2, annual: 1 }[mode];
    payout   = P * R / 100 / freq;
    const totalPayouts = payout * freq * Y;
    grossInt = totalPayouts;
    matVal   = P + grossInt;
    apy      = R / 100; // simple interest — no compounding benefit
  }
  const today  = new Date();
  const endDate = new Date(today.getFullYear() + Y, today.getMonth(), today.getDate());
  const flows  = [-P];
  const dates  = [today];
  const taxOnInt = grossInt * slab;
  flows.push(matVal - taxOnInt);
  dates.push(endDate);
  const postTaxXirr = U.xirr(flows, dates, 0.05) || 0;
  return { matVal, grossInt, apy, postTaxXirr, payout };
}

